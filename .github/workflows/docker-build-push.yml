name: Build and Push Container

on:
  push:
    tags:
      - "v*"      # Semantic version releases (v1.0.0) and release candidates (v1.0.0-rc1)
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_REGISTRY: ghcr.io
  ACR_REGISTRY: crcommonallfrc.azurecr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAS_DD_VERSION: "4.1.0"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Only run on tag pushes
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        transport:
          - streamable-http
          - stdio
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      actions: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full git history for dynamic versioning
          # Ensure all refs are available
          ref: ${{ github.ref }}

      - name: Verify git state for versioning
        run: |
          echo "Current commit: $(git rev-parse HEAD)"
          echo "Git describe: $(git describe --tags --always --dirty)"
          echo "Git status:"
          git status --porcelain

      - name: Set lowercase image name for cache
        id: image-name
        run: |
          echo "lowercase=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set lowercase registry
        id: registry
        run: |
          echo "ghcr=${{ env.GHCR_REGISTRY }}/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
          logout: false

      - name: Log in to Azure Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
          logout: false

      - name: Install oras
        run: |
          ORAS_VERSION="1.2.0"
          curl -sLO "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          tar -xzf "oras_${ORAS_VERSION}_linux_amd64.tar.gz" oras
          sudo mv oras /usr/local/bin/

      - name: Resolve graph tag
        id: graph-tag
        run: |
          REGISTRY="${{ steps.registry.outputs.ghcr }}"
          PACKAGE="imas-codex-graph-imas"
          # Query available tags from the graph package
          TAGS=$(oras repo tags "${REGISTRY}/${PACKAGE}" 2>&1) || true
          CLEAN_TAGS=$(echo "$TAGS" | grep -E '^[0-9v]' || true)
          if echo "$CLEAN_TAGS" | grep -qx "latest"; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          elif [ -n "$CLEAN_TAGS" ]; then
            BEST=$(echo "$CLEAN_TAGS" | sort -V | tail -1)
            echo "No 'latest' tag found. Using most recent: $BEST"
            echo "tag=${BEST}" >> $GITHUB_OUTPUT
          else
            echo "::warning::No graph package found at ${REGISTRY}/${PACKAGE} — image will build without pre-loaded graph"
            echo "tag=none" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata for GHCR (releases only)
        id: meta-ghcr
        if: github.event_name != 'pull_request' && !contains(github.ref, '-rc')
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}-${{ matrix.transport }}
            type=semver,pattern={{major}}.{{minor}}-${{ matrix.transport }}
            type=semver,pattern={{major}}-${{ matrix.transport }}
          flavor: |
            latest=false

      - name: Extract metadata for ACR
        id: meta-acr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}-${{ matrix.transport }}
            type=semver,pattern={{major}}.{{minor}}-${{ matrix.transport }}
            type=semver,pattern={{major}}-${{ matrix.transport }}
            type=raw,value=prod-${{ matrix.transport }},enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-rc') }}
            type=raw,value=latest-${{ matrix.transport }},enable=${{ contains(github.ref, '-rc') }}
          flavor: |
            latest=false

      - name: Build and push Docker image (RC builds - ACR only)
        id: build-rc
        if: github.event_name != 'pull_request' && contains(github.ref, '-rc')
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-acr.outputs.tags }}
          labels: ${{ steps.meta-acr.outputs.labels }}
          build-args: |
            IDS_FILTER=
            TRANSPORT=${{ matrix.transport }}
            IMAS_DD_VERSION=${{ env.IMAS_DD_VERSION }}
            GHCR_REGISTRY=${{ steps.registry.outputs.ghcr }}
            GRAPH_TAG=${{ steps.graph-tag.outputs.tag }}
            GIT_SHA=${{ github.sha }}
            GIT_TAG=${{ github.ref_name }}
            GIT_REF=${{ github.ref }}
          secrets: |
            GHCR_TOKEN=${{ secrets.GHCR_TOKEN }}
          cache-from: type=gha,scope=build-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=build-${{ github.ref_name }}

      - name: Build and push Docker image (releases - both registries)
        id: build-release
        if: github.event_name != 'pull_request' && !contains(github.ref, '-rc')
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta-ghcr.outputs.tags }}
            ${{ steps.meta-acr.outputs.tags }}
          labels: |
            ${{ steps.meta-ghcr.outputs.labels }}
            ${{ steps.meta-acr.outputs.labels }}
          build-args: |
            IDS_FILTER=
            TRANSPORT=${{ matrix.transport }}
            IMAS_DD_VERSION=${{ env.IMAS_DD_VERSION }}
            GHCR_REGISTRY=${{ steps.registry.outputs.ghcr }}
            GRAPH_TAG=${{ steps.graph-tag.outputs.tag }}
            GIT_SHA=${{ github.sha }}
            GIT_TAG=${{ github.ref_name }}
            GIT_REF=${{ github.ref }}
          secrets: |
            GHCR_TOKEN=${{ secrets.GHCR_TOKEN }}
          cache-from: type=gha,scope=build-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=build-${{ github.ref_name }}

      - name: Verify version inside image (release builds)
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-rc')
        run: |
          set -euo pipefail
          EXPECTED=$(python3 -c "from packaging.version import Version; print(Version('${GITHUB_REF_NAME#v}'))")
          # Pick one tag to test (first GHCR tag)
          IMAGE=$(echo "${{ steps.meta-ghcr.outputs.tags }}" | head -n1)
          echo "Testing image: $IMAGE expecting version: $EXPECTED"
          docker pull "$IMAGE"
          # Bypass entrypoint (which starts Neo4j) and call CLI directly
          ACTUAL=$(docker run --rm --entrypoint imas-codex "$IMAGE" --version || true)
          echo "Version reported by image: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "ERROR: No version output from CLI" >&2
            exit 1
          fi
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "ERROR: Expected $EXPECTED got $ACTUAL" >&2
            exit 1
          fi
          echo "Version check passed"

      - name: Verify version inside image (RC builds)
        if: github.event_name != 'pull_request' && contains(github.ref, '-rc')
        run: |
          set -euo pipefail
          EXPECTED=$(python3 -c "from packaging.version import Version; print(Version('${GITHUB_REF_NAME#v}'))")
          # Pick one tag to test (first ACR tag)
          IMAGE=$(echo "${{ steps.meta-acr.outputs.tags }}" | head -n1)
          echo "Testing image: $IMAGE expecting version: $EXPECTED"
          docker pull "$IMAGE"
          # Bypass entrypoint (which starts Neo4j) and call CLI directly
          ACTUAL=$(docker run --rm --entrypoint imas-codex "$IMAGE" --version || true)
          echo "Version reported by image: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "ERROR: No version output from CLI" >&2
            exit 1
          fi
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "ERROR: Expected $EXPECTED got $ACTUAL" >&2
            exit 1
          fi
          echo "Version check passed"

      - name: Generate artifact attestation for GHCR (releases only)
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-rc')
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-release.outputs.digest }}
          push-to-registry: true
