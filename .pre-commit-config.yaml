repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        name: ruff linter (check-only — never modifies files)
        # CRITICAL: no --fix. Auto-modifying hooks combined with
        # pre-commit's stash/restore cycle can clobber other agents'
        # unstaged work on conflict. Run `uv run ruff check --fix .`
        # manually before committing.
        args: [--no-fix]
      - id: ruff-format
        name: ruff formatter (check-only — never modifies files)
        # CRITICAL: --check. Same rationale as above. Run
        # `uv run ruff format .` manually before committing.
        args: [--check]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
        name: gitleaks (detect secrets)

  - repo: local
    hooks:
      - id: uv-lock
        name: uv lock
        entry: uv lock
        language: system
        files: ^(pyproject\.toml|uv\.lock)$
        pass_filenames: false

  - repo: local
    hooks:
      - id: private-yaml-sync
        name: sync private YAML to gist
        entry: imas-codex config private push --quiet
        language: system
        files: ^imas_codex/config/facilities/.*_private\.yaml$
        pass_filenames: false
        stages: [pre-commit]
