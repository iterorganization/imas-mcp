# Curated preferred physical_base anchors for standard name generation.
#
# These tokens resolve ordering ambiguities in the open-vocabulary
# ``physical_base`` segment. When two grammatically-valid forms of a name
# compete (e.g. ``plasma_boundary_gap_angle`` vs ``angle_of_plasma_boundary_gap``),
# the one whose physical_base is on this anchor list wins.
#
# IMPORTANT: This is **NOT** a closed list. ``physical_base`` remains an open
# vocabulary — new compound tokens may still be coined freely. The anchors
# below are soft guidance derived from the graph's own emergent vocabulary
# (most-used bases that survived review), used by the composer and reviewer
# to keep the catalog self-consistent.
#
# Regenerate with: ``uv run imas-codex sn anchors mine``
#
# Selection rule: physical_base tokens with ``usage_count >= 2`` and
# ``avg(review_mean_score) >= 0.75`` across StandardNames in the graph.

