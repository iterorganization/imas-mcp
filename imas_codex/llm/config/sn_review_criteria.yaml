# Review scoring criteria — codex-owned evaluation framework.
# Per-dimension scoring uses integers 0-20 in the LLM prompt.
# Full mode: aggregate score is normalized to 0-1 (sum / 120).
# Name mode: aggregate score is normalized to 0-1 (sum / 80).
# Docs mode: aggregate score is normalized to 0-1 (sum / 80).
dimensions:
  grammar:
    max_score: 20
    description: "vNext 5-group IR compliance: operator scope markers, closed physical_base, projection prefix, postfix locus, _of_ disambiguation"
  semantic:
    max_score: 20
    description: "Name accurately describes the physical quantity"
  documentation:
    max_score: 20
    description: "Description and documentation are clear, complete, non-redundant"
  convention:
    max_score: 20
    description: "Follows naming conventions (no units in name, no path fragments)"
  completeness:
    max_score: 20
    description: "All required fields filled, links populated, tags relevant"
  compliance:
    max_score: 20
    description: "Follows compose prompt instructions exactly"

# --- Review mode definitions ------------------------------------------------
# Three review modes are supported. Each maps to a dedicated prompt file and
# a subset of the dimensions above. Thresholds are expressed as fractions of
# the mode's maximum score.
#
# Prompt files:
#   name  → imas_codex/llm/prompts/sn/review_name_only.md
#   docs  → imas_codex/llm/prompts/sn/review_docs.md
#   full  → imas_codex/llm/prompts/sn/review.md
modes:
  name:
    description: >-
      Four-dimension name review. Applied after composition (before enrichment).
      Evaluates the standard_name string and grammar fields only.
      Does NOT penalise missing description/documentation.
    dimensions: [grammar, semantic, convention, completeness]
    max_raw_score: 80
    prompt: "sn/review_name_only.md"
    tiers:
      outstanding: {raw_min: 68}   # 85 %
      good:        {raw_min: 48}   # 60 %
      inadequate:  {raw_min: 32}   # 40 %
      poor:        {raw_min: 0}
    verdict_rules:
      accept: "raw_score >= 48 AND no dimension is 0"
      reject: "raw_score < 32 OR any dimension is 0"
      revise: "all other cases"

  docs:
    description: >-
      Four-dimension docs review. Applied after enrichment (docs pass).
      Gate: skips entries where reviewed_name_at IS NULL.
      Evaluates description/documentation prose only; does NOT re-score the name.
    dimensions: [description_quality, documentation_quality, completeness, physics_accuracy]
    max_raw_score: 80
    prompt: "sn/review_docs.md"
    tiers:
      outstanding: {raw_min: 68}   # 85 %
      good:        {raw_min: 48}   # 60 %
      inadequate:  {raw_min: 32}   # 40 %
      poor:        {raw_min: 0}
    verdict_rules:
      accept: "raw_score >= 48 AND no dimension is 0"
      reject: "raw_score < 32 OR any dimension is 0"
      revise: "all other cases"

  full:
    description: >-
      Six-dimension full review. Used for --target full runs or for standalone
      benchmark scoring. Covers both name quality and documentation quality.
    dimensions: [grammar, semantic, documentation, convention, completeness, compliance]
    max_raw_score: 120
    prompt: "sn/review.md"
    tiers:
      outstanding: {raw_min: 102}  # 85 %
      good:        {raw_min: 72}   # 60 %
      inadequate:  {raw_min: 48}   # 40 %
      poor:        {raw_min: 0}
    verdict_rules:
      accept: "raw_score >= 72 AND no dimension is 0"
      reject: "raw_score < 48 OR any dimension is 0"
      revise: "all other cases"

# Normalized (0-1) verdict thresholds — used by Python code that normalises
# raw scores before comparing. Consistent with all three mode definitions.
verdict_rules:
  accept: "score >= 0.60 AND no dimension is 0"
  reject: "score < 0.40 OR any dimension is 0"
  revise: "all other cases"

tiers:
  outstanding:
    min: 0.85
  good:
    min: 0.60
  inadequate:
    min: 0.40
  poor:
    min: 0.0

# Concrete issues identified during peer review of LLM-generated standard names
# (PR #2, ~305 WEST tokamak standard names). Referenced by [I-code] in prompts.
common_issues:
  naming_consistency:
    I1.1_ambiguous_prepositions:
      description: "Names using _from_ imply causation"
      example_bad: "current_from_passive_loop"
      example_good: "passive_loop_current"
      rule: "Use device prefix for signals, _of_ for static properties, never _from_"
      affects: [convention, grammar]

    I1.2_duplicate_names:
      description: "Synonymous names for the same physical quantity"
      example_bad: "poloidal_flux vs poloidal_magnetic_flux"
      rule: "Use controlled vocabulary term; never create synonymous alternatives"
      affects: [convention]
      score_override: "convention = 0 if duplicate detected"

    I1.3_inconsistent_boundary:
      description: "Mixed naming patterns for plasma boundary quantities"
      rule: "Use consistent _of_plasma_boundary suffix"
      affects: [convention]

    I1.4_scalar_vs_vector_position:
      description: "Both component and vector position names should coexist"
      rule: "radial_position_of_ / vertical_position_of_ for components; position_of_ for vector"
      affects: [semantic, completeness]

    I1.5_processing_verbs:
      description: "Names encoding processing/reconstruction method"
      example_bad: "reconstructed_faraday_rotation_angle"
      example_good: "faraday_rotation_angle"
      forbidden_prefixes: ["reconstructed_", "averaged_", "measured_", "calculated_", "fitted_"]
      exception: "flux_surface_averaged_ is a valid transformation segment"
      affects: [convention, compliance]

    I1.6_dd_path_leakage:
      description: "Names containing DD organizational prefixes"
      example_bad: "geometric_minor_radius"
      example_good: "minor_radius"
      rule: "Standard names are IDS-agnostic; no DD section prefixes"
      affects: [convention]
      score_override: "convention = 0 if DD prefix detected"

  documentation_quality:
    I2.1_undefined_variables:
      description: "LaTeX equations with undefined variables"
      rule: "Every variable must be defined with units immediately after the equation"
      affects: [documentation]
      score_override: "documentation <= 5 if any variable undefined"

    I2.2_tangential_context:
      description: "Documentation introduces loosely-related physics concepts"
      rule: "Documentation covers THIS quantity only: definition, equation, significance, typical values"
      positive_model: "effective_charge — clear definition, one equation, all variables defined"
      affects: [documentation]

    I2.3_unit_conversion_errors:
      description: "Incorrect unit conversion factors"
      conversions:
        eV_to_K: 11605
        Pa_to_eV_per_m3: 6.242e+18
      rule: "State units of variables before applying conversions"
      affects: [semantic, documentation]

    I2.4_missing_cross_references:
      description: "Documentation references quantities without links"
      rule: "Use [standard_name](#standard_name) inline markdown links"
      affects: [documentation]

    I2.5_missing_sign_conventions:
      description: "COCOS-dependent quantities must include sign convention paragraph referencing specific COCOS version"
      check: "If cocos_transformation_type is set, documentation MUST contain 'Sign convention:' paragraph with specific COCOS version reference"
      severity: critical
      score_override: "documentation <= 10 for COCOS quantities without version-specific sign convention"

    I2.6_missing_aliases:
      description: "DD abbreviated names (gm1-gm9) not mentioned"
      rule: "Mention DD alias in documentation when abbreviated names exist"
      affects: [documentation, completeness]

    I2.7_wrong_physics_qualifier:
      description: "Incorrect mathematical qualifier (e.g., flux_surface_averaged_elongation)"
      rule: "Elongation/triangularity are geometric properties OF a contour, not averages"
      affects: [semantic]
      score_override: "semantic = 0 if physics qualifier is wrong"

    I2.8_superfluous_equations:
      description: "Trivial algebraic rearrangements waste documentation space"
      rule: "Include defining equations only, not trivial rearrangements"
      affects: [documentation]

  formatting:
    I3.1_sign_convention_format:
      description: "Inconsistent sign convention formatting"
      rule: "Separate paragraph starting with 'Sign convention:' — plain text, not bold"
      affects: [documentation]

    I3.2_yaml_multiline:
      description: "Mixed folded (>) and literal (|) block scalars"
      rule: "Always use | (literal block scalar) for multiline documentation"
      affects: [compliance]

    I3.3_latex_escaping:
      description: "LaTeX commands corrupted by string escaping (\\nabla → newline+abla)"
      rule: "Use | or |- block scalar for LaTeX content; never quoted strings"
      affects: [documentation, compliance]

    I3.4_name_length_conciseness:
      description: >-
        Overlong or verbose standard name — redundant qualifiers, stacked
        modifiers, or compound forms that should decompose into separate names.
      rule: >-
        Keep names concise. Target ≤ 6 tokens; names of 8+ tokens are
        penalised unless every token is physically essential. Drop
        redundant qualifiers already implied by the physics_domain (e.g. no
        `equilibrium_` prefix on an equilibrium-domain name, no
        `_of_plasma` when the domain is `transport`). Obvious compound
        quantities (`{thing_a}_and_{thing_b}_...`) should split into
        separate standard names.
      examples_bad:
        - "equilibrium_plasma_boundary_outline_radial_coordinate"
        - "reconstructed_electron_temperature_profile_versus_normalized_psi"
      examples_good:
        - "plasma_boundary_outline_r"
        - "electron_temperature"
      affects: [compliance, convention]
      score_override: >-
        compliance -= 4 per extra token beyond 7 (capped at -10); convention -= 4
        if redundant domain qualifier present.

  structural_scope:
    I4.1_geometry_explosion:
      description: "Too many per-component position/geometry names"
      rule: "Prefer generic parameterized names over per-component entries"
      affects: [compliance]

    I4.2_fitting_metadata:
      description: "chi_squared, weights repeated per measured quantity"
      rule: "Define fitting/uncertainty as standalone names"
      affects: [compliance, convention]

    I4.3_vector_units:
      description: "Position vectors with mixed units (m for R,Z; rad for phi)"
      status: "deferred to ISN vector_axes proposal"
      rule: "Document the limitation in description"
      affects: [completeness]

    I4.4_boundary_ambiguity:
      description: "DD leaves plasma boundary definition to user"
      rule: "Document assumed boundary definition (LCFS, 99% psi_norm, or code-dependent)"
      affects: [completeness, documentation]

    I4.5_batch_consistency:
      description: "Inconsistent naming across entries in same batch"
      rule: "Same vocabulary and suffix patterns for related entries within a batch"
      affects: [convention, compliance]

    I4.6_physical_base_decomposition:
      description: >-
        Closed-vocabulary tokens (qualifiers, operators, projection axes,
        locus, process) absorbed into the ``physical_base`` compound
        instead of being expressed through the vNext 5-group IR. A
        parse-valid compound is not grammar-wrong — but a compound that
        hides structure in ``physical_base`` defeats operator/projection
        search and grammatical composition.
      rule: >-
        For each candidate, inspect the ``physical_base`` token and list
        any closed-vocab tokens present as whole underscore-separated
        substrings. Treat each hit as a candidate decomposition defect
        unless the compound is a well-known lexicalised atomic quantity
        (e.g. ``poloidal_flux``, ``minor_radius``,
        ``cross_sectional_area``).
      examples_bad:
        - name: "toroidal_torque"
          hit: "toroidal (projection axis)"
          correction: "projection=toroidal + base=torque"
        - name: "volume_averaged_electron_temperature"
          hit: "volume_averaged (operator), electron (qualifier)"
          correction: "operator=volume_averaged + qualifier=electron + base=temperature"
        - name: "normalized_poloidal_flux"
          hit: "normalized (operator), poloidal (projection)"
          correction: "operator=normalized + base=poloidal_flux (poloidal_flux is an accepted atomic term)"
      examples_allowed:
        - "poloidal_flux (atomic — widely lexicalised as a named quantity)"
        - "cross_sectional_area (atomic geometric property)"
        - "minor_radius (atomic geometric property)"
      affects: [grammar, semantic]
      score_override: >-
        grammar -= 4 per genuine decomposition defect (capped at -8 on
        dim 1); semantic -= 4 when the absorbed token would change the
        referenced quantity.
