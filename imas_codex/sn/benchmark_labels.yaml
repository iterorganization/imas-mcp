# Quality tier labels for benchmark evaluation.
# Each tier defines standard names that exemplify that quality level.
# Used by the reviewer model as scoring anchors.

outstanding:
  # Rich docs, correct grammar, cross-linked, LaTeX notation
  - electron_temperature
  - plasma_current
  - safety_factor
  - position_of_magnetic_axis
  - bootstrap_current

good:
  # Correct grammar, adequate documentation
  - toroidal_component_of_magnetic_field_at_magnetic_axis
  - centroid_of_plasma_boundary
  - bolometer_radiated_power
  - collisionality

adequate:
  # Correct grammar, thin documentation
  - area_of_poloidal_magnetic_field_probe
  - tokamak_scenario
  - time

poor:
  # Grammar valid but naming debatable or documentation minimal
  - banana_orbits
  - h_mode
