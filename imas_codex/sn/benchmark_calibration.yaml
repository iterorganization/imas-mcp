# Calibration dataset for benchmark reviewer scoring.
# Each entry is a hand-crafted full standard name entry spanning quality tiers.
# Used as scoring anchors by the reviewer model — they define what
# "outstanding" vs "poor" looks like.
#
# Every entry's grammar fields have been validated:
#   compose_standard_name(StandardName(**fields)) == name
#
# Scoring: 6 dimensions × 0-20 each = 0-120 total.
# Dimensions: grammar, semantic, documentation, convention, completeness, compliance.

entries:
  # ===================================================================
  # OUTSTANDING tier (102-120): Rich docs, LaTeX, cross-refs, perfect grammar
  # ===================================================================

  - name: electron_temperature
    tier: outstanding
    expected_score: 114
    description: "Temperature of the electron population."
    documentation: >
      Electron temperature $T_e$ is a fundamental kinetic quantity representing
      the thermal energy of the plasma electron population. Measured primarily
      by Thomson scattering and electron cyclotron emission (ECE) diagnostics.
      Typical values range from ~100 eV at the edge to 1-20 keV in the core
      depending on heating power and confinement regime. Related to
      electron_density via the electron pressure $p_e = n_e T_e$.
    unit: eV
    kind: scalar
    tags: [core_profiles, equilibrium, transport]
    fields:
      physical_base: temperature
      subject: electron
    reason: >
      Canonical physics quantity. Rich documentation with LaTeX notation,
      typical values, diagnostic context, and cross-references. Perfect
      grammar decomposition with subject + physical_base. Full compliance
      with composition instructions — no anti-patterns, correct unit source.

  - name: safety_factor
    tier: outstanding
    expected_score: 110
    description: "Magnetohydrodynamic safety factor profile."
    documentation: >
      The safety factor $q = \frac{d\Phi}{d\psi}$ measures the ratio of
      toroidal to poloidal magnetic flux, quantifying field line winding.
      Values $q > 1$ everywhere ensure MHD stability against internal kink
      modes. The edge safety factor $q_{95}$ is a key operational parameter;
      typical range is 2.5-5 for standard H-mode operation. Related to
      plasma_current via $q \propto B_T / I_p$.
    unit: null
    kind: scalar
    tags: [equilibrium, mhd]
    fields:
      physical_base: safety_factor
    reason: >
      Fundamental equilibrium quantity with mathematical definition,
      stability context, typical operating ranges, and cross-references
      to related quantities. Standalone physical_base — no qualification
      needed. Strong compliance — IDS-agnostic naming, concept identity
      preserved.

  - name: toroidal_component_of_magnetic_field_at_magnetic_axis
    tier: outstanding
    expected_score: 108
    description: "Toroidal magnetic field at the magnetic axis."
    documentation: >
      The toroidal component of the magnetic field $B_\phi$ evaluated at the
      magnetic axis $(R_0, Z_0)$. This is a primary machine parameter that
      determines cyclotron resonance locations and plasma beta. Produced by
      the toroidal field coil system. Typical values: 1.4 T (TCV), 2.6 T
      (ASDEX Upgrade), 5.3 T (ITER). Sign convention follows COCOS;
      positive $B_\phi$ corresponds to counter-clockwise toroidal field
      when viewed from above.
    unit: T
    kind: scalar
    tags: [equilibrium, magnetics]
    fields:
      physical_base: magnetic_field
      component: toroidal
      position: magnetic_axis
    reason: >
      Multi-segment grammar (component + physical_base + position) correctly
      composed. Documentation includes LaTeX, machine-specific typical values,
      COCOS sign convention, and physical significance. Excellent compliance
      with all composition instructions.

  - name: elongation_at_plasma_boundary
    tier: outstanding
    expected_score: 106
    description: "Plasma elongation at the last closed flux surface."
    documentation: >
      Elongation $\kappa = b/a$ is the ratio of plasma half-height to
      half-width at the last closed flux surface. Higher elongation increases
      plasma volume and achievable beta limit ($\beta_N \propto \kappa$) but
      requires active vertical stabilization. Typical range: 1.0 (circular)
      to 1.8 (strongly shaped). Measured from equilibrium reconstruction
      (EFIT, LIUQE). Related to triangularity and plasma_current via the
      Troyon limit.
    unit: null
    kind: scalar
    tags: [equilibrium]
    fields:
      physical_base: elongation
      position: plasma_boundary
    reason: >
      Correct grammar with position qualifier on plasma_boundary. Rich docs
      covering definition, stability implications, typical ranges, and
      measurement method. Strong compliance — no anti-patterns, proper
      unit handling.

  # ===================================================================
  # GOOD tier (72-101): Correct grammar, adequate documentation
  # ===================================================================

  - name: electron_density
    tier: good
    expected_score: 88
    description: "Electron number density profile."
    documentation: >
      Electron density $n_e$ profile representing the number of electrons
      per unit volume. Measured by interferometry, Thomson scattering, and
      reflectometry. Typical core values 1-10 × 10^19 m^-3.
    unit: m^-3
    kind: scalar
    tags: [core_profiles]
    fields:
      physical_base: density
      subject: electron
    reason: >
      Correct grammar and adequate documentation with LaTeX and typical
      values, but lacks cross-references to related quantities and detailed
      physics context. Good compliance — follows all composition rules.

  - name: ion_pressure
    tier: good
    expected_score: 83
    description: "Thermal pressure of the ion population."
    documentation: >
      Ion thermal pressure $p_i = n_i T_i$ computed from ion density and
      temperature profiles. Contributes to total plasma pressure and
      determines the plasma beta.
    unit: Pa
    kind: scalar
    tags: [core_profiles, transport]
    fields:
      physical_base: pressure
      subject: ion
    reason: >
      Correct grammar with subject + physical_base. Documentation includes
      the governing equation but is relatively short, missing typical values
      and measurement context. Good compliance with composition rules.

  - name: ion_temperature
    tier: good
    expected_score: 80
    description: "Temperature of the ion population."
    documentation: >
      Ion temperature $T_i$ represents the thermal energy of the main ion
      species. Measured by charge exchange recombination spectroscopy (CXRS).
      Key parameter for fusion reactivity.
    unit: eV
    kind: scalar
    tags: [core_profiles, transport]
    fields:
      physical_base: temperature
      subject: ion
    reason: >
      Valid grammar, correct unit. Documentation mentions measurement
      technique but is thin — no typical values, no cross-references.
      Good compliance — unit from DD, no anti-patterns.

  - name: centroid_at_plasma_boundary
    tier: good
    expected_score: 78
    description: "Centroid position of the plasma boundary shape."
    documentation: >
      Geometric centroid of the last closed flux surface boundary,
      representing the average R,Z position of the plasma cross-section.
      Useful for shape control and equilibrium reconstruction.
    unit: m
    kind: vector
    tags: [equilibrium]
    fields:
      geometric_base: centroid
      position: plasma_boundary
    reason: >
      Correct geometric_base grammar with position qualifier. Documentation
      is adequate but lacks LaTeX, typical values, and references. Good
      compliance with naming conventions.

  # ===================================================================
  # ADEQUATE tier (48-71): Correct grammar, thin documentation
  # ===================================================================

  - name: resistivity_due_to_neoclassical
    tier: adequate
    expected_score: 65
    description: "Neoclassical plasma resistivity."
    documentation: >
      Plasma resistivity arising from neoclassical transport effects
      including trapped particle corrections.
    unit: ohm.m
    kind: scalar
    tags: [transport]
    fields:
      physical_base: resistivity
      process: neoclassical
    reason: >
      Valid grammar with process qualifier. Documentation is minimal — just
      a single sentence with no equations, no typical values, no diagnostic
      context. Adequate compliance — no anti-patterns but thin overall.

  - name: extent_of_poloidal_magnetic_field_probe
    tier: adequate
    expected_score: 60
    description: "Physical extent of a poloidal field probe."
    documentation: >
      Geometric extent (size) of a poloidal magnetic field probe sensor
      element.
    unit: m
    kind: scalar
    tags: [magnetics]
    fields:
      geometric_base: extent
      object: poloidal_magnetic_field_probe
    reason: >
      Valid geometric_base + object grammar. Documentation is just one
      sentence paraphrasing the name. No measurement context. Adequate
      compliance — follows rules but lacks depth.

  - name: electron_collisionality
    tier: adequate
    expected_score: 56
    description: "Electron collisionality parameter."
    documentation: >
      Dimensionless electron collisionality. Important for transport regime
      classification.
    unit: null
    kind: scalar
    tags: [core_profiles, transport]
    fields:
      physical_base: collisionality
      subject: electron
    reason: >
      Correct grammar (subject + physical_base). Documentation is a terse
      two-sentence summary with no equations or typical values. Adequate
      compliance — no violations but minimal effort.

  - name: poloidal_component_of_beta
    tier: adequate
    expected_score: 53
    description: "Poloidal beta."
    documentation: >
      Ratio of plasma pressure to poloidal magnetic field pressure.
    unit: null
    kind: scalar
    tags: [equilibrium]
    fields:
      physical_base: beta
      component: poloidal
    reason: >
      Valid component + physical_base grammar. Documentation is a single
      sentence — essentially a dictionary definition with no depth. Adequate
      compliance — follows basic rules.

  # === Prompt compliance calibration entries ===

  - name: electron_temperature_profile
    tier: adequate
    expected_score: 58
    description: "Electron temperature profile."
    documentation: >
      Electron temperature profile data. Unit: eV.
    unit: eV
    kind: scalar
    tags: [core_profiles]
    fields:
      physical_base: temperature_profile
      subject: electron
    reason: >
      Anti-pattern violation: "_profile" suffix in physical_base — the grammar
      does not encode dimensionality in the name. Documentation mentions unit
      (unit should come from DD, not docs). Grammar otherwise valid. Compliance
      score penalized heavily for anti-pattern.

  - name: equilibrium_safety_factor
    tier: adequate
    expected_score: 55
    description: "Safety factor from equilibrium IDS."
    documentation: >
      Safety factor q from the equilibrium reconstruction.
    unit: null
    kind: scalar
    tags: [equilibrium]
    fields:
      physical_base: equilibrium_safety_factor
    reason: >
      Anti-pattern violation: IDS name "equilibrium" appears in the standard
      name. Standard names are IDS-agnostic — the same concept should get
      the same name regardless of which IDS it appears in. Description also
      mentions IDS. Compliance score penalized.

  # ===================================================================
  # POOR tier (0-47): Grammar valid but naming questionable or docs empty
  # ===================================================================

  - name: banana_regime
    tier: poor
    expected_score: 23
    description: "Banana orbit regime."
    documentation: ""
    unit: null
    kind: metadata
    tags: []
    fields:
      physical_base: banana_regime
    reason: >
      Empty documentation. The name describes a transport regime, not a
      measurable quantity — better suited as metadata or an identifier
      value rather than a standard name. No tags assigned. Poor compliance
      — not a meaningful physics quantity for standardization.

  - name: signal_value
    tier: poor
    expected_score: 17
    description: "A signal value."
    documentation: "Generic signal value."
    unit: null
    kind: scalar
    tags: []
    fields:
      physical_base: signal_value
    reason: >
      Overly generic name that conveys no physics meaning. Description
      is circular ("a signal value"). No unit, no tags. Would apply to
      almost any measurement — violates the specificity principle. Very
      poor compliance — "signal_value" is explicitly listed as an
      anti-pattern.

  - name: data
    tier: poor
    expected_score: 5
    description: "Data."
    documentation: ""
    unit: null
    kind: scalar
    tags: []
    fields:
      physical_base: data
    reason: >
      Maximally vague name with no physics content whatsoever. Empty
      documentation, no unit, no tags. Represents everything a standard
      name should NOT be — completely uninformative. Zero compliance with
      any composition instruction.

  - name: ip
    tier: poor
    expected_score: 25
    description: "Plasma current."
    documentation: ""
    unit: A
    kind: scalar
    tags: []
    fields:
      physical_base: ip
    reason: >
      Uses facility-specific abbreviation "ip" as physical_base instead of
      the descriptive "plasma_current". Empty documentation. No tags.
      Violates concept identity principle — this would create a different
      name from the proper "plasma_current" for the same quantity.
