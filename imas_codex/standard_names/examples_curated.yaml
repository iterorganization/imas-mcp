    a plasma. This specific measure excludes non-thermal contributions such as fast ions generated via auxiliary heating or
    high-energy fusion reaction products.
  documentation: Thermal ion density represents the number of ions per unit volume with velocities concentrated near the bulk
    distribution, typically characterized by a Maxwellian velocity distribution. It is defined by the integral $n_i = \int
    f_i(\mathbf{v}) d^3\mathbf{v}$, where $f_i(\mathbf{v})$ is the thermal ion velocity distribution function. In magnetic
    confinement fusion devices, this value is critical for determining the total plasma pressure and the rate of fusion reactions.
    Typical values range from $10^{19}$ to $10^{21}$ particles per cubic meter in tokamaks. Measurement methods include Thomson
    scattering, microwave interferometry, and charge-exchange recombination spectroscopy. Related quantities include [electron_density](name:electron_density)
    and [fast_ion_density](name:fast_ion_density).
