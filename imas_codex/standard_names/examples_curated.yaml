  reviewer_score_name: 1.0
  description: The ion pressure represents the scalar kinetic pressure exerted by the ion species within a plasma. It is defined
    as the isotropic component of the ion pressure tensor and contributes significantly to the total plasma kinetic pressure.
  documentation: Ion pressure represents the average kinetic energy density of the ion population in a plasma. It is defined
    as the isotropic part of the ion pressure tensor, denoted by $P_i$, and is typically related to the ion number density
    $n_i$ and the ion temperature $T_i$ by the equation $P_i = n_i k_B T_i$, where $k_B$ is the Boltzmann constant. In fusion
    devices like tokamaks, typical ion pressures range from several kilopascals to over a megapascal in the core. Measurements
    of ion pressure are commonly derived from charge exchange recombination spectroscopy or via kinetic analysis of ion distribution
    functions obtained from neutral particle analyzers. It is related to other thermodynamic quantities such as [electron_pressure](name:electron_pressure)
    and the total plasma pressure. This value is fundamentally scalar and represents the microscopic momentum transfer of
    ions, independent of directed fluid flow.
