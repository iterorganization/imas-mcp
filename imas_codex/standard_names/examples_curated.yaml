- id: fast_neutral_density
  reviewer_score_name: 0.9375
  description: The fast neutral density represents the number density of neutral particles with kinetic energies significantly
    higher than the ambient thermal population. These particles primarily result from charge-exchange processes or external
    beam injection in plasmas.
  documentation: 'Fast neutral density refers to the population of neutral particles in a plasma that are not in thermal equilibrium
    with the background gas. These neutrals are produced when ions undergo charge-exchange reactions with the background neutral
    gas, adopting the energy and momentum of the ion population. The governing transport can be described by the Boltzmann-like
    kinetic equation for the distribution function $f_n(\mathbf{r}, \mathbf{v}, t)$:


    $$\frac{\partial f_n}{\partial t} + \mathbf{v} \cdot \nabla f_n = S_{cx}(\mathbf{r}, \mathbf{v}, t) - \nu_{loss}f_n$$


    where $S_{cx}$ represents the source term from charge-exchange collisions. In magnetic confinement fusion devices, typical
    values for fast neutral density can reach $10^{14}$ to $10^{17}$ particles per cubic meter depending on neutral beam injection
    power and plasma density. Measurement methods include Charge Exchange Recombination Spectroscopy (CXRS) and Neutral Particle
    Analyzers (NPA). Related standard names include [neutral_density](name:neutral_density) for the bulk thermal population.'
  kind: scalar
  unit: m^-3
  physics_domain:
  - transport
  reviewer_comments_name: 'The name ''fast_neutral_density'' correctly decomposes into subject=''fast_neutral'' and physical_base=''density''.
