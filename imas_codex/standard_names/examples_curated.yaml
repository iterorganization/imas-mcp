- id: co_passing_fast_particle_pressure
  reviewer_score_name: 0.9375
  description: Pressure contribution from fast (suprathermal) particles whose parallel velocity is co-directed with the plasma
    current, constituting the co-passing subset of the fast-ion distribution.
  documentation: 'The co-passing fast particle pressure $p_{\mathrm{fast,co}}$ is defined as the second velocity-space moment
    of the fast-particle distribution function $f_{\mathrm{fast}}$ restricted to particles with $v_\parallel > 0$ (co-current)
    and $|v_\parallel| > |v_\perp|$ (passing orbit topology): $$p_{\mathrm{fast,co}} = \frac{m}{3} \int_{\mathrm{co\text{-}passing}}
    v^2 \, f_{\mathrm{fast}}(\mathbf{v}) \, d^3v,$$ where $m$ is the fast-particle mass, $v$ is the speed, and the integration
    domain covers co-passing orbits in velocity space. This quantity is relevant for neutral-beam-driven plasmas where anisotropic
    fast-ion populations modify MHD equilibrium and stability; co-passing fractions dominate in tangentially injected NBI
    scenarios. In large tokamaks, $p_{\mathrm{fast,co}}$ can reach 10–100 kPa in the core, representing a significant fraction
    of the total plasma beta. The partitioning into co-passing and counter-passing components is essential for assessing beam-driven
    current, toroidal rotation drive, and fishbone/TAE stability thresholds. Computed from Monte Carlo orbit-following codes
    (e.g., NUBEAM, ASCOT) or from analytic slowing-down models with pitch-angle scattering. The total fast-particle pressure
    is the sum of [co_passing_fast_particle_pressure](name:co_passing_fast_particle_pressure), counter-passing, and trapped
    contributions, linking directly to the anisotropic pressure tensor used in extended MHD equilibrium solvers.'
