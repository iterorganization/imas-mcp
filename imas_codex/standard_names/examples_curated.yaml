- id: internal_inductance
  reviewer_score_name: 1.0
  description: Internal inductance represents the normalized internal magnetic energy associated with the plasma current profile
    in toroidal confinement devices. It characterizes the peakedness of the current distribution within the plasma cross-section.
  documentation: 'In magnetic confinement fusion, the internal inductance $l_i$ measures the energy stored in the poloidal
    magnetic field within the plasma volume relative to the magnetic energy that would result from a uniform current distribution.
    It is defined as the ratio of the volume-integrated magnetic energy density to the surface magnetic field contribution:
    $$l_i = \frac{2}{\mu_0 I^2 R_0} \int \frac{B_p^2}{2\mu_0} dV$$ where $B_p$ is the poloidal magnetic field, $I$ is the
    plasma current, and $R_0$ is the major radius. Typical values in tokamak plasmas range from 0.5 to 1.5, where lower values
    correspond to broader current profiles and higher values indicate peaked current profiles. This parameter is critical
    for assessing MHD stability, such as the onset of sawteeth or disruptions. Internal inductance is commonly determined
    through magnetic equilibrium reconstruction codes like EFIT, which utilize external magnetic diagnostics such as flux
    loops and Rogowski coils. It is closely related to [plasma_current](name:plasma_current) and [poloidal_magnetic_field](name:poloidal_magnetic_field).'
  kind: scalar
  unit: '1'
  physics_domain:
  - transport
  reviewer_comments_name: '''internal_inductance'' is a well-established, unambiguous term in fusion plasma physics referring
    to the normalized internal inductance (li). It parses correctly as a standalone physical_base, is semantically accurate
    for a dimensionless scalar, follows all naming conventions, and requires no additional segments for completeness.'
  reviewer_verdict_name: accept
- id: effective_charge
  reviewer_score_name: 1.0
  description: The effective charge is a dimensionless parameter that characterizes the average charge state of a plasma,
    weighted by the square of the ion charges. It serves as a measure of the cumulative effect of ion-electron Coulomb collisions
    on plasma transport properties such as resistivity and bremsstrahlung emission.
  documentation: 'The effective charge, denoted by $Z_{\mathrm{eff}}$, accounts for the presence of multiple ion species in
    a plasma and their respective contributions to particle transport and radiation processes. It is defined by the relation:


    $$Z_{\mathrm{eff}} = \frac{\sum_{i} n_i Z_i^2}{n_e}$$


    where $n_i$ is the number density of ion species $i$ with charge state $Z_i$, and $n_e$ is the electron density. In a
    pure hydrogen plasma, $Z_{\mathrm{eff}}$ is 1, while higher values indicate the presence of impurities or multiple-ion
    species that significantly enhance electron-ion scattering rates. Typical values in laboratory fusion devices for hydrogenic
    plasmas range between 1 and 3, depending on the impurity concentration. This quantity is commonly measured via visible
    bremsstrahlung spectroscopy, where the intensity of the emission is proportional to the product $n_e^2 Z_{\mathrm{eff}}$.
    It is a critical parameter for calculating the neoclassical resistivity, which is often expressed as $\eta \propto Z_{\mathrm{eff}}
    T_e^{-3/2}$. Related standard names include [electron_density](name:electron_density) and [ion_number_density](name:ion_number_density).'
  kind: scalar
  unit: '1'
  physics_domain:
  - transport
  reviewer_comments_name: '''effective_charge'' is a concise, unambiguous standard name for the plasma effective charge (Z_eff).
    It parses correctly as a single physical_base compound, is semantically precise, follows all naming conventions, and requires
    no additional segments for completeness. Unit and kind are correct.'
  reviewer_verdict_name: accept
