- id: toroidal_orbit_frequency
  reviewer_score_name: 0.7875
  description: Angular frequency at which a charged particle orbit completes one full toroidal transit around the torus.
  documentation: The toroidal orbit frequency $\omega_\phi$ quantifies how rapidly a confined particle's guiding center precesses
    in the toroidal direction. For a trapped particle executing banana orbits, the toroidal precession frequency is given
    by $\omega_\phi = \frac{q v_d}{r}$, where $q$ is the [safety_factor](name:safety_factor), $v_d$ is the magnetic drift
    speed, and $r$ is the minor radius of the flux surface. For passing particles, $\omega_\phi \approx v_\parallel / (q R)$,
    where $v_\parallel$ is the parallel velocity component and $R$ is the major radius. This frequency is central to neoclassical
    transport theory and resonant wave-particle interaction analysis; bounce-averaged kinetic codes (e.g., HAGIS, ORBIT) compute
    $\omega_\phi$ as part of the constants of motion $(E, \mu, P_\phi)$ characterization. In tokamak fusion plasmas, energetic
    alpha particles with 3.5 MeV birth energy exhibit toroidal orbit frequencies of order $10^4$–$10^5$ rad/s, while thermal
    ions have values of order $10^3$–$10^4$ rad/s depending on plasma current and field geometry. Resonance between $\omega_\phi$
    and the frequency of toroidal Alfvén eigenmodes can drive energetic-particle-driven instabilities. The toroidal orbit
    frequency is closely related to the [toroidal_component_of_rotation_frequency_of_plasma](name:toroidal_component_of_rotation_frequency_of_plasma)
    of the bulk plasma, since departures between the single-particle orbit frequency and the bulk rotation indicate finite
    orbit-width effects important for momentum transport.
