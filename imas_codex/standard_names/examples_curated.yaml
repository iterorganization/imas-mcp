- id: diamagnetic_energy
  reviewer_score_name: 0.9375
  description: Plasma thermal energy inferred from the diamagnetic effect, quantifying the volume-integrated perpendicular
    pressure contribution to the equilibrium.
  documentation: The diamagnetic energy $W_\mathrm{dia}$ represents the total thermal energy content of the plasma as inferred
    from diamagnetic flux measurements. It is defined as $$W_\mathrm{dia} = \frac{3}{2} \int p_\perp \, dV$$ where $p_\perp$
    is the perpendicular plasma pressure and $V$ is the plasma volume. In an isotropic plasma ($p_\perp = p_\parallel$), $W_\mathrm{dia}$
    equals the total stored thermal energy $W_\mathrm{th}$; in anisotropic conditions (e.g., with significant neutral beam
    or ICRH fast-ion populations), it deviates from the MHD stored energy obtained from equilibrium reconstruction. The diamagnetic
    energy is measured using diamagnetic loops — flux loops positioned to detect the change in toroidal flux caused by the
    plasma's diamagnetic and paramagnetic currents relative to the vacuum field. Values range from 0.1–1 MJ in medium-size
    tokamaks (ASDEX Upgrade, DIII-D) and are expected to reach 300–400 MJ in ITER burning-plasma scenarios. The measurement
    is sensitive to eddy currents in surrounding conducting structures, requiring careful compensation. The ratio of $W_\mathrm{dia}$
    to the volume-averaged toroidal magnetic-field energy defines the volume-averaged [poloidal beta](name:poloidal_beta)
    $\beta_p$. Differences between $W_\mathrm{dia}$ and the MHD stored energy from equilibrium reconstruction indicate pressure
    anisotropy driven by fast-ion populations. The perpendicular and parallel pressure profiles underlying this integral connect
    to [electron_pressure](name:electron_pressure) and [ion_pressure](name:ion_pressure) through species summation.
  kind: scalar
  unit: J
  physics_domain:
  - transport
