- id: normalized_toroidal_flux_coordinate
  reviewer_score_name: 1.0
  description: The normalized toroidal flux coordinate is a dimensionless radial coordinate used to label magnetic surfaces
    in toroidal plasma confinement devices. It is typically defined to be zero at the magnetic axis and unity at the plasma
    boundary or the last closed magnetic surface.
  documentation: The normalized toroidal flux coordinate, often denoted as $\rho_{tor}$ or $s$, is defined as the square root
    of the normalized toroidal magnetic flux. It is calculated using the relation $\rho_{tor} = \sqrt{\Phi / \Phi_{edge}}$,
    where $\Phi$ is the toroidal magnetic flux enclosed by a magnetic surface and $\Phi_{edge}$ is the flux at the plasma
    boundary. This coordinate provides a monotonic radial mapping suitable for 1D transport modeling and equilibrium analysis
    in tokamaks and stellarators. Values range from 0 at the magnetic axis to 1 at the specified plasma edge. It is closely
    related to [toroidal_flux](name:toroidal_flux) and is frequently used to normalize profile data such as [electron_temperature](name:electron_temperature)
    or [ion_density](name:ion_density). Measurement is typically derived from magnetic equilibrium reconstructions using codes
    like EFIT, which invert external magnetic sensor data and pressure profiles to determine the flux surface geometry.
  kind: scalar
  unit: '1'
  physics_domain:
  - transport
  reviewer_comments_name: This is a textbook geometric_base entry from the restricted vocabulary. It parses correctly as a
    standalone geometric_base with no additional segments needed. Semantically it precisely describes the normalized toroidal
    flux coordinate used ubiquitously in tokamak physics. Convention adherence is perfect, and the entry is complete for a
    dimensionless scalar coordinate.
  reviewer_verdict_name: accept
  grammar_decomposition:
    coordinate: normalized_toroidal
- id: ion_temperature
  reviewer_score_name: 1.0
  description: The mean kinetic energy of the bulk ion population in a plasma, representing the average thermal state of the
    ions. It is expressed in units of energy per particle, equivalent to the product of Boltzmann constant and the ion temperature.
  documentation: The ion thermal energy represents the average kinetic energy associated with the random motion of individual
    ions within a plasma population. Under the assumption of a Maxwellian velocity distribution, this energy is related to
    the ion temperature $T_i$ by the expression $E_i = \frac{3}{2} k_B T_i$, where $k_B$ is the Boltzmann constant. In non-equilibrium
    or fusion-relevant plasmas, this value provides a fundamental measure of the collisionless thermal state of the ion species.
    Typical values range from 1 eV to 100 eV in the edge plasma and scrape-off layer, and can reach tens of keV in the core
    of magnetic confinement devices. Measurement techniques include active charge exchange recombination spectroscopy (CXRS),
    Doppler broadening of impurity emission lines, and retarding field analyzers (RFA) in the edge region. Related quantities
    include [ion_temperature](ion_temperature) and [electron_thermal_energy](electron_thermal_energy).
  kind: scalar
  unit: eV
  physics_domain:
  - transport
  - edge_plasma_physics
  reviewer_comments_name: This is a textbook standard name in fusion plasma physics. Grammar is valid (subject=ion, physical_base=temperature).
    Semantically precise and unambiguous. Follows all naming conventions. Complete for a scalar thermal quantity.
  reviewer_verdict_name: accept
  grammar_decomposition:
    subject: ion
- id: plasma_current
  reviewer_score_name: 1.0
  description: Total toroidal current flowing within the plasma column. It is the superposition of current driven by inductive
    electric fields, the bootstrap effect due to pressure gradients, and non-inductive auxiliary current drive.
  documentation: The plasma current, denoted as $I_p$, represents the integrated toroidal current density flowing through
    the plasma cross-section. It is defined as $I_p = \int J_{\phi} dA$, where $J_{\phi}$ is the toroidal current density.
    This value is a fundamental global quantity in tokamak operation, influencing the magnetic equilibrium, energy confinement,
    and plasma stability. The total current is composed of 1) the inductive (ohmic) component, 2) the bootstrap current arising
    from neoclassical transport, and 3) auxiliary non-inductive components generated by neutral beam injection (NBI) or radio-frequency
    (RF) waves. By convention, $I_p$ is defined as positive for an anti-clockwise direction when viewed from above the torus.
    Typical values range from kiloamperes (kA) in small experimental devices to mega-amperes (MA) in large-scale reactors.
  kind: scalar
  unit: A
  physics_domain:
  - transport
  reviewer_comments_name: This is a textbook standard name in fusion plasma physics. It parses correctly as a single physical_base
    compound, semantically maps perfectly to the total plasma current (measured in amperes), follows all naming conventions,
    and is complete without needing additional segments.
  reviewer_verdict_name: accept
- id: ion_density
  reviewer_score_name: 1.0
  description: This quantity represents the number of ions per unit volume within a plasma or fluid medium. It is a fundamental
    scalar field used to characterize the local concentration of charged particles in transport processes.
  documentation: 'The ion number density, denoted by $n_i$, is defined as the integral of the velocity distribution function
    $f_i(\mathbf{v})$ over all velocity space: $n_i = \int f_i(\mathbf{v}) d^3v$. It describes the concentration of positive
    or negative ions present in a given region of space regardless of their specific chemical species. In typical laboratory
    plasmas, $n_i$ may range from $10^{16}$ to $10^{22}$ per cubic meter, while space plasmas exhibit much lower concentrations.
    Measurement methods include Langmuir probes, laser-induced fluorescence, or mass spectrometry. This quantity is closely
    related to [electron_number_density](name:electron_number_density) and is a primary input for calculating the plasma frequency
    and Debye length.'
  kind: scalar
  unit: m^-3
  physics_domain:
  - transport
  reviewer_comments_name: 'Grammar: parses correctly with subject=ion, physical_base=density; no decomposition defects. Semantic:
    accurately describes ion number density consistent with m^-3 units. Convention: canonical snake_case ordering, no ambiguity.
    Completeness: all necessary segments present for a scalar ion density quantity.'
  reviewer_verdict_name: accept
