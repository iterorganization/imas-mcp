- id: co_passing_fast_particle_density
  reviewer_score_name: 0.9375
  description: Number density of fast (suprathermal) particles whose parallel velocity is co-directed with the plasma current,
    executing passing (non-trapped) orbits.
  documentation: The co-passing fast particle density $n_{\mathrm{fast,co}}$ counts the number of energetic ions per unit
    volume that travel along field lines in the same direction as the plasma current and whose pitch-angle parameter $\lambda
    = v_\parallel / v$ places them outside the trapped-particle region defined by the local mirror ratio. These particles
    are generated primarily by tangential neutral beam injection (NBI) aimed co-current and, to a lesser extent, by ion cyclotron
    resonance heating (ICRH) with appropriate wave-particle resonance geometry. The co-passing population drives significant
    non-inductive current and contributes to the bootstrap and beam-driven current profile; it also produces anisotropic pressure
    that enters the Grad–Shafranov equilibrium through $p_\parallel \neq p_\perp$. In tokamak plasmas with co-directed NBI,
    $n_{\mathrm{fast,co}}$ can reach $10^{17}$–$10^{18}\;\mathrm{m^{-3}}$ in the core, representing 1–10% of the total ion
    density depending on beam power and plasma parameters. The quantity is computed from the fast-ion distribution function
    $f_{\mathrm{fast}}(E, \lambda, \psi)$ by integrating over energy $E$ and restricting the pitch-angle domain to $\lambda
    > \lambda_{\mathrm{tp}}(\psi)$, where $\lambda_{\mathrm{tp}}$ is the trapped–passing boundary. Diagnostics sensitive to
    $n_{\mathrm{fast,co}}$ include fast-ion $D_\alpha$ (FIDA) spectroscopy, neutral particle analyzers (NPA), and neutron
    cameras with sightline weighting that preferentially samples co-going orbits. The complementary population is [counter_passing_fast_particle_density](name:counter_passing_fast_particle_density),
    while [trapped_fast_particle_density](name:trapped_fast_particle_density) accounts for banana-orbit ions. The total fast-ion
    content satisfies $n_{\mathrm{fast}} = n_{\mathrm{fast,co}} + n_{\mathrm{fast,ctr}} + n_{\mathrm{fast,trapped}}$.
  kind: scalar
  unit: m^-3
  physics_domain:
  - transport
  reviewer_comments_name: The name is grammatically valid with 'co_passing_fast_particle' being a recognized subject in the
    closed vocabulary. Semantically it accurately represents the number density of co-passing fast particles. Convention adherence
