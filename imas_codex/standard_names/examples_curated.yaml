- id: thermal_neutral_density
  reviewer_score_name: 1.0
  description: The thermal neutral density is the number density of neutral particles with kinetic energy distributions dictated
    by the local thermal equilibrium temperature. This defines the population of neutral species coupled to the background
    thermal environment, distinct from non-thermal or high-energy beam populations.
  documentation: Thermal neutral density refers to the number density of neutral atoms or molecules whose velocity distribution
    follows the Maxwell-Boltzmann distribution at the local thermal temperature $T$. It is defined as $n = \int f(v) dv$,
    where $f(v)$ is the Maxwellian velocity distribution function. This quantity is crucial for understanding collision-dominated
    processes such as charge exchange, elastic scattering, and thermalization rates in plasma physics and atmospheric sciences.
    Typical values in the terrestrial thermosphere range from $10^{13}$ to $10^{19}$ particles per unit volume, while in fusion
    plasmas, this density is often several orders of magnitude lower. It is commonly measured using neutral particle analyzers,
    laser-induced fluorescence, or mass spectrometry. This quantity is related to [neutral_density](name:neutral_density)
    and [plasma_density](name:plasma_density), providing context on the partitioning between charged and neutral states in
    a gas or plasma. The determination of this value assumes the neutral gas has achieved thermal equilibrium with the surrounding
    medium.
  kind: scalar
