  - name: electron_density
    tier: good
    expected_score: 92
    description: "Total electron number density including thermal and non-thermal populations."
    documentation: >-
      Electron number density $n_e$ representing the volumetric concentration of electrons (thermal plus non-thermal) in the plasma. Fundamental plasma parameter determining conductivity, collisionality, and fusion reactivity. In fusion plasmas, electron density typically ranges from $10^{18}$ m$^{-3}$ in the edge region to $10^{20}$ m$^{-3}$ in the plasma core.

      Governing equation:
      $$p_e = n_e k_B T_e$$

      where $p_e$ is electron pressure in Pa, $k_B = 1.381 \times 10^{-23}$ J/K is Boltzmann's constant, and $T_e$ is electron temperature in K.

      Physical significance: Electron density determines plasma conductivity through $\sigma = n_e e^2 \tau / m_e$ and affects [plasma_current](#plasma_current) requirements. Higher density improves confinement through increased [collisionality](#collisionality) but may reduce [energy_confinement_time](#energy_confinement_time). Density gradients drive [electron_heat_flux](#electron_heat_flux) and affect [plasma_current_density](#plasma_current_density) profiles. Related to [thermal_electron_density](#thermal_electron_density) and [electron_pressure](#electron_pressure).

      Measurement/Calculation methods: [Interferometry](#interferometry) measures line-integrated electron density through phase shift of laser beams. [Reflectometry](#reflectometry) determines density profiles from microwave reflection. [Thomson_scattering](#thomson_scattering) provides local density measurements with high spatial resolution. Interferometry systems use multiple chords for 2D reconstruction. Density measurements are essential for [electron_pressure](#electron_pressure) calculations and [magnetic_equilibrium](#magnetic_equilibrium) reconstruction.

      Typical values: Edge region: $10^{18}$-$10^{19}$ m$^{-3}$, core region: $10^{19}$-$10^{20}$ m$^{-3}$ in high-performance tokamak plasmas. ITER: $10^{19}$-$2 \times 10^{20}$ m$^{-3}$. JET: $5 \times 10^{18}$-$1.5 \times 10^{20}$ m$^{-3}$. DIII-D: $8 \times 10^{18}$-$1.2 \times 10^{20}$ m$^{-3}$.

      Sign convention: Positive density indicates particle concentration, following standard plasma physics conventions.
    unit: m^-3
    kind: scalar
    tags: [measured, spatial-profile]
    fields:
      subject: electron
      physical_base: density
    reason: >-
      WEST catalog entry. Strong documentation (2092 chars) with governing equation, conductivity formula, measurement methods (interferometry, reflectometry, Thomson scattering), and machine-specific typical values (ITER, JET, DIII-D). Slightly below outstanding due to less polished structure and some repetitive phrasing. Subject + physical_base grammar.

  - name: minor_radius_of_flux_surface
    tier: good
    expected_score: 88
    description: "Geometric minor radius of flux surfaces."
    documentation: >-
      Geometric minor radius $a_{geo}(\rho) = (R_{outboard} - R_{inboard})/2$ measuring half-width of flux surface at midplane. This fundamental geometric parameter characterizes the size of flux surfaces in tokamak equilibria.

      Governing equation:
      $$a_{geo}(\rho) = \frac{R_{outboard}(\rho) - R_{inboard}(\rho)}{2}$$

      where $R_{outboard}$ and $R_{inboard}$ are the major radius coordinates at the outboard and inboard midplane intersections of the flux surface.

      Physical significance: This quantity increases monotonically from 0 at the magnetic axis to the boundary minor radius $a$ at the plasma edge. Used for normalized radial coordinate $\rho = a_{geo}/a$ and profile parameterization. Differs from flux-based coordinates by geometry effects and is essential for [tokamak_scenario](#tokamak_scenario) design and [plasma_performance](#plasma_performance) analysis.

      The geometric minor radius affects [safety_factor](#safety_factor) through $q \propto B_{tor} R_0 / B_{pol} a$ and influences [mhd_stability](#mhd_stability) through aspect ratio effects. Larger minor radius improves confinement through increased plasma volume but requires stronger magnetic fields for stable operation. Critical for [plasma_beta](#plasma_beta) limits through $\beta \propto a^2 B^2 / R_0$.

      For shaped plasmas with elongation $\kappa$ and triangularity $\delta$, the geometric minor radius represents the equivalent circular radius that would give the same cross-sectional area. The actual flux surface shape affects transport through geometric factors in [neoclassical_transport_coefficients](#neoclassical_transport_coefficients).

      Measurement/Calculation methods: Computed from [magnetic_equilibrium](#magnetic_equilibrium) reconstruction using flux surface geometry. Available directly from IMAS equilibrium IDS as geometric quantity. Used in [tokamak_scenario](#tokamak_scenario) analysis and [plasma_performance](#plasma_performance) optimization.

      Typical values: ITER: $a_{geo} \approx 0.1-2.0$ m across plasma radius. JET: $0.05-1.0$ m. DIII-D: $0.03-0.67$ m. Values increase from core to edge following flux surface expansion. Boundary value typically 2.0 m for ITER, 1.0 m for JET, 0.67 m for DIII-D.

      Sign convention: Positive definite quantity representing geometric half-width of flux surface at midplane.
    unit: m
    kind: scalar
    tags: [cylindrical-coordinates, spatial-profile]
    fields:
      physical_base: minor_radius
      geometry: flux_surface
    reason: >-
      WEST catalog entry. Thorough geometric documentation (2303 chars) with governing equation, safety factor relation, shaped plasma considerations, and machine-specific typical values. Physical_base + geometry grammar. Below outstanding due to tangential content and missing measurement methods section header.

  - name: rogowski_coil_current
    tier: good
    expected_score: 85
    description: "Plasma current measured by Rogowski coil."
    documentation: >-
      Plasma current $I_p$ measured by Rogowski coil diagnostic, representing the total toroidal current flowing in the plasma. Rogowski coils are toroidal devices that measure the magnetic field produced by plasma current through electromagnetic induction.

      $$I_p = \frac{1}{\mu_0 N A} \int V_{\text{coil}} \, dt$$

      where $V_{\text{coil}}$ is the induced voltage in the coil, $N$ is the number of turns, $A$ is the coil cross-sectional area, and $\mu_0$ is the permeability of free space.

      Physical significance:

      Plasma current determines [magnetic_field](#magnetic_field) strength through Ampère's law and affects [safety_factor](#safety_factor) profiles. Current profile shape impacts [mhd_stability](#mhd_stability) and confinement quality. Bootstrap current and external drive modify the current distribution. See [plasma_current_density](#plasma_current_density) for spatial profiles and [toroidal_magnetic_field](#toroidal_magnetic_field) for field calculations.

      Measurement relation:

      Rogowski coils measure the line integral of magnetic field around the plasma:

      $$\oint \mathbf{B} \cdot d\mathbf{l} = \mu_0 I_{\text{enc}}$$

      where $I_{\text{enc}}$ is the enclosed current. The coil integrates this magnetic field to give total plasma current.

      Measurement methods:

      Rogowski coils consist of multiple turns wound on a toroidal former surrounding the plasma. Induced voltage is integrated to give current measurements. Calibration uses known current sources and magnetic field calculations. Coil positioning affects measurement accuracy and geometric factors. Integration electronics convert voltage to current with proper scaling factors.

      Typical values:

      ITER: 15 MA plasma current capability, typical operating range 2-15 MA. JET: Up to 5 MA, typical 2-4 MA. DIII-D: Up to 2.5 MA, typical 1-2 MA. Current ramp rates typically 0.1-1 MA/s during plasma initiation and current ramp phases.

      Sign convention: Positive current follows the toroidal direction (counter-clockwise when viewed from above), consistent with [plasma_current](#plasma_current) conventions and [magnetic_field](#magnetic_field) right-hand rule.
    unit: A
    kind: scalar
    tags: [global-quantity, measured, time-dependent]
    fields:
      device: rogowski_coil
      physical_base: current
    reason: >-
      WEST catalog entry. Good diagnostic documentation (2122 chars) with measurement equation, Ampere's law relation, coil description, and typical values. Device + physical_base grammar. Below outstanding due to redundant phrasing and less structured documentation flow.

  - name: bolometer_radiated_power
    tier: good
    expected_score: 84
    description: "Bolometer radiated power measurement from plasma emission."
    documentation: >-
      Bolometer radiated power measurement $P_{rad}$ from plasma emission, representing the total radiated power per unit area from plasma. Bolometry provides information about total radiation losses and [plasma_performance](#plasma_performance).

      $$P_{rad} = \int_0^{\infty} \int_0^{4\pi} j_{\nu}(\nu,\theta,\phi) \, d\Omega \, d\nu$$

      where $j_{\nu}$ is spectral emissivity and integration is over all directions and frequencies.

      Physical significance:

      Bolometer radiated power provides information about total radiation losses and [plasma_performance](#plasma_performance). Radiation affects [energy_confinement_time](#energy_confinement_time) and plasma sustainability. Bolometry is essential for [radiation_diagnostics](#radiation_diagnostics) and impurity analysis. See [plasma_performance](#plasma_performance) for performance effects and [energy_confinement_time](#energy_confinement_time) for confinement analysis.

      Measurement relation:

      Radiated power relates to plasma parameters:

      $$P_{rad} = \sum_i n_e n_i Z_i^2 \Lambda_i(T_e)$$

      where $\Lambda_i$ is cooling rate coefficient for species $i$.

      Measurement methods:

      Bolometers use thermal detectors to measure total radiated power from plasma. Multiple chords provide spatial distribution of radiation. Absolute calibration uses known radiation sources. Time-resolved measurements study radiation dynamics. Abel inversion gives radial profiles.

      Typical values:

      ITER: Expected radiated powers of 10-100 MW/m^2 for typical plasma operations. JET: Typical powers 1-10 MW/m^2 for standard operations. DIII-D: Power ranges 0.1-5 MW/m^2 depending on plasma conditions. Measurement precision typically 2-5%.

      Sign convention: Positive radiated power indicates energy loss from plasma per unit area, following standard thermodynamics and energy conservation conventions.
    unit: W.m^-2
    kind: scalar
    tags: [calibrated, local-measurement, measured]
    fields:
      device: bolometer
      physical_base: radiated_power
    reason: >-
      WEST catalog entry. Solid diagnostic documentation (1825 chars) with emissivity integral, cooling rate relation, measurement methods (Abel inversion), and typical values. Device + physical_base grammar. Below outstanding due to circular phrasing in physical significance section.

  - name: poloidal_magnetic_flux
    tier: good
    expected_score: 82
    description: "Poloidal magnetic flux."
    documentation: >-
      Poloidal magnetic flux $\Psi$ threading a surface in the poloidal plane, defined as the integral of [poloidal_magnetic_field](#poloidal_magnetic_field) through a surface:

      $$\Psi = \int \mathbf{B}_p \cdot d\mathbf{A}$$

      where $\mathbf{B}_p$ is poloidal magnetic field in T and $d\mathbf{A}$ is the differential area element in m$^2$.

      Physical context:

      Poloidal flux is a fundamental coordinate for describing tokamak equilibria. Flux surfaces are contours of constant $\Psi$, and the normalized poloidal flux $\Psi_N = (\Psi - \Psi_{\text{axis}}) / (\Psi_{\text{LCFS}} - \Psi_{\text{axis}})$ is used to label flux surfaces from magnetic axis ($\Psi_N = 0$) to [plasma_boundary](#plasma_boundary) ($\Psi_N = 1$).

      Measurement:

      Poloidal flux changes are measured by [flux_loop_voltage](#flux_loop_voltage) via Faraday's law: $V = -d\Psi/dt$.

      Sign convention: Positive when surface normal points upward (positive Z direction).
    unit: Wb
    kind: scalar
    tags: [flux-coordinates, measured]
    fields:
      coordinate: poloidal
      physical_base: magnetic_flux
    reason: >-
      ISN reference entry. Correct physics with integral definition and normalized flux coordinate explanation. However, documentation is notably shorter (927 chars) than other ISN entries, lacking detailed measurement methods, typical values section, and sign convention. Coordinate + physical_base grammar.

  - name: flux_loop_poloidal_magnetic_flux
    tier: good
    expected_score: 78
    description: "Poloidal magnetic flux measured by flux loop diagnostic."
    documentation: >-
      Poloidal magnetic flux threading through a flux loop coil, defined as the surface integral of the poloidal magnetic field:

      $$\psi = \int \mathbf{B}_p \cdot d\mathbf{A}$$

      where the integration is over the area enclosed by the loop.

      Sign convention: Positive flux when the normal vector to the loop area points downward (negative $Z$ direction), following right-hand rule with respect to the toroidal direction.

      By Faraday's law, the induced voltage in the loop is:

      $$V_{induced} = -\frac{d\psi}{dt}$$

      Flux loop measurements are fundamental for equilibrium reconstruction, plasma current estimation, and real-time plasma position control. Partial flux loops can also be used, with appropriate geometric corrections for the unclosed contour.
    unit: Wb
    kind: scalar
    tags: [measured, time-dependent]
    fields:
