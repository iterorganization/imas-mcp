  - name: diamagnetic_loop_flux
    tier: adequate
    expected_score: 62
    description: "Diamagnetic flux measured by diamagnetic loop diagnostic."
    documentation: >-
      Diamagnetic flux $\Phi_{dia}$ measured by a diamagnetic loop encircling the plasma. This quantity is directly related to the plasma stored energy through the reduction in poloidal flux linkage due to plasma pressure (diamagnetic effect).

      For a large-aspect-ratio circular plasma, the diamagnetic flux is approximately proportional to the thermal stored energy:

      $$\Phi_{dia} \approx -\mu_0 R_0 \int p \, dV$$

      where $\Phi_{dia}$ is the diamagnetic flux, $\mu_0$ is the permeability of free space, $R_0$ is the major radius, $p$ is the plasma pressure, and the integral is over the plasma volume $V$.

      Diamagnetic loops are toroidally symmetric coils that measure the difference in poloidal flux with and without plasma. Used for real-time stored energy monitoring and plasma control. The diamagnetic flux is related to poloidal beta and can be used to infer thermal energy content.
    unit: Wb
    kind: scalar
    tags: [measured, time-dependent]
    fields:
      device: diamagnetic_loop
      physical_base: flux
    reason: >-
      WEST catalog entry. Documentation (882 chars) has correct stored energy relation and large-aspect-ratio approximation. Missing typical values section and explicit measurement methodology. Device + physical_base grammar correct but "flux" as physical_base is quite generic. Adequate overall.

  - name: poloidal_magnetic_field_probe_magnetic_field
    tier: adequate
    expected_score: 58
    description: "Magnetic field signal from poloidal field probe along sensor normal axis."
    documentation: >-
      Magnetic field component $B_n = \mathbf{B} \cdot \mathbf{n}$ measured along the sensor normal axis direction $\mathbf{n}$, averaged over the probe sensing volume.

      The sensor normal direction is defined by poloidal and toroidal orientation angles:

      $$\mathbf{n} = \cos(\theta_n)\cos(\phi_n)\nabla R - \sin(\theta_n)\nabla Z + \cos(\theta_n)\sin(\phi_n)\frac{\nabla\phi}{|\nabla\phi|}$$

      Typically obtained by integrating the measured voltage:

      $$B_n(t) = B_n(t_0) - \frac{1}{NA} \int_{t_0}^{t} V(t') dt'$$

      where $N$ is the number of turns, $A$ is the area per turn, and $V$ is the measured voltage. Used for plasma equilibrium reconstruction and position control.
    unit: T
    kind: scalar
    tags: [measured, time-dependent]
    fields:
      device: poloidal_magnetic_field_probe
      physical_base: magnetic_field
    reason: >-
      WEST catalog entry. Documentation (664 chars) has correct dot-product definition and voltage integration formula. Name is very long (44 chars) reducing readability. Missing typical values and physical significance context. Device + physical_base grammar is correct but verbose. Adequate due to length and thin context.

