# Calibration dataset for benchmark reviewer scoring.
# Each entry is a curated standard name entry spanning quality tiers.
# Used as scoring anchors by the reviewer model — they define what
# "outstanding" vs "poor" looks like.
#
# Sources: ISN 42 reference examples (outstanding tier), WEST standard
# names catalog (good/adequate tiers), synthetic anti-patterns (poor tier).
#
# Every entry's grammar fields have been validated:
#   compose_standard_name(StandardName(**fields)) == name
#
# Scoring: 6 dimensions × 0-20 each = 0-120 total.
# Dimensions: grammar, semantic, documentation, convention, completeness, compliance.

entries:

  # ===================================================================
  # OUTSTANDING tier (102-120): ISN reference entries — rich docs, LaTeX,
  # cross-refs, sign conventions, typical values, perfect grammar
  # ===================================================================

  - name: electron_temperature
    tier: outstanding
    expected_score: 116
    description: "Electron kinetic temperature."
    documentation: >-
      Electron kinetic temperature $T_e$ representing the mean thermal energy per electron. In fusion plasmas, electron temperature typically ranges from tens of eV in the edge region to several keV in the plasma core.

      Thermodynamic relation:

      Electron temperature relates to [electron_pressure](#electron_pressure) via the ideal gas law:

      $$p_e = n_e k_B T_e$$

      where $n_e$ is [electron_density](#electron_density) in m$^{-3}$, $k_B = 1.381 \times 10^{-23}$ J/K is Boltzmann's constant, $T_e$ is in K, giving $p_e$ in Pa. When using $T_e$ in eV, apply conversion: $p_e = n_e T_e \times 1.602 \times 10^{-19}$ Pa.

      Physical significance:

      Temperature determines [energy_confinement_time](#energy_confinement_time) and fusion reactivity. Higher electron temperatures improve confinement quality and increase fusion reaction rates. The temperature gradient drives [electron_heat_flux](#electron_heat_flux) and affects [plasma_resistivity](#plasma_resistivity). See also [ion_temperature](#ion_temperature) and [electron_temperature_at_magnetic_axis](#electron_temperature_at_magnetic_axis).

      Measurement methods:

      Thomson scattering provides local [electron_density](#electron_density) and temperature measurements. Electron cyclotron emission measures temperature from radiation spectrum. X-ray spectroscopy determines temperature from continuum and line emissions. Interferometry provides line-integrated density for pressure calculations.

      Typical values:

      Edge region: 10-200 eV, core region: 1-20 keV in high-performance tokamak plasmas. On-axis values in [electron_temperature_at_magnetic_axis](#electron_temperature_at_magnetic_axis) typically reach 5-15 keV during auxiliary heating.
    unit: eV
    kind: scalar
    tags: [spatial-profile]
    fields:
      subject: electron
      physical_base: temperature
    reason: >-
      ISN reference entry. Canonical physics quantity with rich documentation (1684 chars) including thermodynamic relation with LaTeX ($p_e = n_e k_B T_e$), unit conversion, physical significance, four measurement methods, typical values by plasma region, and extensive cross-references to related quantities. Perfect subject + physical_base grammar.

  - name: plasma_resistivity
    tier: outstanding
    expected_score: 114
    description: "Plasma electrical resistivity."
    documentation: >-
      Plasma electrical resistivity $\eta$ quantifying resistance to current flow, arising from electron-ion collisions. Relates electric field to current density via Ohm's law and determines [heating_power_due_to_ohmic](#heating_power_due_to_ohmic) efficiency and [plasma_current](#plasma_current) requirements.

      $$\mathbf{E} = \eta \mathbf{j}$$

      where $\mathbf{E}$ is electric field in V/m and $\mathbf{j}$ is [plasma_current_density](#plasma_current_density) in A/m$^2$.

      Temperature dependence:

      Plasma resistivity decreases strongly with [electron_temperature](#electron_temperature):

      $$\eta \propto T_e^{-3/2}$$

      For a hydrogen plasma: $\eta \approx 5.2 \times 10^{-5} Z_{\text{eff}} \ln\Lambda / T_e^{3/2}$ $\Omega$·m, where $T_e$ is in eV, $Z_{\text{eff}}$ is effective charge, and $\ln\Lambda$ is the Coulomb logarithm.

      Physical significance:

      Resistivity determines [heating_power_due_to_ohmic](#heating_power_due_to_ohmic): $P_{\text{ohm}} = \int \eta j^2 dV$. At high temperatures, resistivity becomes negligible, making ohmic heating ineffective and requiring auxiliary heating. Resistivity affects [plasma_current](#plasma_current) penetration and current ramp rates. See [heating_power_due_to_ohmic](#heating_power_due_to_ohmic) for heating relationships and [plasma_current_density](#plasma_current_density) for current distribution.

      Measurement methods:

      Plasma resistivity is determined from [plasma_current](#plasma_current) and voltage measurements using Ohm's law. Loop voltage measurements provide electric field information. Current profile analysis requires equilibrium reconstruction. Resistivity profiles are inferred from temperature and density measurements. Spitzer resistivity calculations use [electron_temperature](#electron_temperature) and impurity content.

      Typical values:

      Core ($T_e$ ~ 1-10 keV): $10^{-8}$-$10^{-7}$ $\Omega$·m, edge ($T_e$ ~ 10-100 eV): $10^{-6}$-$10^{-5}$ $\Omega$·m. Resistivity decreases strongly with temperature and increases with impurity content.

      Sign convention: Positive resistivity indicates resistance to current flow, following standard electrical resistance conventions with current flow direction.
    unit: m.ohm
    kind: scalar
    tags: [spatial-profile]
    fields:
      physical_base: plasma_resistivity
    reason: >-
      ISN reference entry. Comprehensive documentation (2165 chars) with Ohm's law equation, Spitzer resistivity formula with all variables defined, temperature dependence scaling, ohmic heating power integral, measurement methods, and typical values across plasma regions. Standalone physical_base grammar.

  - name: electron_thermal_diffusivity
    tier: outstanding
    expected_score: 114
    description: "Electron thermal diffusivity coefficient."
    documentation: >-
      Electron thermal diffusivity $\chi_e$ quantifying the rate of electron thermal energy transport in the plasma. This effective transport coefficient combines neoclassical and turbulent contributions and determines [energy_confinement_time](#energy_confinement_time) through the relationship between heat flux and temperature gradients.

      Transport relation:

      The [electron_heat_flux](#electron_heat_flux) relates to temperature gradient via:

      $$q_e = -n_e \chi_e \nabla T_e$$

      where $n_e$ is [electron_density](#electron_density) in m$^{-3}$, $\nabla T_e$ is [electron_temperature](#electron_temperature) gradient in eV/m, giving $q_e$ in W/m$^2$.

      Physical significance:

      Electron thermal diffusivity arises from turbulent transport (primarily) and neoclassical transport. In tokamaks, $\chi_e$ is typically anomalous (much larger than neoclassical predictions) due to micro-instabilities such as trapped electron modes and electron temperature gradient modes. Higher diffusivity reduces [energy_confinement_time](#energy_confinement_time) and affects [plasma_current](#plasma_current) requirements. See [electron_heat_flux](#electron_heat_flux) for transport relationships and [radial_component_of_electron_heat_flux](#radial_component_of_electron_heat_flux) for radial transport analysis.

      Measurement methods:

      Electron thermal diffusivity is inferred from transport analysis using [electron_temperature](#electron_temperature) and [electron_density](#electron_density) profile measurements. Power balance analysis determines diffusivity from heat flux divergence. Thomson scattering provides local temperature and density measurements for gradient calculations. Electron cyclotron emission measures temperature profiles. Diffusivity analysis requires equilibrium reconstruction and power deposition calculations.

      Typical values:

      Core region: 0.1-10 m$^2$/s depending on confinement regime. L-mode shows higher values than H-mode due to increased turbulent transport. Diffusivity typically increases with radius and decreases with heating power.

      Sign convention: Positive diffusivity indicates outward heat transport from hot plasma core to cooler edge regions, following standard transport theory conventions.
    unit: m^2.s^-1
    kind: scalar
    tags: [derived, spatial-profile]
    fields:
      subject: electron
      physical_base: thermal_diffusivity
    reason: >-
      ISN reference entry. Excellent transport documentation (2215 chars) with heat flux relation ($q_e = -n_e \chi_e \nabla T_e$), turbulent vs neoclassical transport discussion, measurement methodology, L-mode vs H-mode typical values, and sign convention. Clean subject + physical_base grammar.

  - name: ion_temperature
    tier: outstanding
    expected_score: 112
    description: "Ion kinetic temperature."
    documentation: >-
      Ion kinetic temperature $T_i$ representing the mean thermal energy per ion. In fusion plasmas, ion temperature is critical for achieving fusion reactions, as the fusion cross-section strongly depends on ion temperature. Ion temperature determines the thermal velocity of ions and affects fusion reactivity.

      Thermodynamic relation:

      Ion temperature relates to ion pressure via the ideal gas law:

      $$p_i = n_i k_B T_i$$

      where $n_i$ is ion density in m$^{-3}$, $k_B = 1.381 \times 10^{-23}$ J/K, $T_i$ is in K, giving $p_i$ in Pa. When using $T_i$ in eV, apply conversion: $p_i = n_i T_i \times 1.602 \times 10^{-19}$ Pa.

      Physical significance:

      Ion temperature determines fusion reactivity through the Maxwellian-averaged cross-section. For deuterium-tritium fusion, maximum reactivity occurs near $T_i \approx 100$ keV, with practical operating points around 10-20 keV. Ion temperature affects [energy_confinement_time](#energy_confinement_time) and determines the fusion triple product $n T \tau_E$. See [electron_temperature](#electron_temperature) for electron-ion energy exchange and [ion_temperature_at_magnetic_axis](#ion_temperature_at_magnetic_axis) for core values.

      Measurement methods:

      Charge exchange recombination spectroscopy provides local ion temperature measurements through Doppler broadening of impurity lines. Neutral particle analyzers measure charge-exchanged neutrals escaping the plasma. X-ray crystal spectroscopy determines ion temperature from continuum radiation. Thomson scattering can provide ion temperature in some configurations. Ion temperature profiles are essential for [plasma_current_density](#plasma_current_density) calculations.

      Typical values:

      Edge region: 10-200 eV, core region: 1-20 keV in high-performance tokamak plasmas. On-axis values in [ion_temperature_at_magnetic_axis](#ion_temperature_at_magnetic_axis) typically reach 5-15 keV during auxiliary heating. Ion temperature often exceeds electron temperature in heated plasmas.

      Sign convention: Positive temperature indicates thermal energy per particle, following standard thermodynamic conventions.
    unit: eV
    kind: scalar
    tags: [measured, spatial-profile]
    fields:
      subject: ion
      physical_base: temperature
    reason: >-
      ISN reference entry. Rich documentation (2106 chars) covering fusion reactivity dependence, thermodynamic relation with unit conversion, four measurement methods (CXRS, NPA, X-ray, Thomson), typical values by region, and sign convention. Symmetric with electron_temperature in quality. Subject + physical_base grammar.

  - name: safety_factor
    tier: outstanding
    expected_score: 112
    description: "Magnetic safety factor."
    documentation: >-
      Magnetic safety factor $q$ (or $q$-profile) quantifying the pitch of magnetic field lines on a flux surface. The safety factor is fundamental for MHD stability analysis and determines the rational surfaces where instabilities can occur.

      $$q = \frac{1}{2\pi} \oint \frac{B_{\phi}}{B_p R} dl_p$$

      where $B_{\phi}$ is [toroidal_component_of_magnetic_field](#toroidal_component_of_magnetic_field), $B_p$ is [poloidal_component_of_magnetic_field](#poloidal_component_of_magnetic_field), $R$ is major radius, and $dl_p$ is the differential poloidal arc length.

      Physical significance:

      The safety factor determines MHD stability limits through the Kruskal-Shafranov criterion. Rational surfaces where $q = m/n$ (integer $m$, $n$) are resonant for MHD modes. Lower $q$ values indicate higher [plasma_current](#plasma_current) and reduced stability margins. The minimum safety factor $q_{\text{min}}$ and edge safety factor $q_{95}$ are key operational parameters. See [plasma_current](#plasma_current) and [magnetic_field](#magnetic_field) for field structure relationships.

      Measurement methods:

      Safety factor profiles are determined from equilibrium reconstruction using external magnetic measurements. The $q$-profile relates to [plasma_current_density](#plasma_current_density) through $\nabla \times \mathbf{B} = \mu_0 \mathbf{J}$ and can be inferred from [flux_loop_voltage](#flux_loop_voltage) measurements. MSE (motional Stark effect) diagnostics provide direct $q$-profile measurements in some devices.

      Typical values:

      On-axis: $q_0 = 0.7$-1.5, edge: $q_{95} = 3$-6 for stable operation. Operation below $q_{\text{min}} < 1$ leads to sawtooth oscillations. H-mode operation typically requires $q_{95} > 2.5$ for stability.

      Sign convention: Positive when toroidal current and toroidal field are in same direction, followingright-hand rule for standard tokamak operation.
    unit: 1
    kind: scalar
    tags: [spatial-profile]
    fields:
      physical_base: safety_factor
    reason: >-
      ISN reference entry. Comprehensive equilibrium documentation (1867 chars) with integral definition of q, Kruskal-Shafranov stability criterion, rational surface physics, MSE measurement, and typical values ($q_0$, $q_{95}$). Standalone physical_base grammar. Dimensionless quantity.

  - name: energy_confinement_time
    tier: outstanding
    expected_score: 112
    description: "Energy confinement time."
    documentation: >-
      Energy confinement time $\tau_E$ quantifying how long thermal energy is retained in the plasma before being lost to the surroundings. This is the single most important figure of merit for fusion performance and determines the approach to ignition conditions.

      $$\tau_E = \frac{W_{\text{th}}}{P_{\text{loss}}}$$

      where $W_{\text{th}}$ is total thermal energy content in J and $P_{\text{loss}}$ is total power loss in W.

      Physical significance:

      Energy confinement time determines fusion performance through the triple product $n T \tau_E$. Longer confinement times enable higher plasma temperatures and pressures, approaching fusion ignition conditions. The fusion triple product criterion requires $n T \tau_E > 3 \times 10^{21}$ m$^{-3}$ keV s for D-T fusion. Confinement quality affects [plasma_current](#plasma_current) requirements and [safety_factor](#safety_factor) limits for stable operation.

      Scaling laws:

      Empirical scaling laws predict $\tau_E$ from machine and plasma parameters. H-mode confinement shows $\tau_E \propto I_p^{0.93} B_T^{0.15} P^{-0.69} n^{0.41} R^{1.97} a^{0.58} \kappa^{0.78}$ (IPB98(y,2) scaling), where $I_p$ is [plasma_current](#plasma_current), $B_T$ is toroidal field, $P$ is heating power, and geometric factors follow. Confinement improves with higher current, density, and larger machine size.

      Measurement methods:

      Energy confinement time is derived from total thermal energy content and power loss measurements. Thermal energy is calculated from [electron_temperature](#electron_temperature) and [ion_temperature](#ion_temperature) profiles integrated over [plasma_volume](#plasma_volume). Power loss includes radiated power, conducted power to walls, and convective losses. [Electron_heat_flux](#electron_heat_flux) measurements provide local transport analysis.

      Typical values:

      L-mode: 20-50 ms, H-mode: 100-300 ms for medium tokamaks; ITER target: ~4 s. Confinement time scales with machine size and plasma current, following empirical scaling laws.
    unit: s
    kind: scalar
    tags: [global-quantity, performance-metric]
    fields:
      physical_base: energy_confinement_time
    reason: >-
      ISN reference entry. Excellent performance documentation (1996 chars) with defining equation ($\tau_E = W_{th}/P_{loss}$), fusion triple product criterion, IPB98(y,2) scaling law with exponents, measurement methodology, and L-mode vs H-mode typical values. Standalone physical_base grammar.

  - name: toroidal_component_of_magnetic_field
    tier: outstanding
    expected_score: 110
    description: "Toroidal component of magnetic field vector."
    documentation: >-
      Toroidal component of the [magnetic_field](#magnetic_field) vector $B_{\phi}$ in cylindrical coordinates. In tokamaks, the toroidal component is the dominant field component, produced by external toroidal field coils and providing plasma stability and particle confinement.

      $$B_{\phi} = \mathbf{B} \cdot \hat{e}_{\phi}$$

      where $\mathbf{B}$ is the total magnetic field in T and $\hat{e}_{\phi}$ is the unit vector in the toroidal direction.

      Physical significance:

      In tokamaks, the toroidal component is the dominant field component, produced by external toroidal field coils. Typical field strengths are 1-6 T on axis, with $B_{\phi} \gg B_R, B_Z$ for good magnetic confinement. The toroidal field provides plasma stability and determines the Larmor radius of particles. Field strength affects [safety_factor](#safety_factor) and MHD stability limits. See [poloidal_component_of_magnetic_field](#poloidal_component_of_magnetic_field) for field ratio and [magnetic_field](#magnetic_field) for total field structure.

      Measurement methods:

      Toroidal magnetic field is measured using magnetic probes and flux loops positioned around the plasma. [Flux_loop_voltage](#flux_loop_voltage) integration provides field change information. Equilibrium reconstruction codes determine internal field structure from external measurements. Toroidal field coils provide known field contribution for calibration. Field mapping requires multiple measurement locations around the torus.

      Typical values:

      On-axis: 2-6 T for medium to large tokamaks, decreasing as $B_{\phi} \propto 1/R$ for vacuum field. Field strength is primarily determined by external coil current and machine geometry.

      Sign convention: Positive when anti-clockwise viewed from above, following standard tokamak conventions and consistent with [plasma_current](#plasma_current) direction for stable operation.
    unit: T
    kind: scalar
    tags: [measured]
    fields:
      component: toroidal
      physical_base: magnetic_field
    reason: >-
      ISN reference entry. Multi-segment grammar (component + physical_base) correctly composed. Documentation (1864 chars) includes vector projection equation, 1/R vacuum field decay, typical field strengths, sign convention, and cross-references to safety_factor and poloidal field.

  - name: plasma_current
    tier: outstanding
    expected_score: 110
    description: "Total toroidal plasma current."
    documentation: >-
      Total toroidal plasma current $I_p$ obtained by integrating the toroidal [current_density](#current_density) over the plasma cross-section. Plasma current is fundamental for tokamak confinement, generating the poloidal magnetic field that provides rotational transform of field lines.

      $$I_p = \int j_{\phi} \, dA$$

      where $j_{\phi}$ is toroidal [plasma_current_density](#plasma_current_density) in A/m$^2$ and $dA$ is the differential area element in m$^2$.

      Physical significance:

      Plasma current generates [poloidal_magnetic_field](#poloidal_magnetic_field) through Ampère's law and provides rotational transform for field line closure. Higher plasma current typically improves [energy_confinement_time](#energy_confinement_time) through better magnetic confinement but reduces [safety_factor](#safety_factor), affecting MHD stability limits. Current profile shape determines bootstrap current fraction and affects [plasma_resistivity](#plasma_resistivity) requirements.

      Measurement methods:

      Plasma current is determined from external magnetic measurements using [flux_loop_voltage](#flux_loop_voltage) integration and Rogowski coils. Equilibrium reconstruction codes invert magnetic measurements to determine current profiles. The current relates to [magnetic_field](#magnetic_field) via $\nabla \times \mathbf{B} = \mu_0 \mathbf{J}$ and can be inferred from poloidal field measurements.

      Typical values:

      Small tokamaks: 0.1-0.5 MA, medium tokamaks: 1-2 MA, ITER: up to 15 MA. Current density profiles typically peak on-axis with values $10^5$-$10^6$ A/m$^2$ in the core region.

      Sign convention: Positive indicates counter-clockwise toroidal current when viewed from above, same direction as toroidal magnetic field for stable operation.
    unit: A
    kind: scalar
    tags: [global-quantity, measured, time-dependent]
    fields:
      physical_base: plasma_current
    reason: >-
      ISN reference entry. Fundamental operational parameter with comprehensive documentation (1745 chars) including integral definition, Ampere's law context, measurement methods (flux loops, Rogowski coils), machine-specific typical values (100 kA to 15 MA), and COCOS-consistent sign convention. Standalone physical_base grammar.

  - name: elongation_of_plasma_boundary
    tier: outstanding
    expected_score: 108
    description: "Elongation evaluated at plasma boundary."
    documentation: >-
      Plasma cross-section elongation evaluated specifically at the [plasma_boundary](#plasma_boundary) (last closed flux surface). Boundary elongation is a key shape parameter for tokamak design and operation, affecting [plasma_volume](#plasma_volume) and [energy_confinement_time](#energy_confinement_time) through geometric effects.

      $$\kappa_{\text{boundary}} = \frac{b}{a}$$

      where $b$ is half-height of plasma boundary and $a$ is [minor_radius_of_plasma_boundary](#minor_radius_of_plasma_boundary).

      Physical significance:

      Boundary elongation is a key shape parameter for tokamak design and operation. Higher elongation increases [plasma_volume](#plasma_volume) and improves confinement through favorable geometric effects, but also increases susceptibility to [vertical_displacement_event](#vertical_displacement_event) requiring active feedback control. Elongation affects [plasma_current](#plasma_current) limits and [safety_factor](#safety_factor) requirements. See [major_radius_of_plasma_boundary](#major_radius_of_plasma_boundary) and [minor_radius_of_plasma_boundary](#minor_radius_of_plasma_boundary) for geometric relationships.

      Relation to plasma current:

      For fixed aspect ratio and [safety_factor](#safety_factor), higher elongation allows higher [plasma_current](#plasma_current): $I_p \propto \kappa$. This relationship is fundamental for tokamak scaling and operational limits.

      Measurement methods:

      Elongation is determined from equilibrium reconstruction using external [magnetic_field](#magnetic_field) measurements. [Flux_loop_voltage](#flux_loop_voltage) integration provides boundary shape information. Plasma imaging systems measure boundary geometry directly. Shape analysis requires [magnetic_axis](#magnetic_axis) location and [plasma_boundary](#plasma_boundary) identification. Elongation is calculated from boundary coordinates in the poloidal plane.

      Typical values:

      Circular plasmas: $\kappa \approx 1.0$, moderately shaped: $\kappa = 1.5$-1.8, highly elongated: $\kappa = 2.0$-2.5. Elongation is actively controlled through external coil currents.

      Sign convention: Positive when $\kappa \geq 1$ indicating vertically elongated or circular cross-section, following standard tokamak geometry conventions.
    unit: 1
    kind: scalar
    tags: [global-quantity]
    fields:
      physical_base: elongation
      geometry: plasma_boundary
    reason: >-
      ISN reference entry. Shape parameter documentation (2238 chars) with $\kappa = b/a$ definition, current scaling relation ($I_p \propto \kappa$), vertical stability implications, equilibrium reconstruction context, and typical values from circular to highly shaped. Physical_base + geometry grammar.

  - name: flux_loop_voltage
    tier: outstanding
    expected_score: 106
    description: "Voltage measured by flux loop diagnostic."
    documentation: >-
      Voltage signal measured by a flux loop diagnostic coil, related to the time derivative of [poloidal_magnetic_flux](#poloidal_magnetic_flux) by Faraday's law. The induced voltage provides fundamental information for equilibrium reconstruction and [plasma_current](#plasma_current) evolution, serving as a primary magnetic diagnostic.

      $$V = -\frac{d\Psi}{dt}$$

      where $V$ is voltage in V, $\Psi$ is the [poloidal_magnetic_flux](#poloidal_magnetic_flux) threading the loop in Wb, and $t$ is time in s.

      Physical significance:

      A conducting loop with effective [area_of_flux_loop](#area_of_flux_loop) $A$ in m$^2$ encircling the plasma measures the time-varying poloidal flux. The induced voltage provides fundamental information for equilibrium reconstruction and [plasma_current](#plasma_current) evolution. Flux loop measurements are essential for [magnetic_field](#magnetic_field) reconstruction and plasma control. See [area_of_flux_loop](#area_of_flux_loop) for calibration and [poloidal_magnetic_flux](#poloidal_magnetic_flux) for flux relationships.

      Measurement principle:

      Flux loop voltage measures the rate of change of magnetic flux threading the loop. Multiple flux loops at different positions provide 2D magnetic field information for equilibrium reconstruction. Voltage integration gives flux changes: $\Delta\Phi = \int V dt / A$ where $A$ is [area_of_flux_loop](#area_of_flux_loop).

      Applications:

      Plasma current monitoring, equilibrium reconstruction, MHD event detection. Spatial positioning given by [radial_position_of_flux_loop](#radial_position_of_flux_loop) and [vertical_position_of_flux_loop](#vertical_position_of_flux_loop). Flux loop arrays provide comprehensive magnetic field measurements for plasma control.

      Measurement methods:

      Flux loop voltage is measured using high-speed data acquisition systems. Voltage signals are integrated to obtain magnetic flux changes. Calibration procedures ensure accurate area and positioning. Multiple loops provide spatial coverage for 2D reconstruction. Real-time processing enables plasma control applications.

      Typical values:

      Millivolts to volts depending on flux change rate and coil area. Voltage levels vary with plasma conditions and measurement location.

      Sign convention: Positive when normal to loop points downward (negative Z direction), following Faraday's law and standard electromagnetic conventions.
    unit: V
    kind: scalar
    tags: [measured, time-dependent]
    fields:
      device: flux_loop
      physical_base: voltage
    reason: >-
      ISN reference entry. Diagnostic-specific documentation (2386 chars) with Faraday's law equation, measurement principle, applications list, flux integration formula, and sign convention. Device + physical_base grammar correctly places flux_loop before voltage.

  # --- Cycle-2 benchmark exemplars (equilibrium geometry) -----------------

  - name: minor_radius_of_plasma_boundary
    tier: outstanding
    expected_score: 108
    description: "Minor radius of the plasma boundary (half-width along R)."
    documentation: >-
      Minor radius $a$ of the plasma boundary, defined as half the radial extent of the outermost closed flux surface:

      $$a = (R_{\max} - R_{\min}) / 2$$

      where $R_{\max}$ and $R_{\min}$ are the outboard and inboard midplane intersections of the last closed flux surface (plasma boundary). Used as the characteristic length for many confinement scalings (e.g. $\tau_E \propto a^{1.97}$ in IPB98(y,2)) and as the denominator in normalised radii. See also [minor_radius_of_flux_surface](#minor_radius_of_flux_surface) for interior surfaces and [major_radius_of_geometric_axis](#major_radius_of_geometric_axis) for the complementary $R_0$.
    unit: m
    kind: scalar
    tags: [geometry, equilibrium, time-dependent]
    fields:
      physical_base: minor_radius
      geometry: plasma_boundary
    reason: >-
      Cycle-2 frontier exemplar. Scored 0.983 averaged across gpt-5.4, gemini-3.1-pro, sonnet-4.6 on the equilibrium benchmark. Textbook `physical_base_of_geometry` form with geometry drawn from the closed vocabulary. Cleanly separates the geometric quantity (minor_radius) from the locus where it is evaluated (plasma_boundary). Preferred over `geometric_minor_radius` (poor anti-pattern) and over bare `minor_radius`.

  - name: elongation_of_plasma_boundary
    tier: outstanding
    expected_score: 108
    description: "Elongation (vertical / horizontal extent ratio) of the plasma boundary."
    documentation: >-
      Plasma elongation $\kappa$ of the plasma boundary (last closed flux surface), defined as the ratio of vertical to horizontal half-extents:

      $$\kappa = (Z_{\max} - Z_{\min}) / (R_{\max} - R_{\min})$$

      Dimensionless shape parameter controlling current-carrying capacity and MHD stability limits (Troyon $\beta$ limit scales with $\kappa$). Does NOT apply to interior flux surfaces unless explicitly stated — use `elongation_of_flux_surface` with an index for surface-resolved profiles. See also [upper_elongation_of_plasma_boundary](#upper_elongation_of_plasma_boundary) and [lower_elongation_of_plasma_boundary](#lower_elongation_of_plasma_boundary) for the half-plane variants.
    unit: dimensionless
    kind: scalar
    tags: [shape, equilibrium, time-dependent]
    fields:
      physical_base: elongation
      geometry: plasma_boundary
    reason: >-
      Cycle-2 frontier exemplar. Scored 0.987 averaged across frontier models. Demonstrates that dimensionless shape descriptors follow the same `physical_base_of_geometry` form as metric quantities. Importantly, when a DD path carries an `upper`/`lower` subpath, the half-plane variants (`upper_elongation_of_plasma_boundary`) must be used — collapsing `elongation_upper` and `elongation_lower` into a single `elongation_of_plasma_boundary` is a semantic error (see anti-pattern below).

  - name: distance_between_plasma_boundary_and_closest_wall_point
    tier: outstanding
    expected_score: 106
    description: "Shortest distance between the plasma boundary and the first wall."
    documentation: >-
      Minimum Euclidean distance in the poloidal plane between the plasma boundary (last closed flux surface) and the closest point on the first wall contour:

      $$d_{\min} = \min_{(\mathbf{x}_p, \mathbf{x}_w) \in \partial P \times \partial W} \| \mathbf{x}_p - \mathbf{x}_w \|$$

      Used as a safety margin and plasma-wall gap indicator during position control. Related to (but distinct from) specific named gaps (`gap_angle_of_plasma_boundary`, etc.) which reference a pre-defined reference point rather than the nearest wall element.
    unit: m
    kind: scalar
    tags: [geometry, equilibrium, plasma-wall, time-dependent]
    fields:
      physical_base: distance_between_plasma_boundary_and_closest_wall_point
    reason: >-
      Cycle-2 frontier exemplar. Scored 0.950 across frontier models. Demonstrates NC-14 (canonical `distance_between_X_and_Y` form for separations between two named features) AND the open-vocabulary `physical_base` principle — the whole compound lands in `physical_base` and the name still round-trips through `parse_standard_name`. Reviewers must NOT flag this pattern as "unparseable grammar"; it is exactly the prescribed form.

