      physical_base: poloidal_magnetic_flux
    reason: >-
      WEST catalog entry. Correct diagnostic-specific documentation (744 chars) with integral definition, sign convention, and Faraday's law relation. Below outstanding due to shorter length, missing typical values, and limited cross-references. Device + physical_base grammar.

