# JET - Joint European Torus
#
# Public facility configuration for graph and mappings.
# Infrastructure data is in jet_private.yaml (gitignored).

facility: jet
name: JET (Joint European Torus)
machine: JET
description: Joint European Torus - EUROfusion operated tokamak
location: Culham, United Kingdom

# SSH connection (user configures ~/.ssh/config with this alias)
ssh_host: jet

# Lower the priority of codex SSH workloads on shared JET hosts.
nice_level: 19

# Data system configuration for signal discovery
# Used by: imas-codex discover signals jet
data_systems:
  # PPF is JET's primary processed data system.
  # Organized as Owner/DDA/Dtype. Accessed via SAL REST API, ppfget, or getdat.
  ppf:
    sal_endpoint: https://sal.jet.uk  # SAL REST API
    reference_pulse: 99896
    default_owner: jetppf
    # Additional shots to try when ier=210002 (data not available for specific shot).
    # Spread across different campaigns for coverage.
    check_shots: [99896, 99000, 96000, 92000]
    # Python interpreter with numpy for ppf array handling
    python_command: /common/software/micromamba/root/envs/python-3.12-minibundle/bin/python3
    # Module loads for PPF library access
    setup_commands:
      - source /etc/profile.d/modules.sh
      - module load jet/1.0
    # Exclude DDAs with raw/engineering data (high volume, low physics value)
    exclude_ddas: []
    # PPF signals containing static machine description data.
    # Accessible via MDSplus thin-client: ppf("DDA/DTYPE", shot).
    static_signals:
      - name: EFIT/RLIM
        description: Limiter R coordinates (251 points, static across ILW)
        static: true
        expected_shape: [1, 251]
      - name: EFIT/ZLIM
        description: Limiter Z coordinates (251 points, static across ILW)
        static: true
        expected_shape: [1, 251]
      - name: EFIT/RBND
        description: Plasma boundary R (time-resolved, 947×105)
        static: false
        expected_shape: [947, 105]
      - name: EFIT/ZBND
        description: Plasma boundary Z (time-resolved, 947×105)
        static: false
        expected_shape: [947, 105]
      - name: LIDR/Z
        description: LIDAR Thomson scattering Z positions (50 points, static)
        static: true
        expected_shape: [50]
      - name: VESL/CROS
        description: Vessel cross-section contour
        static: true
    # DDA descriptions for enrichment prompt context
    dda_descriptions:
      - code: EFIT
        description: Equilibrium reconstruction (magnetic equilibrium)
      - code: EHTR
        description: Equilibrium high time resolution
      - code: MAGN
        description: Magnetics — plasma current, loop voltage, flux loops
      - code: HRTS
        description: High Resolution Thomson Scattering — Te, ne profiles
      - code: KK3
        description: Electron Cyclotron Emission (ECE) — Te profiles
      - code: KG1V
        description: Far-infrared interferometry — line-integrated density
      - code: KG1L
        description: Lateral interferometry — line-integrated density
      - code: KG10
        description: Interferometry channel 10
      - code: BOLO
        description: Bolometry — radiated power
      - code: BOLP
        description: Bolometry profiles
      - code: B5NN
        description: Bolometry neutron-normalized
      - code: NBI
        description: Neutral Beam Injection heating
      - code: ICRH
        description: Ion Cyclotron Resonance Heating
      - code: LHCD
        description: Lower Hybrid Current Drive
      - code: SXR
        description: Soft X-ray emission
      - code: KS3
        description: ECE radiometry
      - code: KS3A
        description: ECE radiometry (A channel)
      - code: EDG7
        description: Edge reflectometry
      - code: EDG8
        description: Edge reflectometry
      - code: GASH
        description: Gas supply and fuelling
      - code: CXSE
        description: Charge Exchange Spectroscopy — ion temperature, rotation
      - code: KAD
        description: ECE Michelson interferometer
      - code: MAGF
        description: Magnetics Far — far-field magnetic measurements
      - code: MAGS
        description: Magnetics Saddle — saddle coil measurements
      - code: MAGA
        description: Magnetics Analogue — analogue magnetic measurements
      - code: MAGG
        description: Magnetics — general magnetic measurements
      - code: LIDL
        description: LIDAR Thomson Scattering — Te, ne profiles
      - code: IDAM
        description: Integrated Data Access Manager
      - code: CXHM
        description: Charge Exchange — H-alpha monitor

  # MDSplus thin-client access via TDI functions.
  # JET's MDSplus server does NOT use traditional tree-based access.
  # All data is accessed via TDI function calls over a thin-client
  # connection (MDSplus.Connection). JPF raw hardware signals and
  # PPF processed data are both accessible through this interface.
  mdsplus:
    server: mdsplus.jet.uk
    connection_type: thin_client  # Remote via MDSplus.Connection (vs TCV's local tree access)
    reference_shot: 99896
    python_command: /common/software/micromamba/root/envs/python-3.12-minibundle/bin/python3
    setup_commands:
      - source /etc/profile.d/modules.sh
      - module load jet/1.0
    # TDI data access functions (documentary only, used by scanners):
    #   dpf("{subsystem}/{signal}", {shot})      — Raw JPF signals
    #   ppf("{dda}/{dtype}", {shot})              — Processed PPF data
    #   jpfsubsystems()                           — List all JPF subsystem codes
    #   jpfincludedsubsystems({shot})             — Active subsystems for a shot
    #   ppfsignalinfo("{dda}")                    — PPF DDA metadata

  # IMAS data available post-migration
  imas:
    backends:
      - mdsplus
    db_name: jet

  # JPF (JET Processing Facility) raw hardware diagnostic signals.
  # Organized by 2-char subsystem code + signal name (e.g., DA/C2-IPLA).
  # Accessed via MDSplus thin-client TDI function: dpf("subsystem/signal", shot).
  # Enumerated via getdat module: zadop() opens pulse file, adlnod() lists nodes.
  jpf:
    server: mdsplus.jet.uk
    reference_shot: 99896
    python_command: /common/software/micromamba/root/envs/python-3.12-minibundle/bin/python3
    setup_commands:
      - source /etc/profile.d/modules.sh
      - module load jet/1.0
    subsystems:
      - code: DA
        description: Diagnostics A — magnetics, plasma current, flux loops
        physics_domain: magnetic_field_diagnostics
      - code: DB
        description: Diagnostics B — interferometry, polarimetry
        physics_domain: particle_measurement_diagnostics
      - code: DC
        description: Diagnostics C — ECE, reflectometry
        physics_domain: electromagnetic_wave_diagnostics
      - code: DD
        description: Diagnostics D — bolometry, soft X-ray
        physics_domain: radiation_measurement_diagnostics
      - code: DE
        description: Diagnostics E — charge exchange, beam emission
        physics_domain: particle_measurement_diagnostics
      - code: DF
        description: Diagnostics F — microwave diagnostics
        physics_domain: electromagnetic_wave_diagnostics
      - code: DG
        description: Diagnostics G — visible spectroscopy, Langmuir probes
        physics_domain: particle_measurement_diagnostics
      - code: DH
        description: Diagnostics H — IR cameras, thermocouples
        physics_domain: electromagnetic_wave_diagnostics
      - code: DI
        description: Diagnostics I — neutron diagnostics, gamma cameras
        physics_domain: radiation_measurement_diagnostics
      - code: DJ
        description: Diagnostics J
        physics_domain: general
      - code: PF
        description: Poloidal Field coil system
        physics_domain: magnetic_field_diagnostics
      - code: TF
        description: Toroidal Field coil system
        physics_domain: magnetic_field_diagnostics
      - code: PL
        description: Plasma control (inactive for recent shots)
        physics_domain: magnetics
      - code: GS
        description: Gas supply and fuelling system
        physics_domain: plant_systems
      - code: VC
        description: Vacuum vessel and pumping
        physics_domain: plant_systems
      - code: AH
        description: Additional Heating — NBI, ICRH power systems
        physics_domain: auxiliary_heating
      - code: RF
        description: Radio Frequency heating — ICRH antennas
        physics_domain: auxiliary_heating
      - code: SA
        description: Safety systems A
        physics_domain: plant_systems
      - code: SC
        description: Safety systems C
        physics_domain: plant_systems
      - code: CC
        description: Central Control (inactive for recent shots)
        physics_domain: plant_systems
      - code: LH
        description: Lower Hybrid heating (inactive for recent shots)
        physics_domain: auxiliary_heating
      - code: MC
        description: Machine Control (inactive for recent shots)
        physics_domain: plant_systems
      - code: NM
        description: Neutron Monitoring
        physics_domain: radiation_measurement_diagnostics
      - code: YC
        description: YC subsystem
        physics_domain: plant_systems

  # Machine description — geometry data for JET's tokamak components.
  # Accessed via the DeviceXMLScanner plugin (scanner_type: device_xml).
  # Geometry lives in EFIT device XMLs, Fortran namelists, and R,Z contour
  # files, versioned in a git repo. EFIT's PulseDependencyDB provides the
  # epoch boundaries. The data itself is machine geometry, not EFIT-specific.
  device_xml:
    # Git bare repo containing versioned geometry files
    git_repo: /home/chain1/git/efit_f90.git
    # Source repo tree path prefix for input files
    input_prefix: JET/input
    # Machine configuration epochs. Each represents a hardware state
    # valid for a pulse range. Epoch boundaries come from EFIT's
    # PulseDependencyDB but describe machine state, not EFIT config.
    # Only base configurations listed (EFCC sessions reuse geometry).
    # snap_file tracks which probes were enabled/disabled per epoch.
    # Machine configuration epochs. Each represents a hardware state
    # valid for a pulse range. Epoch boundaries from EFIT's PulseDependencyDB
    # (configurationsMAGN). All 14 base configurations listed — EFCC sessions
    # (p68967_efcc1, p70468_efcc2, p78814_efcc2, p79854_efcc1/efcc2) reuse
    # the same device XML and limiter, changing only snap_file and Green's.
    versions:
      # Pre-EFIT++ epochs — no device XMLs, limiter contour geometry only.
      # Shot ranges from /usr/local/data/flush/limiter_list.dat (SCAL/FLUSH
      # database — the authoritative source for JET wall geometry history).
      - version: limiter_era
        first_shot: 1
        last_shot: 28791
        description: "Pre-divertor carbon wall + belt limiter (1983-1991)"
        uses_limiter: Limiter
        wall_configuration: limiter
        # No divertor PF coils — limiter-only configuration
      - version: mk1_era
        first_shot: 28792
        last_shot: 35778
        description: "Mark I divertor — JET's first divertor (1994-1995)"
        uses_limiter: Mk1
        wall_configuration: divertor
        pf_configuration: pre-EFIT
      - version: mk2a_era
        first_shot: 35779
        last_shot: 45155
        description: "Mark IIA Gas Box divertor (1996-1998)"
        uses_limiter: Mk2A
        wall_configuration: divertor
        pf_configuration: pre-EFIT
      - version: mk2gb_era
        first_shot: 45156
        last_shot: 54549
