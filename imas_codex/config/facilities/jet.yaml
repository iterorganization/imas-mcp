    # Systems extracted from device XMLs — analogous to TCV static tree systems
    systems:
      - symbol: PF
        name: Poloidal field coils
        description: "22 PF coils: P1-P4 (central solenoid), DSH/DSV (divertor shaping), and circuit groups"
        size: 22
        parameters: [R, Z, W, H, TURNS, RESISTANCE]
      - symbol: PS
        name: Passive structures
        description: "48 passive conducting elements (vessel wall, stabilizing plates)"
        size: 48
        parameters: [R, Z, W, H, RESISTANCE]
      - symbol: MP
        name: Magnetic probes (pick-up coils)
        description: "BPME saddle coils — count varies by config (71-95 fitted pick-ups)"
        parameters: [R, Z, ANG, AREA, TURNS]
      - symbol: FL
        name: Flux loops
        description: "36 diamagnetic/saddle flux loops (SX/SY naming)"
        size: 36
        parameters: [R, Z, ANG, AREA]
      - symbol: CI
        name: Circuit-to-coil mappings
        description: "10 PF circuits mapping coils to power supply connections"
        size: 10
        parameters: [COILS, TURNS_RATIO]
      - symbol: LIM
        name: Limiter contour
        description: "First wall R,Z contour — 7 versions: Limiter (pre-divertor, shots 1-28791), Mk1, Mk2A, Mk2GB, Mk2GB-SR, Mk2HD, Mk2ILW"
        parameters: [R, Z]
    # Limiter contour versions (independent of device XML structural epochs).
    # Each entry is a first-wall geometry that was physically installed.
    # The R,Z contour files define the plasma-facing boundary shape.
    #
    # Sources:
    #   - SCAL/FLUSH database: /usr/local/data/flush/ (authoritative history)
    #     Includes all 7 eras from pre-divertor to ILW. Shot ranges taken from
    #     /usr/local/data/flush/limiter_list.dat — the definitive mapping.
    #   - EFIT legacy: /home/chain1/input/efit/Limiters/ (4 files: mk2a, mk2gb, mk2gb_ns, mk2hd)
    #   - Git repo: /home/chain1/git/efit_f90.git (3 files: mk2gb_ns_cc, mk2hd_cc, mk2ilw_cc)
    #   - EFIT limiter_list: /home/chain1/input/efit/limiter_list
    #     Only covers Mk2A→Mk2HD (retroactively maps all pre-Mk2GB shots to mk2a).
    #
    # The FLUSH files are 2-column (R,Z) plain-text format, one segment each.
    # EFIT files are 3-column (R,Z,segment) with up to 3 segments;
    # parse_limiter_file() handles both formats transparently.
    limiter_dir: /home/chain1/input/efit/Limiters
    flush_dir: /usr/local/data/flush
    limiter_versions:
      - name: Limiter
        first_shot: 1
        last_shot: 28791
        description: >-
          Pre-divertor JET first wall — large symmetric limiter contour
          (102 R,Z points, R∈[1.73, 4.15], Z∈[-2.07, 2.07]).
          Carbon wall + belt limiter configuration (1983-1991).
          File "L91NEW" in /usr/local/data/flush/.
        file: L91NEW
        source_dir: /usr/local/data/flush
        n_points: 102
      - name: Mk1
        first_shot: 28792
        last_shot: 35778
        description: >-
          Mark I divertor — JET's first divertor (78 R,Z points,
          R∈[1.81, 3.90], Z∈[-1.78, 2.02]). Installed 1994.
          File "mark1" in /usr/local/data/flush/.
        file: mark1
        source_dir: /usr/local/data/flush
        n_points: 78
      - name: Mk2A
        first_shot: 35779
        last_shot: 45155
        description: >-
          Mark IIA Gas Box divertor (110 R,Z points). Installed 1996.
          FLUSH file "mark2ap". Also available as limiter.mk2a in EFIT
          Limiters (3-segment format, 108 pts in segment 0).
        file: mark2ap
        source_dir: /usr/local/data/flush
        n_points: 110
      - name: Mk2GB
        first_shot: 45156
        last_shot: 54549
        description: "Mark 2 Gas Box (1999). 142 R,Z points."
        file: mark2gb
        source_dir: /usr/local/data/flush
        n_points: 142
      - name: Mk2GB-SR
        first_shot: 54550
        last_shot: 63445
        description: "Mark 2 Gas Box septum removed (2002). 126 R,Z points."
        file: mark2gb-sr
        source_dir: /usr/local/data/flush
        n_points: 126
      - name: Mk2HD
        first_shot: 63446
        last_shot: 79853
        description: "Mark 2 High Delta divertor (2005). 115 R,Z points."
        file: mark2hd
        source_dir: /usr/local/data/flush
        n_points: 115
      - name: Mk2ILW
        first_shot: 79854
        description: "ITER-Like Wall — beryllium/tungsten (2011-2023). 251 R,Z points."
        file: mark2ilw
        source_dir: /usr/local/data/flush
        n_points: 251

  # Static file-based data sources for machine description.
  # Each entry is typed via StaticSourceConfig — validated against schema.
  static_sources:
    # JEC2020 — EFIT++ equilibrium code input XMLs.
    # Next-generation geometry files with richer metadata than legacy device XMLs.
    # Symlinked from /home/chain1/jec2020/ → live_chain1/source/jec2020/input_jec2020/active/
    - name: jec2020_geometry
      description: EFIT++ equilibrium code geometry files (XML format)
      format: xml
      base_dir: /home/chain1/jec2020
      reference_shot: 79951
      files:
        - path: limiter.xml
          role: limiter
          description: ILW first wall contour at T=200°C (248+ R,Z points)
          expected_count: 248
        - path: magnetics.xml
          role: magnetics
          description: 95 magnetic probes + 36 flux loops with dual PPF/JPF sources
          expected_count: 131
        - path: pfSystems.xml
          role: pf_coils
          description: 20 PF coils + 10 circuits with multi-element sub-coil geometry
          expected_count: 20
        - path: ironBoundaries3.xml
          role: iron_core
          description: 96 iron core boundary segments with permeabilities
          expected_count: 96

    # MCFG — Magnetics calibration and sensor configuration system.
    # Managed by MAGNW group. Tracks sensor positions (CATIA CAD) and
    # calibration gains/offsets per-pulse.
    - name: sensor_calibration
      description: Magnetics sensor positions and calibration epochs
      format: text
      base_dir: /home/MAGNW/chain1/input
      files:
        - path: PPFcfg/sensors_200c_2019-03-11.txt
          role: sensors
          description: Canonical sensor R,Z,angle positions from CATIA CAD (238 coils)
          expected_count: 238
        - path: magn_ep_2019-05-14/MCFG.ix
          role: calibration_index
          description: 77 calibration epoch entries (pulse 54283–93563)
          expected_count: 77
      # Historical sensor position file versions.
      # Tracks sensor geometry refinements over 14 years (2005–2019).
      # Each version supersedes the previous. The parser ingests all
      # versions and creates SUPERSEDES relationships between them.
      sensor_versions:
        - file: sensors-200c-12-05-04.txt
          path: /home/chain1/input/magn90/
          date: "2005-10-12"
        - file: sensors_200c_15-09-04_3.txt
          path: /home/MAGNW/chain1/input/PPFcfg/
          date: "2015-09-04"
        - file: sensors_200c_15-10-05.txt
          path: /home/MAGNW/chain1/input/PPFcfg/
          date: "2015-10-05"
        - file: sensors_200c_2019-03-11.txt
          path: /home/MAGNW/chain1/input/PPFcfg/
          date: "2019-03-11"

    # Magnetics PPF sensor configuration — maps shot ranges to sensor sets.
    # Each config file defines which magnetic sensors are active for a
    # range of pulses, with JPF addresses, PPF signal names, geometry
    # (R, Z, angle), and calibration factors. The indexr file provides
    # the shot-range → config-file mapping. Covers the full operational
    # history from shot 1 (1983) through shot 90538 (pre-final EFIT++ era).
    - name: magnetics_config
      description: Magnetics sensor configuration per epoch (JPF→PPF mapping, geometry, calibration)
      format: text
      base_dir: /home/chain1/input/magn/config
      index_file: /home/chain1/input/magn/config/indexr
      files:
        - path: indexr
          role: index
          description: Shot-range to config file mapping (12 entries covering shots 1–90538)
          expected_count: 12

    # PF coil circuit turns — defines turns ratios for PF coil circuits.
    # Used by equilibrium codes to compute coil currents from circuit currents.
    - name: pf_coil_turns
      description: PF coil circuit-to-turns mapping for current calculations
      format: text
      base_dir: /home/chain1/input/pfcu
      files:
        - path: cturns
          role: coil_turns
          description: PF coil turns ratios per circuit

    # Greens table version-to-shot mapping — maps shot ranges to precomputed
    # Green's function tables used by EFIT for the magnetic equilibrium solve.
    - name: greens_table
      description: Green's function table version-to-shot mapping for EFIT
      format: text
      base_dir: /home/chain1/input/efit
      files:
        - path: green_list
          role: greens_index
          description: Shot-range to Green's table version mapping


excludes:
  directories:
    - /scratch
    - /tmp
    - /var/tmp
  patterns:
    - '*.dat.old'
    - '*.backup'
    - '*.bak'

# Data access patterns discovered during facility exploration.
data_access_patterns:
  primary_method: ppf
  shot_identifier: pulse
  signal_naming: >-
    PPF hierarchy: owner/dda/dtype (e.g., jetppf/EFIT/Q95).
    Python PPF API: ppf.ppfdata(pulse, dda, dtype, uid=owner) returns (data, x, t, ier).
    PPF function catalog: ppfget (single signal), ppfdata (full signal with time),
    ppfdda (list DDAs for pulse), ppfdti (list dtypes in DDA), ppfdsq (list sequences),
    ppfgo (open pulse context), ppfuid (set default user), ppfssr (set signal read),
    ppfgsf (get scale factor), pdauth (authenticate write access).
    JPF (raw) access via getdat CLI: getdat <pulse> <system>/<node> (e.g., getdat 99896 da/c2-ipla).
  tree_organization: >-
    PPF by Diagnostic Data Area (DDA): EFIT (equilibrium), KK3 (ECE),
    KG1V (interferometer), BOLO (bolometry), MAGN (magnetics), etc.
    Each DDA contains typed data items (Dtypes) like Q95, TE, NE.
    JPF system provides raw hardware signals organized by system/node path.
  key_tools:
    - ppfget
    - ppfdata
    - ppfdda
    - ppfdti
    - ppfdsq
    - ppfgo
    - ppfuid
    - getdat
    - sal
    - efit
    - jpf
  wiki_signal_patterns:
    - DDA/Dtype catalog tables
    - diagnostic signal listings
    - EFIT equilibrium quantities
    - PPF owner/DDA/Dtype references
    - JPF system/node path tables
    - getdat command examples
  code_import_patterns:
    - from jet.data import sal
    - import ppf
    - ppfget(
    - ppfdata(
    - ppfdda(
    - ppfdti(
    - ppfgo(
    - getdat
    - import sal
    - jet.data.sal
    - ppf.ppfget
    - ppf.ppfdata
  notes:
    - "PPF via ppfget/ppfdata (libppf.so ctypes), getdat for JPF raw signals"
    - "MDSplus thin-client at mdsplus.jet.uk — TDI functions only, no trees"
    - "1448 TDI functions, 287 JET-specific across jpf/ppf/cmg/dgm/flush"
    - "Machine description in EFIT device XMLs + chain1 files, not MDSplus"
    - "SAL REST at sal.jet.uk — not responding as of exploration (2026)"
    - "IMAS modules exist but import fails on current Python (dead end)"

# Discovery root paths for path discovery pipeline
# These are seeded as starting points for directory scanning
discovery_roots:
  - /home                          # User home directories
  - /work                          # Work area (shared scratch/projects)
  - /common                        # Shared resources
  - /common/IMAS                   # IMAS installation and tools
  - /common/EFDA-CODES             # EUROfusion shared codes
  - /jet/share                     # JET shared codes and tools
  - /jet/share/src                 # JET source code repository

# User info discovery configuration
# GECOS = General Comprehensive Operating System (5th field in /etc/passwd)
user_info:
  name_format: first_last  # Standard "First Last" format
  lookup_tools:  # Ordered fallback list
    - getent   # POSIX standard, includes LDAP/NIS/SSSD
    - passwd   # /etc/passwd fallback
    - id       # existence check only

