# JET - Joint European Torus
#
# Public facility configuration for graph and mappings.
# Infrastructure data is in jet_private.yaml (gitignored).

facility: jet
name: JET (Joint European Torus)
machine: JET
description: Joint European Torus - EUROfusion operated tokamak
location: Culham, United Kingdom

# SSH connection (user configures ~/.ssh/config with this alias)
ssh_host: jet

# Data system configuration for signal discovery
# Used by: imas-codex discover signals jet
data_systems:
  # PPF is JET's primary processed data system.
  # Organized as Owner/DDA/Dtype. Accessed via SAL REST API, ppfget, or getdat.
  ppf:
    sal_endpoint: https://sal.jet.uk  # SAL REST API
    reference_pulse: 99896
    default_owner: jetppf
    # Python interpreter with numpy for ppf array handling
    python_command: /common/software/micromamba/root/envs/python-3.12-minibundle/bin/python3
    # Module loads for PPF library access
    setup_commands:
      - source /etc/profile.d/modules.sh
      - module load jet/1.0
    # Exclude DDAs with raw/engineering data (high volume, low physics value)
    exclude_ddas: []
    # PPF signals containing static machine description data.
    # Accessible via MDSplus thin-client: ppf("DDA/DTYPE", shot).
    static_signals:
      - name: EFIT/RLIM
        description: Limiter R coordinates (251 points, static across ILW)
        static: true
        expected_shape: [1, 251]
      - name: EFIT/ZLIM
        description: Limiter Z coordinates (251 points, static across ILW)
        static: true
        expected_shape: [1, 251]
      - name: EFIT/RBND
        description: Plasma boundary R (time-resolved, 947×105)
        static: false
        expected_shape: [947, 105]
      - name: EFIT/ZBND
        description: Plasma boundary Z (time-resolved, 947×105)
        static: false
        expected_shape: [947, 105]
      - name: LIDR/Z
        description: LIDAR Thomson scattering Z positions (50 points, static)
        static: true
        expected_shape: [50]
      - name: VESL/CROS
        description: Vessel cross-section contour
        static: true

  # MDSplus thin-client access via TDI functions.
  # JET's MDSplus server does NOT use traditional tree-based access.
  # All data is accessed via TDI function calls over a thin-client
  # connection (MDSplus.Connection). JPF raw hardware signals and
  # PPF processed data are both accessible through this interface.
  mdsplus:
    server: mdsplus.jet.uk
    connection_type: thin_client  # Remote via MDSplus.Connection (vs TCV's local tree access)
    reference_shot: 99896
    python_command: /common/software/micromamba/root/envs/python-3.12-minibundle/bin/python3
    setup_commands:
      - source /etc/profile.d/modules.sh
      - module load jet/1.0
    # JPF subsystem codes (32 subsystems, 2-char codes)
    # Discovered via jpfsubsystems() TDI function
    jpf_subsystems:
      - DA  # Diagnostics A
      - DB  # Diagnostics B
      - DC  # Diagnostics C
      - DD  # Diagnostics D
      - DE  # Diagnostics E
      - DF  # Diagnostics F
      - DG  # Diagnostics G
      - DH  # Diagnostics H
      - DI  # Diagnostics I
      - PF  # Poloidal Field
      - TF  # Toroidal Field
      - PL  # Plasma
      - GS  # Gas
      - VC  # Vacuum
      - AH  # Additional Heating
      - RF  # Radio Frequency
      - CC  # Central Control
      - LH  # Lower Hybrid
      - MC  # Machine Control
      - NM  # Neutron Monitoring
      - PD  # PD subsystem
      - PM  # PM subsystem
      - SA  # Safety A
      - SC  # Safety C
      - SS  # SS subsystem
      - TB  # TB subsystem
      - XC  # XC subsystem
      - XG  # XG subsystem
      - YC  # YC subsystem
      - YD  # YD subsystem
      - YE  # YE subsystem
      - DJ  # DJ subsystem
    # TDI data access functions available on the server
    tdi_access_functions:
      jpf: dpf("{subsystem}/{signal}", {shot})     # Raw JPF signals
      ppf: ppf("{dda}/{dtype}", {shot})             # Processed PPF data
      jpf_subsystems: jpfsubsystems()               # List all JPF subsystem codes
      jpf_active: jpfincludedsubsystems({shot})     # Active subsystems for a shot
      ppf_info: ppfsignalinfo("{dda}")               # PPF DDA metadata

  # IMAS data available post-migration
  imas:
    backends:
      - mdsplus
    db_name: jet

  # Machine description — geometry data for JET's tokamak components.
  # Accessed via the DeviceXMLScanner plugin (scanner_type: device_xml).
  # Geometry lives in EFIT device XMLs, Fortran namelists, and R,Z contour
  # files, versioned in a git repo. EFIT's PulseDependencyDB provides the
  # epoch boundaries. The data itself is machine geometry, not EFIT-specific.
  device_xml:
    # Git bare repo containing versioned geometry files
    git_repo: /home/chain1/git/efit_f90.git
    # Source repo tree path prefix for input files
    input_prefix: JET/input
    # Machine configuration epochs. Each represents a hardware state
    # valid for a pulse range. Epoch boundaries come from EFIT's
    # PulseDependencyDB but describe machine state, not EFIT config.
    # Only base configurations listed (EFCC sessions reuse geometry).
    # snap_file tracks which probes were enabled/disabled per epoch.
    # Machine configuration epochs. Each represents a hardware state
    # valid for a pulse range. Epoch boundaries from EFIT's PulseDependencyDB
    # (configurationsMAGN). All 14 base configurations listed — EFCC sessions
    # (p68967_efcc1, p70468_efcc2, p78814_efcc2, p79854_efcc1/efcc2) reuse
    # the same device XML and limiter, changing only snap_file and Green's.
    versions:
      - version: p68613
        first_shot: 68613
        last_shot: 74386
        description: "Baseline — 71 pick-ups, DMSS=91, Mk2HD limiter"
        device_xml: Devices/device_p68613.xml
