    # Systems extracted from device XMLs — analogous to TCV static tree systems
    systems:
      - symbol: PF
        name: Poloidal field coils
        description: "22 PF coils: P1-P4 (central solenoid), DSH/DSV (divertor shaping), and circuit groups"
        size: 22
        parameters: [R, Z, W, H, TURNS, RESISTANCE]
      - symbol: PS
        name: Passive structures
        description: "48 passive conducting elements (vessel wall, stabilizing plates)"
        size: 48
        parameters: [R, Z, W, H, RESISTANCE]
      - symbol: MP
        name: Magnetic probes (pick-up coils)
        description: "BPME saddle coils — count varies by config (71-95 fitted pick-ups)"
        parameters: [R, Z, ANG, AREA, TURNS]
      - symbol: FL
        name: Flux loops
        description: "36 diamagnetic/saddle flux loops (SX/SY naming)"
        size: 36
        parameters: [R, Z, ANG, AREA]
      - symbol: CI
        name: Circuit-to-coil mappings
        description: "10 PF circuits mapping coils to power supply connections"
        size: 10
        parameters: [COILS, TURNS_RATIO]
      - symbol: LIM
        name: Limiter contour
        description: "First wall R,Z contour — 5 versions: Mk2A (shots 1-44414), Mk2GB, Mk2GB-NS, Mk2HD, Mk2ILW"
        parameters: [R, Z]
    # Limiter contour versions (independent of device XML structural epochs).
    # Each entry is a first-wall geometry that was physically installed.
    # The R,Z contour files define the plasma-facing boundary shape.
    #
    # Sources:
    #   - Git repo: /home/chain1/git/efit_f90.git (3 files: mk2gb_ns_cc, mk2hd_cc, mk2ilw_cc)
    #   - Frozen chain1 efit: /home/chain1/input/efit/Limiters/ (4 files: mk2a, mk2gb, mk2gb_ns, mk2hd)
    #   - Frozen chain1 efit_f90: /home/chain1/input/efit_f90/Limiters/ (3 files: mk2gb_ns_cc, mk2hd_cc, mk2ilw_cc)
    #   - Authoritative shot-to-file mapping: /home/chain1/input/efit/limiter_list
    #     1-44414 → mk2a, 44415-54351 → mk2gb, 54352-63445 → mk2gb_ns, 63446-99999 → mk2hd
    #
    # The mk2a file (108 R,Z points + 12 vacuum vessel + 5 centre column)
    # covers ALL shots 1-44414, spanning the L91NEW, Mk1, and Mk2A hardware
    # eras. While the physical first wall changed between these eras, EFIT
    # used a single contour file for the entire pre-Mk2GB period.
    #
    # JEC2020 limiter.xml provides a separate high-resolution (248+ pt) ILW
    # contour at T=200°C, valid from shot 79951. See static_sources below.
    limiter_dir: /home/chain1/input/efit/Limiters
    limiter_versions:
      - name: Mk2A
        first_shot: 1
        last_shot: 44414
        description: >-
          Pre-Mk2GB contour (108 R,Z pts + 12 vacuum vessel + 5 centre column).
          Covers L91NEW (limiter, 1983-1991), Mk1 (divertor, 1994-1995), and
          Mk2A Gas Box (1998) eras. Single file used by EFIT for all shots 1-44414.
        file: limiter.mk2a
        source_dir: /home/chain1/input/efit/Limiters
        n_points: 108
      - name: Mk2GB
        first_shot: 44415
        last_shot: 54351
        description: "Mark 2 Gas Box (2002). 193-line contour file."
        file: limiter.mk2gb
        source_dir: /home/chain1/input/efit/Limiters
      - name: Mk2GB-NS
        first_shot: 54352
        last_shot: 63445
        description: "Mark 2 Gas Box with new septum (2006). 220-line contour file."
        file: limiter.mk2gb_ns
        source_dir: /home/chain1/input/efit/Limiters
      - name: Mk2HD
        first_shot: 63446
        last_shot: 79853
        description: "Mark 2 High Delta divertor (2008). 117-line contour file."
        file: limiter.mk2hd
        source_dir: /home/chain1/input/efit/Limiters
      - name: Mk2ILW
        first_shot: 79854
        description: "ITER-Like Wall — beryllium/tungsten (2011-2023)"
        file: limiter.mk2ilw_cc
        n_points: 251

  # Static file-based data sources for machine description.
  # Each entry is typed via StaticSourceConfig — validated against schema.
  static_sources:
    # JEC2020 — EFIT++ equilibrium code input XMLs.
    # Next-generation geometry files with richer metadata than legacy device XMLs.
    # Symlinked from /home/chain1/jec2020/ → live_chain1/source/jec2020/input_jec2020/active/
    - name: jec2020_geometry
      description: EFIT++ equilibrium code geometry files (XML format)
      format: xml
      base_dir: /home/chain1/jec2020
      reference_shot: 79951
      files:
        - path: limiter.xml
          role: limiter
          description: ILW first wall contour at T=200°C (248+ R,Z points)
          expected_count: 248
        - path: magnetics.xml
          role: magnetics
          description: 95 magnetic probes + 36 flux loops with dual PPF/JPF sources
          expected_count: 131
        - path: pfSystems.xml
          role: pf_coils
          description: 20 PF coils + 10 circuits with multi-element sub-coil geometry
          expected_count: 20
        - path: ironBoundaries3.xml
          role: iron_core
          description: 96 iron core boundary segments with permeabilities
          expected_count: 96

    # MCFG — Magnetics calibration and sensor configuration system.
    # Managed by MAGNW group. Tracks sensor positions (CATIA CAD) and
    # calibration gains/offsets per-pulse.
    - name: sensor_calibration
      description: Magnetics sensor positions and calibration epochs
      format: text
      base_dir: /home/MAGNW/chain1/input
      files:
        - path: PPFcfg/sensors_200c_2019-03-11.txt
          role: sensors
          description: Canonical sensor R,Z,angle positions from CATIA CAD (238 coils)
          expected_count: 238
        - path: magn_ep_2019-05-14/MCFG.ix
          role: calibration_index
          description: 77 calibration epoch entries (pulse 54283–93563)
          expected_count: 77


# Data access patterns discovered during facility exploration.
data_access_patterns:
  primary_method: ppf
  shot_identifier: pulse
  signal_naming: >-
    PPF hierarchy: owner/dda/dtype (e.g., jetppf/EFIT/Q95).
    Python PPF API: ppf.ppfdata(pulse, dda, dtype, uid=owner) returns (data, x, t, ier).
    PPF function catalog: ppfget (single signal), ppfdata (full signal with time),
    ppfdda (list DDAs for pulse), ppfdti (list dtypes in DDA), ppfdsq (list sequences),
    ppfgo (open pulse context), ppfuid (set default user), ppfssr (set signal read),
    ppfgsf (get scale factor), pdauth (authenticate write access).
    JPF (raw) access via getdat CLI: getdat <pulse> <system>/<node> (e.g., getdat 99896 da/c2-ipla).
  tree_organization: >-
    PPF by Diagnostic Data Area (DDA): EFIT (equilibrium), KK3 (ECE),
    KG1V (interferometer), BOLO (bolometry), MAGN (magnetics), etc.
    Each DDA contains typed data items (Dtypes) like Q95, TE, NE.
    JPF system provides raw hardware signals organized by system/node path.
  key_tools:
    - ppfget
    - ppfdata
    - ppfdda
    - ppfdti
    - ppfdsq
    - ppfgo
    - ppfuid
    - getdat
    - sal
    - efit
    - jpf
  wiki_signal_patterns:
    - DDA/Dtype catalog tables
    - diagnostic signal listings
    - EFIT equilibrium quantities
    - PPF owner/DDA/Dtype references
    - JPF system/node path tables
    - getdat command examples
  code_import_patterns:
    - from jet.data import sal
    - import ppf
    - ppfget(
    - ppfdata(
    - ppfdda(
    - ppfdti(
    - ppfgo(
    - getdat
    - import sal
    - jet.data.sal
    - ppf.ppfget
    - ppf.ppfdata
  notes:
    - "PPF via ppfget/ppfdata (libppf.so ctypes), getdat for JPF raw signals"
    - "MDSplus thin-client at mdsplus.jet.uk — TDI functions only, no trees"
    - "1448 TDI functions, 287 JET-specific across jpf/ppf/cmg/dgm/flush"
    - "Machine description in EFIT device XMLs + chain1 files, not MDSplus"
    - "SAL REST at sal.jet.uk — not responding as of exploration (2026)"
    - "IMAS modules exist but import fails on current Python (dead end)"

# Discovery root paths for path discovery pipeline
# These are seeded as starting points for directory scanning
discovery_roots:
  - /home                          # User home directories
  - /work                          # Work area (shared scratch/projects)
  - /common                        # Shared resources
  - /common/IMAS                   # IMAS installation and tools
  - /common/EFDA-CODES             # EUROfusion shared codes
  - /jet/share                     # JET shared codes and tools
  - /jet/share/src                 # JET source code repository

# User info discovery configuration
# GECOS = General Comprehensive Operating System (5th field in /etc/passwd)
user_info:
  name_format: first_last  # Standard "First Last" format
  lookup_tools:  # Ordered fallback list
    - getent   # POSIX standard, includes LDAP/NIS/SSSD
    - passwd   # /etc/passwd fallback
    - id       # existence check only

