# JET - Joint European Torus
#
# Public facility configuration for graph and mappings.
# Infrastructure data is in jet_private.yaml (gitignored).

facility: jet
name: JET (Joint European Torus)
machine: JET
description: Joint European Torus - EUROfusion operated tokamak
location: Culham, United Kingdom

# SSH connection (user configures ~/.ssh/config with this alias)
ssh_host: jet

# Data systems available at this facility
data_systems:
  - ppf    # JET Processed Pulse File system
  - uda    # Universal Data Access (SAL)
  - imas   # IMAS data format
  - mdsplus  # MDSplus (limited use)

# Data source configuration for signal discovery
# Used by: imas-codex discover signals jet
data_sources:
  # PPF is JET's primary processed data system.
  # Organized as Owner/DDA/Dtype. Accessed via SAL REST API, ppfget, or getdat.
  ppf:
    sal_endpoint: https://sal.jet.uk  # SAL REST API
    reference_pulse: 99896
    default_owner: jetppf
    # Python interpreter with numpy for ppf array handling
    python_command: /common/software/micromamba/root/envs/python-3.12-minibundle/bin/python3
    # Module loads for PPF library access
    setup_commands:
      - source /etc/profile.d/modules.sh
      - module load jet/1.0
    # Exclude DDAs with raw/engineering data (high volume, low physics value)
    exclude_ddas: []

  # IMAS data available post-migration
  imas:
    backends:
      - mdsplus
    db_name: jet

  # Machine description — geometry data for JET's tokamak components.
  # JET has no MDSplus static tree. Geometry lives in device XMLs, Fortran
  # namelists, and R,Z contour files, versioned in a git repo.
  # The upstream sources are CATIA CAD models, engineering drawings, and
  # sensor installation records (MCFG system). EFIT's PulseDependencyDB
  # provides the best extant record of epoch boundaries (when hardware
  # changed), so we use its named configurations as version markers.
  # The data itself is machine geometry, not EFIT-specific.
  machine_description:
    # Source format for this facility's machine description
    source_format: git_xml  # alternatives: mdsplus_tree (TCV), imas_ids (ITER)
    # Git bare repo containing versioned geometry files
    git_repo: /home/chain1/git/efit_f90.git
    # Source repo tree path prefix for input files
    input_prefix: JET/input
    # Machine configuration epochs. Each represents a hardware state
    # valid for a pulse range. Epoch boundaries come from EFIT's
    # PulseDependencyDB but describe machine state, not EFIT config.
    # Only base configurations listed (EFCC sessions reuse geometry).
    versions:
      - version: p68613
        first_shot: 68613
        last_shot: 74386
        description: "Baseline — 71 pick-ups, DMSS=91, Mk2HD limiter"
        device_xml: Devices/device_p68613.xml
        device_ppfs: Devices/MAGN/device_ppfs
        limiter: Limiters/limiter.mk2hd_cc
        greens: Greens/DMSS_091_T_200C/
      - version: p78359
        first_shot: 78359
        last_shot: 79853
        description: "New PFC config DMSS=105, P801B broken"
        device_xml: Devices/device_p68613.xml
        device_ppfs: Devices/MAGN/device_ppfs
        limiter: Limiters/limiter.mk2hd_cc
        greens: Greens/DMSS_105_T_200C/
      - version: p79854
        first_shot: 79854
        last_shot: 81133
        description: "2011 ILW restart — Mk2ILW first wall"
        device_xml: Devices/device_p68613.xml
        device_ppfs: Devices/MAGN/device_ppfs
        limiter: Limiters/limiter.mk2ilw_cc
        greens: Greens/DMSS_105_T_200C/
      - version: p81134
        first_shot: 81134
        last_shot: 87026
        description: "P804B probe reinstated"
        device_xml: Devices/device_p68613.xml
        device_ppfs: Devices/MAGN/device_ppfs
        limiter: Limiters/limiter.mk2ilw_cc
        greens: Greens/DMSS_105_T_200C/
      - version: p87027
        first_shot: 87027
        last_shot: 87721
        description: "P804B/P805B broken, removed from fit"
        device_xml: Devices/device_p68613.xml
        device_ppfs: Devices/MAGN/device_ppfs
        limiter: Limiters/limiter.mk2ilw_cc
        greens: Greens/DMSS_105_T_200C/
      - version: p87722
        first_shot: 87722
        last_shot: 88367
        description: "P803B→P803A probe replacement, new device XML and Green's"
        device_xml: Devices/device_p87722.xml
        device_ppfs: Devices/MAGN/device_ppfs
        limiter: Limiters/limiter.mk2ilw_cc
        greens: Greens/DMSS_105_T_200C_P803A/
      - version: p88368
        first_shot: 88368
        last_shot: 89430
        description: "UP4E4 coordinates for BPME(91), new device XML"
        device_xml: Devices/device_p88368.xml
        device_ppfs: Devices/MAGN/device_ppfs
        limiter: Limiters/limiter.mk2ilw_cc
        greens: Greens/DMSS_105_T_200C_UP4E4/
      - version: p89440
        first_shot: 89440
        last_shot: 90539
        description: "P802B→P802A, new calibration, new device XML and Green's"
        device_xml: Devices/device_p89440.xml
        device_ppfs: Devices/MAGN/device_ppfs
        limiter: Limiters/limiter.mk2ilw_cc
        greens: Greens/DMSS_105_T_200C_P802A/
      - version: p90626
        first_shot: 90626
        description: "I802+I803 failed, disabled — FINAL config through end of JET"
        device_xml: Devices/device_p89440.xml
        device_ppfs: Devices/MAGN/device_ppfs
        limiter: Limiters/limiter.mk2ilw_cc
        greens: Greens/DMSS_105_T_200C_P802A/
    # Systems extracted from device XMLs — analogous to TCV static tree systems
    systems:
      - symbol: PF
        name: Poloidal field coils
        description: "22 PF coils: P1-P4 (central solenoid), DSH/DSV (divertor shaping), and circuit groups"
        size: 22
        parameters: [R, Z, W, H, TURNS, RESISTANCE]
      - symbol: PS
        name: Passive structures
        description: "48 passive conducting elements (vessel wall, stabilizing plates)"
        size: 48
        parameters: [R, Z, W, H, RESISTANCE]
      - symbol: MP
        name: Magnetic probes (pick-up coils)
        description: "BPME saddle coils — count varies by config (71-95 fitted pick-ups)"
        parameters: [R, Z, ANG, AREA, TURNS]
      - symbol: FL
        name: Flux loops
        description: "36 diamagnetic/saddle flux loops (SX/SY naming)"
        size: 36
        parameters: [R, Z, ANG, AREA]
      - symbol: CI
        name: Circuit-to-coil mappings
        description: "10 PF circuits mapping coils to power supply connections"
        size: 10
        parameters: [COILS, TURNS_RATIO]
      - symbol: LIM
        name: Limiter contour
        description: "First wall R,Z contour — 7 versions from L91NEW through Mk2ILW"
        parameters: [R, Z]
    # Limiter contour versions (independent of device XML epochs)
    limiter_epochs:
      - name: L91NEW
        first_shot: 1
        last_shot: 28791
        file: Limiters/limiter.L91NEW
      - name: Mk1
        first_shot: 28792
        last_shot: 35778
      - name: Mk2A
        first_shot: 35779
        last_shot: 45155
      - name: Mk2GB
        first_shot: 45156
        last_shot: 54549
        file: Limiters/limiter.mk2gb_ns_cc
      - name: Mk2GB-SR
        first_shot: 54550
        last_shot: 63445
      - name: Mk2HD
        first_shot: 63446
        last_shot: 79853
        file: Limiters/limiter.mk2hd_cc
      - name: Mk2ILW
        first_shot: 79854
        description: "ITER-Like Wall (beryllium/tungsten)"
        file: Limiters/limiter.mk2ilw_cc

# Data access patterns discovered during facility exploration.
data_access_patterns:
  primary_method: ppf
  shot_identifier: pulse
  signal_naming: >-
    PPF hierarchy: owner/dda/dtype (e.g., jetppf/EFIT/Q95).
    Python PPF API: ppf.ppfdata(pulse, dda, dtype, uid=owner) returns (data, x, t, ier).
    PPF function catalog: ppfget (single signal), ppfdata (full signal with time),
    ppfdda (list DDAs for pulse), ppfdti (list dtypes in DDA), ppfdsq (list sequences),
    ppfgo (open pulse context), ppfuid (set default user), ppfssr (set signal read),
    ppfgsf (get scale factor), pdauth (authenticate write access).
    JPF (raw) access via getdat CLI: getdat <pulse> <system>/<node> (e.g., getdat 99896 da/c2-ipla).
  tree_organization: >-
    PPF by Diagnostic Data Area (DDA): EFIT (equilibrium), KK3 (ECE),
    KG1V (interferometer), BOLO (bolometry), MAGN (magnetics), etc.
    Each DDA contains typed data items (Dtypes) like Q95, TE, NE.
    JPF system provides raw hardware signals organized by system/node path.
  key_tools:
    - ppfget
    - ppfdata
    - ppfdda
    - ppfdti
    - ppfdsq
    - ppfgo
    - ppfuid
    - getdat
    - sal
    - efit
    - jpf
  wiki_signal_patterns:
    - DDA/Dtype catalog tables
    - diagnostic signal listings
    - EFIT equilibrium quantities
    - PPF owner/DDA/Dtype references
    - JPF system/node path tables
    - getdat command examples
  code_import_patterns:
    - from jet.data import sal
    - import ppf
    - ppfget(
    - ppfdata(
    - ppfdda(
    - ppfdti(
    - ppfgo(
    - getdat
    - import sal
    - jet.data.sal
    - ppf.ppfget
    - ppf.ppfdata
  notes:
    - "PPF Python API at /jet/share/DEPOT/pyppf/21260/lib/python/ppf.py - 35+ functions via ctypes to libppf.so"
    - "Key PPF functions: ppfget, ppfdata, ppfdda, ppfdti, ppfdsq, ppfgo, ppfuid, ppfssr, ppfgsf, pdauth"
    - "getdat CLI at /jet/share/bin/getdat - confirmed working: getdat 99896 da/c2-ipla returns plasma current"
    - "JPF system: raw hardware signals, accessed via getdat <pulse> <system>/<node>"
    - "Octave PPF wrappers at /jet/share/DEPOT/OctavePPF/21012/octave/ppf/ (ppfget.m, ppfdda.m, etc.)"
    - "Octave JPF wrappers at /jet/share/DEPOT/OctaveJPF/21024/octave/jpf/ (jpfdat.m, jpfcats.m, jpflist.m)"
    - "libppf.so at /jet/share/lib/libppf.so - native PPF library used by Python/C/Fortran"
    - "UDA modules available (2.6.1 default) but cpyuda Python import fails"
    - "IMAS modules available but import imas fails on default Python"
    - "No SAL REST endpoint responding at sal.jet.uk during SSH exploration"
    # ── Machine Description ──────────────────────────────────────────────
    # No centralized static tree (unlike TCV). Geometry data lives in EFIT
    # input files, versioned in git (/home/chain1/git/efit_f90.git).
    # PulseDependencyDB maps pulse ranges → named configurations, each
    # specifying device XML, device_ppfs, limiter contour, and Green's functions.
    - >-
      MACHINE DESCRIPTION OVERVIEW: No single MDSplus machine description tree.
      Instead, geometry is managed by EFIT's PulseDependencyDB system:
      (1) EFIT device XML files — PF coils (22), passive structures (48), sensors, circuits;
      (2) device_ppfs namelists — PPF DDA routing for each EFIT variant (MAGN/MAGF/MAGJ/MGZJ);
      (3) Limiter contour text files — pulse-range-indexed wall geometry (7 configurations);
      (4) MCFG sensor config system — canonical sensor positions from CATIA CAD;
      (5) Green's function directories — precomputed response matrices per device configuration;
      (6) CATIA CAD models at /home/fda/db/ (PF_TF_COIL_OCT3.model, STRUCTURE_AND_VESSEL_ASSY);
      (7) EFIT++ response function NetCDF at /common/chain1/efitpp/response_functions/.
    # ── Canonical Git Repository ───────────────────────────────────────
    - >-
      CANONICAL GIT REPO: /home/chain1/git/efit_f90.git — bare git repo,
      single 'master' branch, 108 tags (Lx099-0 through Lx103-77).
      HEAD commit 50a3e3b (2018-01-26, "Pulse ranges for EHPB").
      No remote configured (SVN server decomissioned). Contains full EFIT source,
      device XMLs, device_ppfs, PulseDependencyDB, limiter files, and Green's functions.
      This is the most authoritative and up-to-date VCS for JET machine description.
      Tags correspond to EFIT release versions deployed to intershot/chain1 systems.
    # ── EFIT Device XML System ─────────────────────────────────────────
    - >-
      EFIT DEVICE XML: Six device XML generations in the git repo, each corresponding
      to hardware changes (probe replacements, failures, recalibrations):
        device_p68613.xml — baseline (71 pick-ups, 144KB)
        device_p72258.xml — 95 pick-ups, 147KB (reprocessing; not used in git HEAD configs)
        device_p87722.xml — probe P803B→P803A replacement, 2014
        device_p88368.xml — UP4E4 coordinates for BPME(91)
        device_p89440.xml — probe P802B→P802A replacement, 2015
      Each has _bvch.xml and _efcc[12].xml variants for boundary/EFCC modes.
      Original SVN repo (fussvn.fusion.culham.ukaea.org.uk) is unreachable post-Culham
      domain decommissioning. Last SVN revision: 208 by vdrozdov, 2012-05-01.
    # ── device_ppfs — PPF DDA Routing Namelist ─────────────────────────
    - >-
      DEVICE_PPFS: Fortran namelist (&ppfin_namelist) mapping PPF DDAs for EFIT input.
      Controls which DDA to read for: bvac_r, ip, dflux, flux, magprobes, pfcircuits
      (typically MAGN), plus interferometry (KG1V), HRTS, polarimetry (KG4), MSE,
      and pressure (PRES). Points to device XML path via device_xml field.
      Git repo has device_ppfs for all 4 DDA types × 3 variants = 12 files:
        MAGN/device_ppfs[_efcc1|_efcc2] → MAGN DDA (~1000 timepoints)
        MAGF/device_ppfs[_efcc1|_efcc2] → MAGF DDA (fast, ~7000 timepoints)
        MAGJ/device_ppfs[_efcc1|_efcc2] → MAGJ DDA
        MGZJ/device_ppfs[_efcc1|_efcc2] → MGZJ DDA
      pfcircuits always reads from MAGN regardless of variant.
    - >-
      DEVICE_PPFS USAGE: The git HEAD configurationsMAGN uses device_ppfs
      (inputfile input/device → Devices/MAGN/device_ppfs). This is the canonical
      pattern. The frozen production copy at /home/chain1/input/efit_f90/ (last
      modified 2011) maps input/device directly to XML files — an older pattern
      predating the device_ppfs abstraction. vdrozdov's intershot deployment at
      /home/vdrozdov/intershot/source/efit_f90/input_efit_f90/Devices/ (2012-04-20)
      also uses device_ppfs with symlinks (MAGN/device_ppfs → ../device_ppfs).
    # ── PulseDependencyDB — Shot-to-Configuration Mapping ──────────────
    - >-
      PULSEDEPENDENCYDB: Shot-to-configuration mapping in EFIT.db
      (git HEAD: /home/chain1/git/efit_f90.git). EFIT.db #includes configurationsMAGN
      (and configurationsMGZJ, configurationsBVCH for other DDAs).
      The git HEAD EFIT.db maps 16 named configurations across pulses 68613→999999:
        p68613 (68613-74386): baseline, 71 pick-ups, DMSS=91, Mk2HD limiter
        p74387 (74387-78167): FLME(3) timing issue
        p78168 (78168-78358): P801B broken
        p78359 (78359-78460): new PFC DMSS=105
        p78461 (78461-78563): DMSS=108 transition
        p79854 (79854-81133): ILW first wall (2011 restart), Mk2ILW limiter
        p81134 (81134-87026): P804B probe turned on
        p87027 (87027-87721): P804B/P805B broken and removed
        p87722 (87722-88367): P803B→P803A probe replacement, new device XML
        p88368 (88368-89430): UP4E4 coordinates for BPME(91), new device XML
        p89431 (89431-89439): P802B broke, BPME(42) disabled
        p89440 (89440-90539): P802B→P802A replacement, new device XML + Green's
        p90540 (90540-90625): I803/BPME(57) failed
        p90626 (90626-999999): I802/BPME(56) failed — FINAL CONFIGURATION
      EFCC sessions (n=1 → MNEA DDA, n=2 → MNEB DDA) interleaved throughout.
      The p90626 config covers ALL pulses from 92061 to end of JET operations (~104522, Dec 2023).
      No machine description change occurred after April 2016.
    # ── MCFG Sensor Configuration ──────────────────────────────────────
    - >-
      MCFG SENSOR CONFIG: /home/MAGNW/chain1/input/magn_ep_2019-05-14/ (symlinked from magn_ep_new).
      Master index MCFG.ix tracks pulse-dependent sensor calibration versions from 2002-2019.
      Latest: 2019-05-14 pulse 93563 by Sergei Gerasimov, sensors_200c_2019-03-11.txt.
      Sensor positions at /home/MAGNW/chain1/input/PPFcfg/sensors_200c_2019-03-11.txt (423 lines).
      Header: "JET Magnetic Sensor Model @DIA001160_02-A CATIA Reference Model.
      Coordinates at 200C Operating Temperature. 26-March-2002 Cliff Marren/Sergei Gerasimov".
      MAG_.master in make/ is a CPP preprocessor source compiled with defines
      (_MAGF_EP, _MAGN_EP etc.) to generate variant magn_ep .dat files.
    - >-
      MAGNETICS CHAIN1 CONFIG: /home/MAGNW/chain1/input/xloc/config/ contains probe definition files
      (pd04_ep: 40 BPME pick-up coils with R,Z,angle; limves: 28 flux loops SX/SY with R,Z + calibration;
      pdvessr: vessel-referenced probe positions). Master config at /home/MAGNW/chain1/input/magn_ep_new/magn_ep.dat.
    # ── Limiter Contours ───────────────────────────────────────────────
    - >-
      LIMITER CONTOURS: Plain R,Z text files in efit_f90 input Limiters/ directory.
      Current contours: limiter.mk2ilw_cc (251 pts, ILW — current wall),
      limiter.mk2hd_cc (116 pts, pre-ILW), limiter.mk2gb_ns_cc (126 pts, Mk2GB).
      Pulse range index at limiter_list.dat maps wall configurations to shot ranges:
      L91NEW (1-28791), Mk1 (28792-35778), Mk2A (35779-45155), Mk2GB (45156-54549),
      Mk2GB-SR (54550-63445), Mk2HD (63446-79853), Mk2ILW (79854-present).
      EFIT RLIM,ZLIM PPF contains the 251-pt contour (identical across ILW pulses).
      Vessel PPF source: /home/awhitef/vessel_ppf/Mk2GB.txt (141 pts) → VESL/CROS PPF pulse 42529.
    # ── CATIA CAD & Green's Functions ──────────────────────────────────
    - >-
      CATIA 3D CAD MODELS: /home/fda/db/ — PF_TF_COIL_OCT3.model (2.7MB),
      STRUCTURE_AND_VESSEL_ASSY_OCT3.model (2.1MB), LIMBS-COILS/ (individual coil models).
      All dated June 2002. CalCam 3D mesh: /home/cxs/machine_geometry/JET/ (21 OBJ files, ~500MB).
      SURF visualization tool data: /home/dmcd/surf_test_input/ has FC_coordinates.dat (flux coils),
      wall geometry files (mark1 through mk2ilw), overlays, and diagnostic positions.
    - >-
      GREEN'S FUNCTIONS: /home/efit/efit_f90/input/Greens/Greens_EFUND_JET/ — computed by efund-jet
      from coil geometry. Variants: JET_EP_71_DMSS_91, JET_EP_71_DMSS_105, JET_EP_95_DMSS_91.
      Default symlink → JET_EP_71_DMSS_105. Chain1 Greens use naming convention
      DMSS_{091,105,108}_T_200C with nbpol_71 suffix.
    # ── Data Provenance Chains ─────────────────────────────────────────
    - >-
      DATA PROVENANCE:
      Sensors: CATIA CAD @DIA001160_02-A → sensors_200c_*.txt → MAG_.master (CPP) → magn_ep.dat → MCFG PPF → EFIT.
      PF Coils: Engineering drawings → device_p*.xml in efit_f90 git → intershot/production copies.
      Wall: R,Z text files (limiter.mk2ilw_cc etc.) indexed by limiter_list.dat → EFIT/RLIM,ZLIM PPF.
      Vessel: Mk2GB.txt → VESL/CROS PPF (pulse 42529, written by awhitef via IDL vessel_ppf.pro).
      All geometry data versioned in /home/chain1/git/efit_f90.git (108 tags, 2015-2018).
    - >-
      STATIC PPF ACCESS: ppf.ppfget(pulse, DDA, Dtype) with ppfuid('jetppf','r').
      Static signals (identical across ILW pulses): EFIT/RLIM,ZLIM (251-pt limiter), LIDR/Z (50-pt),
      KG10/Z (scalar 0.258m). Quasi-static (minor recalibration): KG1V/R,Z (8-ch), HRTS/Z (63-pt).
    # ── IMAS Investigation ─────────────────────────────────────────────
    - >-
      IMAS ON JET: Dead end for machine description. /common/IMAS/ exists with module
      imas/3.19.1/ual/3.8.2, but requires Python 2.7/3.5 (import imp). System Python is 3.13.
      IMAS databases under ETS users (dcoster, fcasson, mroma, rcoel, wpz) contain only
      shot-specific data, no machine description IDSs.
    - >-
      EFIT++ RESPONSE FUNCTIONS: /common/chain1/efitpp/response_functions/jet/all_magnetics_C38/
      responseFunctions_jet_33x33.nc contains Green's function matrices linking 33x33 grid to 321 probes,
      150 flux loops, 10 PF circuits, 96 iron model basis functions, plus firstWallGrid (200 R,Z points,
      R=[1.65,4.05]m, Z=[-1.90,2.15]m).

# Discovery root paths for path discovery pipeline
# These are seeded as starting points for directory scanning
discovery_roots:
  - /home                          # User home directories
  - /work                          # Work area (shared scratch/projects)
  - /common                        # Shared resources
  - /common/IMAS                   # IMAS installation and tools
  - /common/EFDA-CODES             # EUROfusion shared codes
  - /jet/share                     # JET shared codes and tools
  - /jet/share/src                 # JET source code repository

# User info discovery configuration
# GECOS = General Comprehensive Operating System (5th field in /etc/passwd)
user_info:
  name_format: first_last  # Standard "First Last" format
  lookup_tools:  # Ordered fallback list
    - getent   # POSIX standard, includes LDAP/NIS/SSSD
    - passwd   # /etc/passwd fallback
    - id       # existence check only

# Wiki/documentation sites
# JET Data Centre hosts 16 separate MediaWiki instances at wiki.jetdata.eu
# Each is a distinct site for different task forces/groups

# Common defaults for all JET wiki sites
_wiki_defaults: &wiki_defaults
  portal_page: Main_Page
  site_type: mediawiki
  access_method: direct      # Accessible via browser with login
  auth_type: keycloak        # Keycloak OIDC via oauth2-proxy at auth.jetdata.eu
  credential_service: jet
  ssh_available: true        # SSH tunnel also possible via JET host

