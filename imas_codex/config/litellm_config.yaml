# imas-codex LiteLLM Proxy — Multi-Tenant Configuration
#
# Start: imas-codex llm start
# Or:    litellm --config imas_codex/config/litellm_config.yaml
#
# Multi-tenant gateway with per-team virtual keys and separate
# OpenRouter API keys for spend isolation. Teams and keys are
# managed via the LiteLLM API and stored in the SQLite database.
#
# Credentials are env-sourced. Virtual keys (per-team) are managed
# via `imas-codex llm keys create` or the /key/generate API.

# ── Credentials ──────────────────────────────────────────────
# Each credential maps to a separate OpenRouter API key for
# independent spend tracking at the billing level.
#
# - openrouter-imas-codex:    Internal use (discovery workers, MCP agents)
# - openrouter-claude-code:   Claude Code clients
#
# Create additional OpenRouter keys at https://openrouter.ai/settings/keys
#
# api_base routes through OpenRouter's OpenAI-compatible endpoint.
# Using openai/ provider prefix (not openrouter/) ensures correct
# model name handling for both /v1/chat/completions and /v1/messages.
credential_list:
  - credential_name: openrouter-imas-codex
    credential_values:
      api_key: os.environ/OPENROUTER_API_KEY_IMAS_CODEX
      api_base: https://openrouter.ai/api/v1
    credential_info:
      description: "imas-codex internal use (discovery, agents, MCP)"

  - credential_name: openrouter-claude-code
    credential_values:
      api_key: os.environ/OPENROUTER_API_KEY_CLAUDE_CODE
      api_base: https://openrouter.ai/api/v1
    credential_info:
      description: "Claude Code clients"

# ── Model Definitions ───────────────────────────────────────
# All models use openai/ provider prefix with api_base pointing
# to OpenRouter. This ensures both /v1/chat/completions and
# /v1/messages (Anthropic format) work correctly.
#
# OpenRouter model IDs:
#   anthropic/claude-opus-4-6
#   anthropic/claude-sonnet-4-6
#   google/gemini-3-flash-preview
#   google/gemini-3-pro-preview
#   openai/gpt-5.4
#   openai/gpt-5.4-mini
#
# Composition: each model defined once; credential selected
# by the virtual key's team, not duplicated per team.
model_list:
  # ── Anthropic Claude ───────────────────────────────────
  - model_name: opus
    litellm_params:
      model: openai/anthropic/claude-opus-4-6
      litellm_credential_name: openrouter-imas-codex

  - model_name: sonnet
    litellm_params:
      model: openai/anthropic/claude-sonnet-4-6
      litellm_credential_name: openrouter-imas-codex

  # ── Google Gemini ──────────────────────────────────────
  - model_name: gemini-flash
    litellm_params:
      model: openai/google/gemini-3-flash-preview
      litellm_credential_name: openrouter-imas-codex

  - model_name: gemini-pro
    litellm_params:
      model: openai/google/gemini-3-pro-preview
      litellm_credential_name: openrouter-imas-codex

  # ── OpenAI GPT ─────────────────────────────────────────
  - model_name: gpt
    litellm_params:
      model: openai/openai/gpt-5.4
      litellm_credential_name: openrouter-imas-codex

  - model_name: gpt-mini
    litellm_params:
      model: openai/openai/gpt-5.4-mini
      litellm_credential_name: openrouter-imas-codex

  # ── Anthropic full-name aliases ──────────────────────
  # Claude Code resolves short names to full Anthropic IDs.
  # These ensure e.g. claude-sonnet-4-6 routes correctly
  # instead of falling through to the wildcard.
  - model_name: claude-opus-4-6
    litellm_params:
      model: openai/anthropic/claude-opus-4-6
      litellm_credential_name: openrouter-imas-codex

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: openai/anthropic/claude-sonnet-4-6
      litellm_credential_name: openrouter-imas-codex

  # ── Task aliases ───────────────────────────────────────
  - model_name: reasoning
    litellm_params:
      model: openai/anthropic/claude-sonnet-4-6
      litellm_credential_name: openrouter-imas-codex

  - model_name: scoring
    litellm_params:
      model: openai/google/gemini-3-flash-preview
      litellm_credential_name: openrouter-imas-codex

  # ── Passthrough wildcard ───────────────────────────────
  - model_name: "*"
    litellm_params:
      model: "openai/*"
      litellm_credential_name: openrouter-imas-codex

  # ── Local models (Phase 6 — Titan cluster) ────────────
  # Uncomment when Ollama is deployed on Titan
  # - model_name: qwen3-14b
  #   litellm_params:
  #     model: ollama/qwen3:14b-q4_K_M
  #     api_base: http://98dci4-gpu-0002:11434

litellm_settings:
  drop_params: true
  num_retries: 3
  request_timeout: 120
  # Langfuse cost tracking — requires: pip install langfuse
  # and LANGFUSE_PUBLIC_KEY + LANGFUSE_SECRET_KEY env vars.
  # Callbacks are set dynamically by the llm start command when
  # langfuse is available, so they are not hardcoded here.

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/LITELLM_DATABASE_URL
