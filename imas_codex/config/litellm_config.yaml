# LiteLLM Proxy — imas-codex
#
# Client → LiteLLM (localhost:18400) → OpenRouter → provider
#
# Spend isolation is key-based:
#   Master key  → alias map strips openrouter/ prefix → model_list → codex credential
#   Virtual key → team model_aliases → cc: model_list → claude-code credential
#
# Why model_alias_map exists:
#   The litellm client prepends openrouter/ to model names for cache_control
#   preservation. The alias map strips this prefix to match model_list names.
#
# Adding a model:
#   1. Add to model_list with canonical provider/model name
#   2. Add openrouter/ alias to model_alias_map
#   3. If Claude Code needs it: add one cc: line via YAML merge

credential_list:
  - credential_name: codex
    credential_values:
      api_key: os.environ/OPENROUTER_API_KEY_IMAS_CODEX
      api_base: https://openrouter.ai/api/v1
    credential_info:
      description: "OpenAI-compatible (Gemini, GPT)"

  - credential_name: codex-anthropic
    credential_values:
      api_key: os.environ/OPENROUTER_API_KEY_IMAS_CODEX
      api_base: https://openrouter.ai/api
    credential_info:
      description: "Anthropic-native (cache_control)"

  - credential_name: claude-code
    credential_values:
      api_key: os.environ/OPENROUTER_API_KEY_CLAUDE_CODE
      api_base: https://openrouter.ai/api
    credential_info:
      description: "Claude Code (separate billing)"

model_list:
  # ── Anthropic (/api — preserves cache_control) ────────
  - model_name: anthropic/claude-opus-4-6
    litellm_params: &opus
      model: anthropic/claude-opus-4-6
      litellm_credential_name: codex-anthropic
      extra_headers: &hdr
        X-Title: imas-codex
        HTTP-Referer: https://github.com/iterorganization/imas-codex

  - model_name: anthropic/claude-sonnet-4-6
    litellm_params: &sonnet
      model: anthropic/claude-sonnet-4-6
      litellm_credential_name: codex-anthropic
      extra_headers: *hdr

  - model_name: anthropic/claude-haiku-4-5
    litellm_params: &haiku
      model: anthropic/claude-haiku-4-5
      litellm_credential_name: codex-anthropic
      extra_headers: *hdr

  # ── Google Gemini (/api/v1 — OpenAI-compatible) ────────
  - model_name: google/gemini-3.1-flash-lite-preview
    litellm_params:
      model: openai/google/gemini-3.1-flash-lite-preview
      litellm_credential_name: codex
      extra_headers: *hdr

  - model_name: google/gemini-3.1-pro-preview
    litellm_params:
      model: openai/google/gemini-3.1-pro-preview
      litellm_credential_name: codex
      extra_headers: *hdr

  # ── OpenAI GPT (/api/v1 — OpenAI-compatible) ──────────
  - model_name: openai/gpt-4o
    litellm_params:
      model: openai/openai/gpt-4o
      litellm_credential_name: codex
      extra_headers: *hdr

  - model_name: openai/gpt-4o-mini
    litellm_params:
      model: openai/openai/gpt-4o-mini
      litellm_credential_name: codex
      extra_headers: *hdr

  # ── Claude Code (separate billing) ─────────────────────
  # Virtual key → claude-code team → model_aliases → cc:*
  - model_name: cc:opus
    litellm_params: {<<: *opus, litellm_credential_name: claude-code}

  - model_name: cc:sonnet
    litellm_params: {<<: *sonnet, litellm_credential_name: claude-code}

  - model_name: cc:haiku
    litellm_params: {<<: *haiku, litellm_credential_name: claude-code}

litellm_settings:
  drop_params: true
  num_retries: 3
  request_timeout: 120
  health_check_interval: 0
  # Strip openrouter/ prefix added by litellm client (for cache_control)
  model_alias_map:
    openrouter/anthropic/claude-opus-4-6: anthropic/claude-opus-4-6
    openrouter/anthropic/claude-sonnet-4-6: anthropic/claude-sonnet-4-6
    openrouter/anthropic/claude-haiku-4-5: anthropic/claude-haiku-4-5
    openrouter/google/gemini-3.1-flash-lite-preview: google/gemini-3.1-flash-lite-preview
    openrouter/google/gemini-3.1-pro-preview: google/gemini-3.1-pro-preview
    openrouter/openai/gpt-4o: openai/gpt-4o
    openrouter/openai/gpt-4o-mini: openai/gpt-4o-mini

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/LITELLM_DATABASE_URL
