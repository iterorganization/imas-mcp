# imas-codex LiteLLM Proxy — Multi-Tenant Configuration
#
# Start: imas-codex llm start
# Or:    litellm --config imas_codex/config/litellm_config.yaml
#
# Multi-tenant gateway with per-team virtual keys and separate
# OpenRouter API keys for spend isolation. Teams and keys are
# managed via the LiteLLM API and stored in the SQLite database.
#
# Credentials are env-sourced. Virtual keys (per-team) are managed
# via `imas-codex llm keys create` or the /key/generate API.

# ── Credentials ──────────────────────────────────────────────
# Each credential maps to a separate OpenRouter API key for
# independent spend tracking at the billing level.
#
# Two api_base variants per key:
#   /api/v1  — OpenAI-compatible (Gemini, GPT, wildcard)
#   /api     — Anthropic-native  (Claude, preserves cache_control)
#
# Create additional OpenRouter keys at https://openrouter.ai/settings/keys
credential_list:
  # ── imas-codex internal ────────────────────────────────
  - credential_name: openrouter-imas-codex
    credential_values:
      api_key: os.environ/OPENROUTER_API_KEY_IMAS_CODEX
      api_base: https://openrouter.ai/api/v1
    credential_info:
      description: "imas-codex internal (OpenAI-format models)"

  - credential_name: openrouter-imas-codex-anthropic
    credential_values:
      api_key: os.environ/OPENROUTER_API_KEY_IMAS_CODEX
      api_base: https://openrouter.ai/api
    credential_info:
      description: "imas-codex internal (Anthropic-format, cache_control)"

  # ── Claude Code ────────────────────────────────────────
  - credential_name: openrouter-claude-code
    credential_values:
      api_key: os.environ/OPENROUTER_API_KEY_CLAUDE_CODE
      api_base: https://openrouter.ai/api/v1
    credential_info:
      description: "Claude Code clients (OpenAI-format models)"

  - credential_name: openrouter-claude-code-anthropic
    credential_values:
      api_key: os.environ/OPENROUTER_API_KEY_CLAUDE_CODE
      api_base: https://openrouter.ai/api
    credential_info:
      description: "Claude Code clients (Anthropic-format, cache_control)"

# ── Model Definitions ───────────────────────────────────────
# Anthropic Claude models use anthropic/ provider prefix with
# api_base pointing to OpenRouter's /api endpoint. The Anthropic
# SDK sends to {api_base}/v1/messages, which OpenRouter supports
# natively — preserving cache_control blocks for prompt caching.
#
# Non-Anthropic models (Gemini, GPT) use openai/ provider prefix
# with api_base pointing to OpenRouter's /api/v1 endpoint.
#
# OpenRouter model IDs:
#   anthropic/claude-opus-4-6
#   anthropic/claude-sonnet-4-6
#   google/gemini-3-flash-preview
#   google/gemini-3-pro-preview
#   openai/gpt-5.4
#   openai/gpt-5.4-mini
model_list:
  # ── Anthropic Claude (native format, cache_control) ────
  - model_name: opus
    litellm_params:
      model: anthropic/claude-opus-4-6
      litellm_credential_name: openrouter-imas-codex-anthropic

  - model_name: sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      litellm_credential_name: openrouter-imas-codex-anthropic

  - model_name: claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      litellm_credential_name: openrouter-imas-codex-anthropic

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      litellm_credential_name: openrouter-imas-codex-anthropic

  # ── Google Gemini (OpenAI-format) ──────────────────────
  - model_name: gemini-flash
    litellm_params:
      model: openai/google/gemini-3-flash-preview
      litellm_credential_name: openrouter-imas-codex

  - model_name: gemini-pro
    litellm_params:
      model: openai/google/gemini-3-pro-preview
      litellm_credential_name: openrouter-imas-codex

  # ── OpenAI GPT (OpenAI-format) ────────────────────────
  - model_name: gpt
    litellm_params:
      model: openai/openai/gpt-5.4
      litellm_credential_name: openrouter-imas-codex

  - model_name: gpt-mini
    litellm_params:
      model: openai/openai/gpt-5.4-mini
      litellm_credential_name: openrouter-imas-codex

  # ── Task aliases ───────────────────────────────────────
  - model_name: reasoning
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      litellm_credential_name: openrouter-imas-codex-anthropic

  - model_name: scoring
    litellm_params:
      model: openai/google/gemini-3-flash-preview
      litellm_credential_name: openrouter-imas-codex

  # ── Passthrough wildcard (OpenAI-format) ───────────────
  - model_name: "*"
    litellm_params:
      model: "openai/*"
      litellm_credential_name: openrouter-imas-codex

  # ── Local models (Phase 6 — Titan cluster) ────────────
  # Uncomment when Ollama is deployed on Titan
  # - model_name: qwen3-14b
  #   litellm_params:
  #     model: ollama/qwen3:14b-q4_K_M
  #     api_base: http://98dci4-gpu-0002:11434

litellm_settings:
  drop_params: true
  num_retries: 3
  request_timeout: 120

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/LITELLM_DATABASE_URL
