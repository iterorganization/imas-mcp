# IMAS Data Dictionary Knowledge Graph Schema
#
# This schema defines the graph representation of the IMAS Data Dictionary,
# enabling version tracking, compliance checking, and cross-linking with
# facility-specific data.
#
# Design follows the "Super Tree" pattern from MDSplus ingestion:
# - Store unified graph with applicability ranges (introduced/deprecated versions)
# - Augment rather than rebuild (shared with facility knowledge)
#
# Generated models: imas_codex/graph/models.py
# To regenerate: uv run build-models --force
#
# See plans/IMAS_DD_GRAPH.md for design decisions and rationale.

id: https://imas.iter.org/schemas/imas_dd
name: imas_dd
title: IMAS Data Dictionary Knowledge Graph Schema
description: >-
  Graph representation of the IMAS Data Dictionary with version tracking,
  coordinate linking, and semantic clustering.

license: MIT
version: 0.4.0

prefixes:
  linkml: https://w3id.org/linkml/
  imas_dd: https://imas.iter.org/schemas/imas_dd/
  imas: https://imas.iter.org/

default_prefix: imas_dd
default_range: string

imports:
  - linkml:types
  - common
  - standard_name

# =============================================================================
# Enums
# =============================================================================

enums:
  DDDataType:
    description: IMAS Data Dictionary data types
    permissible_values:
      STR_0D:
        description: Scalar string
      STR_1D:
        description: 1D array of strings
      INT_0D:
        description: Scalar integer
      INT_1D:
        description: 1D array of integers
      INT_2D:
        description: 2D array of integers
      INT_3D:
        description: 3D array of integers
      FLT_0D:
        description: Scalar float
      FLT_1D:
        description: 1D array of floats
      FLT_2D:
        description: 2D array of floats
      FLT_3D:
        description: 3D array of floats
      FLT_4D:
        description: 4D array of floats
      FLT_5D:
        description: 5D array of floats
      FLT_6D:
        description: 6D array of floats
      CPX_0D:
        description: Scalar complex
      CPX_1D:
        description: 1D array of complex
      CPX_2D:
        description: 2D array of complex
      CPX_3D:
        description: 3D array of complex
      CPX_4D:
        description: 4D array of complex
      CPX_5D:
        description: 5D array of complex
      STRUCTURE:
        description: Container structure (no data)
      STRUCT_ARRAY:
        description: Array of structures

  DDNodeType:
    description: Time-variation character of DD nodes
    permissible_values:
      dynamic:
        description: Data varying in time within the IDS
      constant:
        description: Data not varying within the IDS
      static:
        description: Data not varying between IDSs
      none:
        description: No time-variation character assigned

  COCOSLabelTransformation:
    description: >-
      COCOS transformation labels from the DD XML cocos_label_transformation
      attribute. Each label identifies a class of fields that transform
      together under COCOS sign changes (e.g., all psi_like fields flip
      sign between COCOS 11 and 17).
    permissible_values:
      psi_like:
        description: Poloidal flux (ψ) and related quantities
      dodpsi_like:
        description: Derivatives with respect to ψ (dX/dψ)
      ip_like:
        description: Plasma current and related quantities
      b0_like:
        description: Toroidal magnetic field and related quantities
      q_like:
        description: Safety factor and related quantities
      tor_angle_like:
        description: Toroidal angle (φ) and related quantities
      pol_angle_like:
        description: Poloidal angle (θ) and related quantities
      one_like:
        description: Quantities with unit transformation factor
      grid_type_dim1_like:
        description: Grid dimension 1 coordinate
      grid_type_dim2_like:
        description: Grid dimension 2 coordinate
      grid_type_dim1_dim1_like:
        description: Grid dimension 1×1 tensor component
      grid_type_dim1_dim2_like:
        description: Grid dimension 1×2 tensor component
      grid_type_dim1_dim3_like:
        description: Grid dimension 1×3 tensor component
      grid_type_dim2_dim2_like:
        description: Grid dimension 2×2 tensor component
      grid_type_dim2_dim3_like:
        description: Grid dimension 2×3 tensor component
      grid_type_dim3_dim3_like:
        description: Grid dimension 3×3 tensor component
      grid_type_tensor_covariant_like:
        description: Covariant tensor component
      grid_type_tensor_contravariant_like:
        description: Contravariant tensor component

  LifecycleStatus:
    description: >-
      IMAS Data Dictionary lifecycle status for IDS and field definitions.
      Extracted from the lifecycle_status XML attribute.
    permissible_values:
      active:
        description: Stable, actively maintained definition
      alpha:
        description: Experimental definition, subject to change
      obsolescent:
        description: Deprecated definition, scheduled for removal

  IDSType:
    description: >-
      IMAS IDS temporal classification from the DD XML type attribute.
    permissible_values:
      dynamic:
        description: IDS containing time-varying data
      constant:
        description: IDS containing data constant over a pulse

  ChangeType:
    description: Types of metadata changes between DD versions
    permissible_values:
      units:
        description: Units changed
      documentation:
        description: Documentation text changed
      type:
        description: Data type or node type changed
      coordinates:
        description: Coordinate specification changed
      lifecycle:
        description: Lifecycle status changed (e.g., obsolete)
      maxoccur:
        description: Maximum occurrences changed
      node_type:
        description: Time-variation character (node type) changed
      data_type:
        description: Data type changed (e.g., FLT_1D to FLT_2D)
      cocos_label_transformation:
        description: COCOS transformation label changed (e.g., field gained or lost COCOS sensitivity)
      lifecycle_status:
        description: Lifecycle status changed (e.g., alpha to active)
      timebasepath:
        description: Time base path reference changed
      path_added:
        description: Path introduced in this version
      path_removed:
        description: Path removed/deprecated in this version
      path_renamed:
        description: Path renamed (old_value=previous path, new_value=new path)
      structure_changed:
        description: Structural change (array dims, parent hierarchy)
      coordinates_changed:
        description: Coordinate specification changed
      maxoccur_changed:
        description: Max occurrences changed
      convention_change:
        description: >-
          Data format or interpretation convention changed without type/path change.
          The field retains its name and data type but values have different meaning
          across versions. Requires non-trivial data transformation during conversion.

  SemanticChangeType:
    description: Physics significance of documentation changes
    permissible_values:
      sign_convention:
        description: Sign or orientation convention change (affects data interpretation)
      coordinate_convention:
        description: Coordinate system or reference frame change
      definition_clarification:
        description: More precise definition without semantic change
      data_format_change:
        description: >-
          The numeric encoding or dimensionality convention changed. The field name
          and data type are preserved but values have fundamentally different meaning
          across versions. Requires data transformation (not just sign flip).
      none:
        description: No physics significance detected

  IMASNodeStatus:
    description: >-
      Pipeline lifecycle status for IMASNode paths during DD build.
      Tracks progress through the build → enrich → embed pipeline.
      Worker coordination uses claimed_at timestamps, not status values.
    permissible_values:
      built:
        description: Path node created in graph from DD XML extraction
      enriched:
        description: LLM-generated description and keywords populated
      embedded:
        description: Vector embedding generated from enriched description

  NodeCategory:
    description: >-
      Classification of IMASNode fields for filtering. Determines whether
      a node participates in enrichment, embedding, and search pipelines.
    permissible_values:
      data:
        description: Physics data fields (enriched, embedded, searchable)
      error:
        description: Uncertainty bound fields (_error_upper, _error_lower, _error_index)
      metadata:
        description: Bookkeeping subtrees (ids_properties, code, identifier descriptors)

  DDVersionStatus:
    description: >-
      Pipeline lifecycle status for DDVersion nodes during DD build.
      Tracks whether a version's paths have been extracted and built.
    permissible_values:
      extracted:
        description: DD XML parsed, paths extracted to in-memory data
      built:
        description: All paths for this version written to graph

  EmbeddingChangeType:
    description: >-
      Types of embedding content changes detected between DD versions.
      Recorded on EmbeddingChange nodes to track what specifically changed
      in an IMASNode's embedding text.
    permissible_values:
      UNITS_CHANGED:
        description: Physical units changed
      DOCUMENTATION_CHANGED:
        description: Documentation text changed
      COORDINATES_CHANGED:
        description: Coordinate specification changed
      DATA_TYPE_CHANGED:
        description: Data type changed
      PHYSICS_DOMAIN_CHANGED:
        description: Physics domain changed
      IDS_CONTEXT_CHANGED:
        description: IDS context description changed

  UnitChangeSubtype:
    description: Classification of unit change based on pint normalization
    permissible_values:
      sentinel_resolved:
        description: Placeholder (as_parent, etc.) resolved to concrete unit
      dim_equivalent:
        description: Different symbol, same physical dimension (e.g. J.m^-3 to Pa)
      dim_incompatible:
        description: Genuinely different physical dimension (breaking change)

  BreakingChangeLevel:
    description: Severity classification for DD changes
    permissible_values:
      breaking:
        description: Requires code changes (sign convention flip, type change, incompatible units, COCOS label change)
      advisory:
        description: May affect interpretation but does not break interfaces (path rename, doc clarification, lifecycle, equivalent unit, coordinate convention)
      informational:
        description: No code impact (doc wording, NBC-handled renames, new paths, timebase changes)

# =============================================================================
# Classes
# =============================================================================

classes:
  DDVersion:
    description: >-
      A version of the IMAS Data Dictionary. Versions form a chain via
      PREDECESSOR relationships, enabling traversal of DD evolution.
      
      Embedding metadata tracks when embeddings were generated for this version,
      enabling cache validation and incremental updates.
    class_uri: imas_dd:DDVersion
    attributes:
      id:
        identifier: true
        description: Version string (e.g., "3.42.2", "4.0.0")
        required: true
      status:
        description: >-
          Pipeline lifecycle status: extracted → built.  Enables per-version
          incremental builds — versions with status=built are skipped.
        range: DDVersionStatus
      release_date:
        description: Release date of this DD version
        range: datetime
      is_current:
        description: Whether this is the current/latest version
        range: boolean
      path_count:
        description: Total number of paths in this version
        range: integer
      ids_count:
        description: Number of IDS definitions in this version
        range: integer
      predecessor:
        description: Previous DD version
        range: DDVersion
        annotations:
          relationship_type: HAS_PREDECESSOR
      successor:
        description: Next DD version in the chain
        range: DDVersion
        annotations:
          relationship_type: HAS_SUCCESSOR
      is_major_boundary:
        description: True if this version starts a new major series (e.g. 4.0.0)
        range: boolean
      breaking_change_count:
        description: Precomputed count of breaking changes introduced in this version
        range: integer
      advisory_change_count:
        description: Precomputed count of advisory changes introduced in this version
        range: integer
      total_change_count:
        description: Precomputed count of all changes introduced in this version
        range: integer
      # Embedding generation metadata
      embeddings_built_at:
        description: Timestamp when embeddings were generated for this version
        range: datetime
      embeddings_model:
        description: Model name used for embedding generation
      embeddings_count:
        description: Number of paths with embeddings in this version
        range: integer
      clusters_built_at:
        description: Timestamp when clusters were generated for this version
        range: datetime
      clusters_count:
        description: Number of clusters for this version
        range: integer
      cocos:
        description: >-
          COCOS convention for this DD version, extracted from the DD XML
          root <cocos> element. Values: 11 for DD 3.x (from 3.35.0), 17
          for DD 4.x. Null for versions before 3.35.0 where the XML did
          not declare COCOS.
        range: integer
      cocos_labeled_fields:
        description: >-
          Number of fields in this DD version that have a
          cocos_label_transformation attribute in the XML. Tracks the
          growth of COCOS annotation coverage across versions.
        range: integer
      has_cocos:
        description: >-
          Link to the COCOS node for this DD version. Enables graph traversal
          to find all entities sharing the same COCOS convention.
        range: COCOS
        annotations:
          relationship_type: HAS_COCOS
      build_hash:
        description: >-
          SHA256 hash of build parameters (DD versions, flags) for idempotency.
          If hash matches on next run, DD build is skipped. Replaces the
          former _GraphMeta.dd_build_hash property.
      cluster_input_hash:
        description: >-
          SHA256 hash of the set of embedded IMASNode path IDs used as input
          to clustering. If hash matches on next run, cluster rebuild is
          skipped (embedded path set unchanged).
      build_completed_at:
        description: Timestamp when the last build completed
        range: datetime
      build_duration:
        description: Wall-clock duration of the last build in seconds
        range: float
      build_cost:
        description: Total LLM cost of the last build in USD
        range: float
      enrichment_cost:
        description: LLM enrichment cost of the last build in USD
        range: float
      created_at:
        description: Timestamp when DDVersion node was created in the graph
        range: datetime
      release_version:
        description: Software version (e.g. "5.0.0rc19") used when releasing this DD version
      release_at:
        description: Timestamp when this DD version was released
        range: datetime
      release_message:
        description: Release message provided when tagging the release
      paths_built_at:
        description: >-
          Timestamp when this version's paths were extracted and written
          to the graph.  Enables per-version incremental builds — versions
          with paths_built_at set are skipped on subsequent runs.
        range: datetime

  IDS:
    description: >-
      A top-level Interface Data Structure definition. IDS nodes are the
      root containers for physics data (e.g., equilibrium, core_profiles).
    class_uri: imas_dd:IDS
    attributes:
      id:
        identifier: true
        description: IDS name (e.g., "equilibrium", "core_profiles")
        required: true
      name:
        description: IDS name, same as id
        required: true
      documentation:
        description: IDS description from DD documentation (raw XML text)
      physics_domain:
        description: Primary physics domain
        range: string
      path_count:
        description: Number of paths in this IDS (current version)
        range: integer
      leaf_count:
        description: Number of leaf nodes (data endpoints)
        range: integer
      max_depth:
        description: Maximum hierarchy depth
        range: integer
      documentation_coverage:
        description: Fraction of paths with documentation (0.0-1.0)
        range: float
      dd_version:
        description: Data Dictionary version string this IDS definition belongs to
      lifecycle_status:
        description: >-
          Lifecycle maturity status from the DD XML (active or alpha).
          Active IDS are stable; alpha IDS are experimental.
        range: LifecycleStatus
      lifecycle_version:
        description: >-
          DD version where this IDS was first introduced, as recorded in
          the DD XML lifecycle_version attribute.
      lifecycle_last_change:
        description: >-
          DD version where this IDS definition was last modified, as recorded
          in the DD XML lifecycle_last_change attribute.
      ids_type:
        description: >-
          Temporal classification of the IDS (dynamic or constant), from the
          DD XML type attribute.
        range: IDSType
      introduced_version:
        description: DD version where this IDS was introduced
        range: DDVersion
        annotations:
          relationship_type: INTRODUCED_IN
      deprecated_version:
        description: DD version where this IDS was deprecated (null = current)
        range: DDVersion
        annotations:
          relationship_type: DEPRECATED_IN
      # LLM enrichment fields
      description:
        description: >-
          LLM-generated physics-aware description of this IDS. Explains what
          physics the IDS captures, typical data sources, and relationships
          to other IDSs. Used for embedding and semantic search.
      keywords:
        description: >-
          LLM-generated searchable keywords (up to 8) for this IDS. Physics
          domains, measurement types, analysis methods.
        multivalued: true
      enrichment_hash:
        description: Hash of enrichment context + model for idempotency
      enrichment_source:
        description: Source of enrichment (llm)
      # Embedding for semantic search
      embedding:
        description: >-
          Embedding vector for semantic search over IDS nodes. Enables
          queries like "which IDS stores electron density profiles?"
        multivalued: true
        range: float
        annotations:
          vector_index_name: ids_embedding
      embedding_hash:
        description: Hash of text used for embedding, for cache busting

  IMASNode:
    description: >-
      An IMAS Data Dictionary path. Represents any level from IDS root
      (e.g., "equilibrium") to leaf nodes (e.g., "equilibrium/time_slice/boundary/psi").
      Paths form a hierarchy via PARENT relationships and link to units,
      coordinates, and semantic clusters. Version tracking uses
      INTRODUCED_IN/DEPRECATED_IN/RENAMED_TO relationships.
      
      Error field paths (e.g., psi_error_upper) are linked to their data paths
      via HAS_ERROR relationships. This allows semantic search to find the
      primary data path without embedding redundant error field descriptions.
      
      This is the single authoritative representation of IMAS paths - code
      references should link to existing IMASNode nodes, never create them
      on-demand.
      
      Embedding Support:
      - embedding_text: Pre-concatenated context for embedding generation
      - embedding: 256-dim vector (model tracked on DDVersion)
      - embedding_hash: Content hash for cache busting
      - Both active and deprecated data paths are embedded for evolution queries
      - Error fields and metadata paths are excluded from embedding
      - GGD paths are included by default (configurable)
    class_uri: imas_dd:IMASNode
    annotations:
      fulltext_index:
        tag: fulltext_index
        value: "imas_node_text:documentation,name,id,description,keywords"
    attributes:
      id:
        identifier: true
        description: Full path (e.g., "equilibrium/time_slice/boundary/psi")
        required: true
      name:
        description: Leaf name (last path component, e.g., "psi")
        required: true
      ids:
        description: IDS name (root of path hierarchy, e.g., "equilibrium")
        required: true
      status:
        description: >-
          Pipeline lifecycle status tracking progress through the DD build
          pipeline: built → enriched → embedded.  Workers claim paths by
          setting claimed_at, then advance the status on completion.
        range: IMASNodeStatus
        required: true
      node_category:
        description: >-
          Classification of this node for filtering: data (physics quantities),
          error (uncertainty bounds), or metadata (ids_properties, code subtrees,
          identifier descriptors). Determines participation in enrichment,
          embedding, and search pipelines. Set at build time by _classify_node().
        range: NodeCategory
      claimed_at:
        description: >-
          Timestamp when a worker claimed this node for processing.
          Non-null means a worker is actively processing this node.
          Stale claims (older than timeout) are auto-recovered.
        range: datetime
      documentation:
        description: Documentation string from DD
      data_type:
        description: Data type (e.g., FLT_1D, STR_0D, STRUCTURE)
        range: DDDataType
      ndim:
        description: Number of dimensions (0-6)
        range: integer
      node_type:
        description: Time-variation type (dynamic/constant/static)
        range: DDNodeType
      physics_domain:
        description: Physics domain (derived from path/IDS)
        range: string
      maxoccur:
        description: Maximum occurrences (for struct arrays)
        range: integer
      cocos_label_transformation:
        description: >-
          COCOS transformation label from the DD XML. Identifies which class
          of COCOS transformation applies to this field (e.g., psi_like fields
          flip sign between COCOS 11 and 17). Null for fields without COCOS
          sensitivity. Extracted from the cocos_label_transformation XML attribute.
        range: COCOSLabelTransformation
      cocos_transformation_expression:
        description: >-
          Algebraic COCOS transformation expression from the DD XML (e.g.,
          "- {psi_like}", "{ip_like} * {b0_like}"). Defines how this field
          transforms under COCOS convention changes in terms of fundamental
          COCOS-sensitive quantities. Null for fields without COCOS sensitivity.
      cocos_label_source:
        description: >-
          Source of the cocos_label_transformation value. 'xml' = from DD XML
          directly, 'inferred_forward' = carried from prior version,
          'inferred_backward' = from later version, 'inferred_expression' =
          parsed from cocos_transformation_expression, 'inferred_sign_flip' =
          from imas-python sign flip paths.
      depth:
        description: Nesting depth (number of '/' separators in path)
        range: integer
      is_leaf:
        description: Whether this is a leaf data node (not STRUCTURE/STRUCT_ARRAY)
        range: boolean
      path_lower:
        description: Lowercase path for case-insensitive CONTAINS queries
      doc_length:
        description: Length of documentation string
        range: integer
      lifecycle_status:
        description: >-
          Lifecycle maturity status. Resolved at build time: fields without
          an explicit lifecycle_status in the DD XML inherit from their
          parent IDS. All data nodes have an explicit value after build.
        range: LifecycleStatus
      lifecycle_version:
        description: >-
          DD version where this field's lifecycle status was set, from the
          DD XML lifecycle_version attribute.
      timebasepath:
        description: >-
          Path to the time array for this dynamic field, from the DD XML
          timebasepath attribute. Tells data access code where to find the
          time coordinate (e.g., "time" or "../time").
      path_doc:
        description: >-
          Human-readable path with index notation from the DD XML path_doc
          attribute (e.g., "time_slice(itime)/boundary/psi"). Differs from
          the machine-readable path used as the node ID.
      introduced_after_version:
        description: >-
          DD version after which this field was introduced, from the DD XML
          introduced_after_version attribute. Null for fields present since
          the IDS was created.
      change_nbc_version:
        description: >-
          DD version where a non-backward-compatible change was made to this
          field, from the DD XML change_nbc_version attribute.
      change_nbc_description:
        description: >-
          Description of the non-backward-compatible change (e.g.,
          "leaf_renamed", "type_changed"), from the DD XML.
      change_nbc_previous_name:
        description: >-
          Previous name of this field before a non-backward-compatible rename,
          from the DD XML change_nbc_previous_name attribute.
      change_nbc_previous_type:
        description: >-
          Previous data type of this field before a non-backward-compatible
          type change, from the DD XML change_nbc_previous_type attribute
          (e.g., "FLT_1D" when a field changed from 1D to 2D).
      url:
        description: >-
          URL to documentation or reference material for this field, from the
          DD XML url attribute. May be a relative path to IMAS docs or an
          absolute URL.
      unit:
        description: >-
          Normalized unit symbol string from the DD XML (e.g., 'Wb', 'T', 'eV').
          Stored as a direct property for convenient access alongside
          the HAS_UNIT relationship to Unit nodes. Normalized via pint
          to prevent duplicates.
      alternative_coordinate1:
        description: >-
          Alternative coordinate for the first dimension from the DD XML
          alternative_coordinate1 attribute. Specifies an OR-alternative
          coordinate axis that data access code may use instead of the
          primary coordinate1.
      # Relationships
      parent_path:
        description: Parent path in hierarchy (null for IDS-level paths)
        range: IMASNode
        annotations:
          relationship_type: HAS_PARENT
      in_ids:
        description: IDS that contains this path
        range: IDS
        annotations:
          relationship_type: IN_IDS
      has_unit:
        description: Physical units for this path (linked via HAS_UNIT relationship)
        range: Unit
        annotations:
          relationship_type: HAS_UNIT
      introduced_version:
        description: DD version where this path was introduced
        range: DDVersion
        annotations:
          relationship_type: INTRODUCED_IN
      deprecated_version:
        description: DD version where this path was deprecated (null = current)
        range: DDVersion
        annotations:
          relationship_type: DEPRECATED_IN
      renamed_to:
        description: Successor path if this was renamed (not just removed)
        range: IMASNode
        annotations:
          relationship_type: RENAMED_TO
      identifier_schema:
        description: Identifier schema if this is an identifier field
        range: IdentifierSchema
        annotations:
          relationship_type: HAS_IDENTIFIER_SCHEMA
      # Coordinate same-as metadata (per-dimension properties + relationships)
      coordinate_same_as:
        description: >-
          Paths sharing the same coordinate grid, linked via COORDINATE_SAME_AS
          relationships with a dimension property. Declares that this field's
          N-th array dimension is indexed by the same coordinate grid as the
          target field. Target uses DD path_doc notation with (iN) indices.
        multivalued: true
        range: IMASNode
        annotations:
          relationship_type: COORDINATE_SAME_AS
      coordinate1_same_as:
        description: >-
          Raw coordinate1_same_as value from DD XML. Intra-IDS relative path
          with (iN) index notation (e.g., "time_slice(itime)/profiles_1d/psi").
          Stored as-is for property-based discovery; also resolved to
          COORDINATE_SAME_AS relationships.
      coordinate2_same_as:
        description: >-
          Raw coordinate2_same_as value from DD XML for the second dimension.
      coordinate3_same_as:
        description: >-
          Raw coordinate3_same_as value from DD XML for the third dimension.
      coordinate4_same_as:
        description: >-
          Raw coordinate4_same_as value from DD XML for the fourth dimension.
      coordinate5_same_as:
        description: >-
          Raw coordinate5_same_as value from DD XML for the fifth dimension.
      coordinate6_same_as:
        description: >-
          Raw coordinate6_same_as value from DD XML for the sixth dimension.
      # LLM enrichment fields for semantic understanding
      description:
        description: >-
          LLM-generated physics-aware description of this IMAS path. Richer than
          the raw documentation field — explains what the quantity measures, its
          physical significance, and its role in the IDS structure. Stored
          separately from units, coordinates, and other metadata to avoid
          redundancy. Used as primary content for embedding generation when
          present.
      keywords:
        description: >-
          LLM-generated searchable keywords (max 5) for this path. Physics
          concepts, measurement types, and related terms not in the documentation.
        multivalued: true
      enrichment_hash:
        description: >-
          SHA256 hash of enrichment context + model name. Used for idempotent
          re-enrichment: if hash matches, skip re-enrichment on rebuild.
      enrichment_model:
        description: >-
          LLM model that generated the description (e.g., "google/gemini-3-flash").
          Tracked for provenance and to detect when model changes warrant
          re-enrichment.
      enrichment_source:
        description: >-
          Source of the enrichment: 'llm' for LLM-generated descriptions, or
          'template' for boilerplate error/validity fields that use formulaic
          descriptions without LLM calls.
      enriched_at:
        description: >-
          ISO 8601 timestamp of when this node was last enriched. Used for
          selective reset of enrichments by time window.
      # Embedding fields for semantic search
      embedding_text:
        description: >-
          Pre-concatenated context for embedding: combines IDS description,
          parent path context, documentation, units, and coordinates into
          natural language prose optimized for sentence transformer embedding.
          When description is present, it replaces documentation in this text.
      embedding:
        description: >-
          256-dim embedding vector. Model tracked on DDVersion.embeddings_model.
          Use Neo4j vector index for semantic search.
        multivalued: true
        range: float
        annotations:
          vector_index_name: imas_node_embedding
      embedding_hash:
        description: >-
          SHA256 hash of embedding_text content. Used for cache busting - if hash
          changes, embedding needs regeneration. Enables minimal recompute on rebuild.
      # Error field linking (HAS_ERROR relationship with error_type property)
      error_paths:
        description: >-
          Error field paths linked via HAS_ERROR relationship. For data paths like
          "psi", links to error variants like "psi_error_upper", "psi_error_lower".
          The relationship has an error_type property ("upper", "lower", or "index").
          Error fields are not embedded since they have no unique semantic content.
        multivalued: true
        range: IMASNode
        annotations:
          relationship_type: HAS_ERROR
      in_cluster:
        description: Semantic cluster this path belongs to
        range: IMASSemanticCluster
        annotations:
          relationship_type: IN_CLUSTER
      standard_name:
        description: >-
          Canonical physics quantity name for cross-facility semantic
          unification. Links DD paths to StandardName nodes.
        range: StandardName
        annotations:
          relationship_type: HAS_STANDARD_NAME
      has_sn_vocab_gap:
        description: >-
          Grammar vocab gap identified when trying to name this DD path.
          Links to VocabGap nodes recording missing grammar tokens.
        range: VocabGap
        annotations:
          relationship_type: HAS_STANDARD_NAME_VOCAB_GAP
      coordinates:
        description: >-
          Coordinate specifications for this path (axis definitions).
          Can be index specs (1...N) or other paths (time, rho_tor, etc.).
        multivalued: true
        range: IMASCoordinateSpec
        annotations:
          relationship_type: HAS_COORDINATE

  # Unit is now defined in common.yaml and imported

  IMASCoordinateSpec:
    description: >-
      An index-based coordinate specification from the IMAS Data Dictionary
      (e.g., "1...N", "1...3"). Path references are handled via
      HAS_COORDINATE relationships to IMASNode nodes.
    class_uri: imas_dd:IMASCoordinateSpec
    attributes:
      id:
        identifier: true
        description: Coordinate spec string (e.g., "1...N", "1...3")
        required: true
      is_bounded:
        description: Whether the coordinate has a fixed maximum
        range: boolean
      max_size:
        description: Maximum size if bounded (e.g., 3 for "1...3")
        range: integer

  IMASSemanticCluster:
    description: >-
      A semantic cluster of related IMAS paths, derived from HDBSCAN
      clustering on path embeddings. Paths link to clusters via IN_CLUSTER.
      
      Embedding vectors enable fast cluster-based semantic search:
      query embedding is compared against cluster embeddings first, then
      individual paths within matching clusters are searched.
    class_uri: imas_dd:IMASSemanticCluster
    attributes:
      id:
        identifier: true
        description: Cluster identifier (UUID string)
        required: true
      label:
        description: LLM-generated semantic label (e.g., "boundary geometry")
        required: true
      description:
        description: Extended description of the cluster concept
      physics_domain:
        description: Primary physics domain of cluster members
        range: string
      path_count:
        description: Number of paths in this cluster
        range: integer
      cross_ids:
        description: Whether cluster spans multiple IDS
        range: boolean
      representative_path:
        description: Most central path (closest to cluster center)
        range: IMASNode
        annotations:
          relationship_type: REPRESENTATIVE_PATH
      source:
        description: >-
          How this cluster was created. 'hdbscan' for statistical clustering,
          'cocos_metadata' for deterministic COCOS-based grouping,
          'physics_canonical' for manually-defined physics quantity clusters.
      # Cluster embedding for semantic search
      embedding:
        description: >-
          Cluster centroid embedding vector (256-dim, L2-normalized).
          Mean of member path embeddings. Enables hierarchical search:
          first match clusters by embedding, then search within cluster.
        multivalued: true
        range: float
        annotations:
          vector_index_name: cluster_embedding
      label_embedding:
        description: >-
          Embedding of the LLM-generated cluster label text (256-dim).
          Enables natural language search by short physics concept name.
        multivalued: true
        range: float
        annotations:
          vector_index_name: cluster_label_embedding
      description_embedding:
        description: >-
          Embedding of the LLM-generated cluster description (256-dim).
          Primary vector for natural language cluster search — richer
          semantic content than label or centroid embeddings.
        multivalued: true
        range: float
        annotations:
          vector_index_name: cluster_description_embedding
      similarity_score:
        description: Average intra-cluster cosine similarity (0-1)
        range: float
      scope:
        description: Cluster scope (global, domain, or ids)
      scope_detail:
        description: Domain name or IDS name for domain/ids scopes
      ids_names:
        description: List of IDS names represented in this cluster
        multivalued: true
      # Enrichment metadata
      physics_concepts:
        description: Physics concepts covered by this cluster
        multivalued: true
      mapping_relevance:
        description: Relevance for IMAS mapping (high, medium, low)
      tags:
        description: >-
          LLM-generated tags from a controlled vocabulary for this cluster.
          Used for filtering and faceted search over semantic clusters.
        multivalued: true
      text_embedding_hash:
        description: Hash of text used for embedding, for change detection during re-embedding

  IdentifierSchema:
    description: >-
      An enumeration/identifier schema from the Data Dictionary. Represents
      a typed vocabulary of valid values for identifier fields (e.g.,
      coordinate_identifier, magnetics_probe_type_identifier). Options are
      stored as JSON for flexible querying. Extracted from the imas-python
      identifier_enum metadata API.
    class_uri: imas_dd:IdentifierSchema
    attributes:
      id:
        identifier: true
        description: >-
          Schema name (e.g., "coordinate_identifier",
          "magnetics_probe_type_identifier")
        required: true
      name:
        description: >-
          Schema name, same as id
        required: true
      documentation:
        description: Schema description from DD XML header
      option_count:
        description: Number of valid options in this schema
        range: integer
      options:
        description: >-
          JSON-encoded list of {index, name} for each valid option value.
          Index is the integer identifier, name is the string label.
      field_count:
        description: Number of IMASNode fields using this identifier schema
        range: integer
      source:
        description: >-
          Source XML file for this identifier schema (e.g.,
          "utilities/coordinate_identifier.xml")
      # LLM enrichment fields
      description:
        description: >-
          LLM-generated physics-aware description of this identifier schema.
          Explains what the enumeration controls and how the options relate
          to plasma physics use cases.
      keywords:
        description: >-
          LLM-generated searchable keywords for this schema
        multivalued: true
      enrichment_hash:
        description: Hash of context used for enrichment, for idempotency
      enrichment_source:
        description: Source of enrichment ('llm' or 'template')
      # Embedding for semantic search
      embedding:
        description: >-
          Embedding vector of the enriched description (256-dim).
          Enables semantic search for identifier schemas by physics concept.
        multivalued: true
        range: float
        annotations:
          vector_index_name: identifier_schema_embedding
      embedding_hash:
        description: Hash of text used for embedding, for cache busting

  IMASNodeChange:
    description: >-
      Records a change to path metadata between DD versions.
      Enables tracking of documentation updates, unit changes, etc.
    class_uri: imas_dd:IMASNodeChange
    attributes:
      id:
        identifier: true
        description: Composite key (path:change_type:version)
        required: true
      change_type:
        description: Type of change
        range: ChangeType
        required: true
      old_value:
        description: Previous value (as string)
      new_value:
        description: New value (as string)
      semantic_type:
        description: Physics significance (for documentation changes)
        range: SemanticChangeType
      keywords_detected:
        description: JSON array of significant keywords found in new value
      path:
        description: The path that changed
        range: IMASNode
        required: true
        annotations:
          relationship_type: FOR_IMAS_PATH
      version:
        description: Version where the change occurred
        range: DDVersion
        required: true
        annotations:
          relationship_type: IN_VERSION
      unit_change_subtype:
        description: For units changes, the pint-based classification
        range: UnitChangeSubtype
      breaking_level:
        description: Whether this change requires code updates
        range: BreakingChangeLevel

  # Relationship class for coordinates (captures dimension + properties)
  CoordinateRelationship:
    description: >-
      Represents a coordinate relationship between an IMASNode and its coordinate
      (either another IMASNode or an IMASCoordinateSpec). Stored as relationship properties.
    class_uri: imas_dd:CoordinateRelationship
    attributes:
      dimension:
        description: Which dimension this coordinate applies to (1-6)
        range: integer
        required: true
      alternative:
        description: Whether this is an OR alternative coordinate
        range: boolean
      same_as:
        description: Whether from coordinate_same_as attribute
        range: boolean
      source_path:
        description: The path that has this coordinate
        range: IMASNode
        required: true
      target_path:
        description: The coordinate path (for path references)
        range: IMASNode
      target_spec:
        description: The coordinate spec (for index coordinates)
        range: IMASCoordinateSpec

  # Relationship class for cluster membership
  ClusterMembership:
    description: >-
      Represents membership of an IMASNode in a IMASSemanticCluster.
      Distance indicates proximity to cluster center.
    class_uri: imas_dd:ClusterMembership
    attributes:
      path:
        description: The member path
        range: IMASNode
        required: true
      cluster:
        description: The cluster
        range: IMASSemanticCluster
        required: true
      distance:
        description: Distance to cluster center (lower = more central)
        range: float

  EmbeddingChange:
    description: >-
      Records a change to embedding content for an IMASNode between DD versions.
      Created by record_embedding_changes() when embedding text changes due to
      documentation, units, coordinates, or other metadata updates.
    class_uri: imas_dd:EmbeddingChange
    attributes:
      id:
        identifier: true
        description: >-
          Composite key (path_id:change_type:dd_version) for deduplication
        required: true
      path_id:
        description: IMASNode path ID where the embedding change was detected
        required: true
      change_type:
        description: Type of embedding content change detected
        range: EmbeddingChangeType
        required: true
      dd_version:
        description: DD version where the change was detected
        required: true
      detected_at:
        description: Timestamp when the change was detected
        range: datetime
      old_hash:
        description: Content hash of the previous embedding text (null if new path)
      new_hash:
        description: Content hash of the new embedding text
