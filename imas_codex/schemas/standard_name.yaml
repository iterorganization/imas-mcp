# Standard Names Schema
#
# Canonical physics quantity names for cross-facility semantic unification.
# StandardName bridges IMAS Data Dictionary paths and facility signals â€”
# it is neither DD-specific nor facility-specific, hence its own schema.
#
# Import chain:
#   common.yaml (provides Unit)
#     â†‘
#   standard_name.yaml (this file)
#     â†‘          â†‘
#   imas_dd.yaml   facility.yaml
#
# Generated models: imas_codex/graph/models.py, imas_codex/graph/dd_models.py
# To regenerate: uv run build-models --force

id: https://imas.iter.org/schemas/standard_name
name: standard_name
title: IMAS Standard Names Schema
description: >-
  Canonical physics quantity names for cross-facility semantic unification.
  Links DD paths (IMASNode) and facility signals (FacilitySignal) to a
  shared vocabulary of physics concepts.

license: MIT
version: 0.9.0

prefixes:
  linkml: https://w3id.org/linkml/
  sn: https://imas.iter.org/schemas/standard_name/

default_prefix: sn
default_range: string

imports:
  - linkml:types
  - common
  - grammar_graph

# =============================================================================
# Enums
# =============================================================================

enums:
  StandardNameSourceType:
    description: Source type for standard name generation
    permissible_values:
      dd:
        description: Extracted from IMAS Data Dictionary
      signals:
        description: Extracted from facility signals
      manual:
        description: Manually curated
      reference:
        description: Seeded from ISN reference library

  StandardNameStatus:
    description: >-
      Catalog-authoritative lifecycle status for standard names.
      Maps to ISN StatusEnum values (published, drafted, accepted,
      superseded, deprecated). Set by catalog import; pipeline defaults
      to 'drafted'.
    permissible_values:
      published:
        description: Published in the catalog â€” editorial content is authoritative
      drafted:
        description: Draft â€” not yet published to catalog
      accepted:
        description: Accepted by reviewers â€” scheduled for next release
      superseded:
        description: Replaced by another standard name (see superseded_by)
      deprecated:
        description: Deprecated â€” should not be used in new work

  StandardNameOrigin:
    description: >-
      Provenance of the most recent editorial edit to a StandardName.
      pipeline = generated/enriched by the codex LLM pipeline.
      catalog_edit = imported from a catalog PR that modified editorial
      fields. Used by filter_protected() to guard catalog-owned content.
    permissible_values:
      pipeline:
        description: Generated or enriched by the codex LLM pipeline
      catalog_edit:
        description: Imported from a catalog PR with editorial changes

  VocabGapCategory:
    description: >-
      Classification of a VocabGap node.  Distinguishes true vocabulary
      absences from LLM slot-placement errors where the token exists in a
      different closed segment.
    permissible_values:
      absent:
        description: >-
          Token not found in any closed-vocabulary segment â€” a genuine
          ISN grammar gap that requires editorial action.
      wrong_slot_placement:
        description: >-
          Token exists in one or more closed segments but the LLM placed
          it in a segment that does not contain it.  Signals a prompt /
          model improvement need, not an ISN gap.
      ambiguous_known_token:
        description: >-
          Token exists in multiple closed segments and the reported
          segment is not among them.  May indicate either LLM confusion
          or legitimate vocabulary overlap requiring editorial review.

  StandardNameReviewStatus:
    description: >-
      Review lifecycle for standard names.
      Split-pipeline lifecycle (v0.6.0):
        named â†’ enriched â†’ reviewable â†’ published â†’ accepted
      Legacy alias: drafted (equivalent to named, kept for back-compat).
    permissible_values:
      named:
        description: >-
          Post-generate: name, kind, unit assigned but no
          documentation or description yet. Entry point for sn enrich.
      enriched:
        description: >-
          Post-enrich: documentation, description, links populated by
          LLM enrichment pipeline. Awaiting validation.
      reviewable:
        description: >-
          Passed VALIDATE gate in enrich pipeline. Ready for sn review
          or direct publish.
      drafted:
        description: >-
          LLM-generated, awaiting review (legacy alias for named;
          kept for one-release back-compat)
      published:
        description: Exported to catalog PR for review
      accepted:
        description: Imported from merged catalog entry
      rejected:
        description: Reviewed and rejected
      reviewed:
        description: LLM-reviewed with quality scores, awaiting further processing
      validation_failed:
        description: Failed imas_standard_names validation checks
      vocab_gap:
        description: >-
          Name generation blocked by missing grammar vocabulary.
          Requires vocabulary update in imas-standard-names before
          this name can be generated.
      skipped:
        description: Skipped during review (e.g., low confidence)

  StandardNameKind:
    description: Entry kind for standard names
    permissible_values:
      scalar:
        description: Scalar quantity
      vector:
        description: Vector quantity (rank-1, including named single components)
      tensor:
        description: Tensor quantity (rank-2+, e.g. metric tensor, stress tensor)
      eigenfunction:
        description: Eigenfunction of a linear operator (MHD, wave, etc.)
      spectrum:
        description: Spectral quantity (per-mode or per-frequency decomposition)
      complex:
        description: Complex-valued quantity (real/imaginary parts or magnitude/phase)
      metadata:
        description: Non-measurable concept or classification

  StandardNameSourceStatus:
    description: >-
      Lifecycle status of a StandardNameSource node.
      extracted â†’ composed | attached | vocab_gap | failed | stale | skipped | not_physical_quantity
    permissible_values:
      extracted:
        description: Source entity identified and queued for composition
      composed:
        description: LLM successfully generated a standard name from this source
      attached:
        description: Source auto-attached to an existing standard name (no LLM needed)
      vocab_gap:
        description: Composition blocked by missing grammar vocabulary
      failed:
        description: Composition failed after max retry attempts
      stale:
        description: Source entity no longer exists in upstream data
      skipped:
        description: >-
          DD path cannot be resolved to a valid standard name source due to
          upstream defects (prose unit, unresolvable Jinja template,
          context-dependent inheritance). See skip_reason for classification.
      not_physical_quantity:
        description: >-
          DD path is configuration metadata, not a physical/geometric/coordinate
          quantity. Filtered at extract time by attribute predicates (data_type,
          units, doc). Distinct from 'skipped' which signals upstream defect.

  StandardNameValidationStatus:
    description: >-
      Validation lifecycle for standard names.

        pending â†’ valid | quarantined

      Names default to pending at persist time.
      validate_worker promotes to valid (passes) or quarantined (critical failures).

      Reviewer feedback (``reviewer_score_name`` / ``reviewer_score_docs``,
      ``reviewer_comments_name`` / ``reviewer_comments_docs``,
      ``review_tier``) is written onto every reviewed StandardName without
      status demotion. Sub-threshold names are selected for regeneration via
      ``sn run --min-score`` based on ``reviewer_score_name``, not on
      ``validation_status``.

      Only valid names participate in publish.
    permissible_values:
      pending:
        description: Awaiting validation (set at compose/persist time)
      valid:
        description: Passed ISN validation â€” eligible for consolidation, review, publish
      quarantined:
        description: >-
          Failed critical validation checks (grammar round-trip failure,
          empty description, invalid kind). Can be re-validated after fixes.

  LinkResolutionStatus:
    description: Status of cross-reference link resolution for standard names
    permissible_values:
      resolved:
        description: All links point to existing standard names with name prefix
      unresolved:
        description: One or more links point to DD paths with dd prefix or missing names
      failed:
        description: >-
          Link resolution attempted multiple times and permanently failed.
          Terminal state â€” requires manual intervention or vocabulary update.

  StandardNameReviewMode:
    description: >-
      Which LLM review rubric produced the most recent axis-specific
      score (``reviewer_score_name`` or ``reviewer_score_docs``).
      ``names`` uses four dimensions (grammar, semantic, convention,
      completeness) normalised over 80 points and is used for names
      generated without rich descriptions, typically during
      ``sn run --target names`` turns.
      ``docs`` uses four dimensions (description_quality, documentation_quality,
      completeness, physics_accuracy) normalised over 80 points and evaluates
      a docs-generation cycle (``sn run --target docs``) without
      re-scoring the name itself.
      Fidelity rank: ``names`` < ``docs``. A lower-fidelity
      run must not overwrite a prior higher-fidelity review unless
      ``--force`` is given.
    permissible_values:
      names:
        description: Four dimensions scored â€” grammar, semantic, convention, completeness.
      docs:
        description: >-
          Four dimensions scored â€” description_quality, documentation_quality,
          completeness, physics_accuracy.

  ReviewResolutionRole:
    description: >-
      Role of a Review node within an RD-quorum review group.
      ``primary`` and ``secondary`` run blind (identical input, no
      cross-contamination); ``escalator`` sees both prior critiques
      and is authoritative on disputed items.
    permissible_values:
      primary:
        description: First reviewer in the quorum (blind, cycle 0)
      secondary:
        description: Second reviewer in the quorum (blind, cycle 1)
      escalator:
        description: Tie-breaker reviewer that sees both prior critiques (cycle 2)

  ReviewResolutionMethod:
    description: >-
      How the final scores for a review group were determined.
      Only groups with ``quorum_consensus``, ``authoritative_escalation``,
      or ``single_review`` are eligible as winning groups for aggregate
      slot mirroring. ``max_cycles_reached`` and ``retry_item`` are
      non-winning terminal states.
    permissible_values:
      quorum_consensus:
        description: >-
          Cycles 0 and 1 agreed within tolerance on all dimensions.
          Final scores = mean of both reviewers.
      authoritative_escalation:
        description: >-
          Cycles 0 and 1 disagreed on one or more dimensions beyond
          tolerance. Cycle 2 (escalator) ran on disputed items and its
          result is authoritative for those items.
      max_cycles_reached:
        description: >-
          Cycles 0 and 1 disagreed but no escalator model is configured
          (len(models) < 3). Final scores = mean of both reviewers with
          disagreement flag.
      retry_item:
        description: >-
          Both cycles failed to produce a score for this item and retry
          also failed. Item is quarantined.
      single_review:
        description: >-
          Only one review cycle produced a valid score (either len(models)==1,
          or one cycle failed while the other succeeded).

  SNRunStatus:
    description: SNRun lifecycle. `started` is in-progress; others are terminal.
    permissible_values:
      started:
        description: Run has begun and is currently executing.
      completed:
        description: Run finished cleanly.
      interrupted:
        description: User interrupted (Ctrl-C or signal).
      failed:
        description: Run aborted due to fatal error.
      degraded:
        description: Run completed but one or more LLMCost writes could not be drained â€” cost_spent is a lower bound.

  NameStage:
    description: >-
      Name-pipeline stage for a StandardName node. Tracks progress through
      the name generation, review, and refinement sub-pipeline.
      Mirrors DocsStage for the docs sub-pipeline.
    permissible_values:
      pending:
        description: Queued for name generation; not yet drafted.
      drafted:
        description: >-
          Name generated (or refined) by the compose/refine worker.
          Set by _finalize_generated_name_stage and persist_refined_name.
          Eligible for name review.
      reviewed:
        description: >-
          Reviewed by the name-review worker; score recorded.
          If score < min_score and chain_length < rotation_cap, eligible
          for refine_name claiming.
      accepted:
        description: >-
          Score >= min_score; name accepted. Transitions docs_stage to
          'pending', making the name eligible for generate_docs.
      refining:
        description: >-
          Claimed by a refine_name worker. Transient state â€” transitions
          back to 'reviewed' on failure or to 'drafted' on success (new node).
      exhausted:
        description: >-
          Reviewed but chain_length >= rotation_cap - 1 and score still
          below threshold. Terminal for the name pipeline.
      superseded:
        description: >-
          Replaced by a refined successor node via REFINED_FROM.
          Terminal â€” old node is kept for lineage but not re-processed.

# =============================================================================
# Classes
# =============================================================================

classes:
  StandardName:
    description: >-
      A canonical physics or geometric quantity name. Part of the standard_names
      vocabulary used to unify signal semantics across facilities and DD paths.

      Relationships:
        - HAS_UNIT -> Unit (canonical units for this quantity)
        - HAS_COCOS -> COCOS (COCOS convention this quantity follows)
        - HAS_REVIEW -> StandardNameReview (quality review records)

      Inbound relationships:
        - (IMASNode)-[:HAS_STANDARD_NAME]->(StandardName)
        - (FacilitySignal)-[:HAS_STANDARD_NAME]->(StandardName)

      Example: plasma_current, electron_density_core, major_radius
    class_uri: sn:StandardName
    mixins:
      - LLMOperation
    attributes:
      id:
        identifier: true
        description: >-
          The standard name in snake_case.
          E.g., plasma_current, electron_temperature, major_radius
        required: true
      description:
        description: Human-readable definition of this quantity
      unit:
        description: Expected SI units for this quantity
        range: Unit
        annotations:
          relationship_type: HAS_UNIT
      source_types:
        description: >-
          Unordered set of source types that contribute to this standard name.
          E.g., ["dd"] for DD-only, ["dd", "signals"] for multi-source.
        multivalued: true
        range: StandardNameSourceType
      confidence:
        description: LLM confidence score for generated names (0-1)
        range: float
      pipeline_status:
        description: >-
          Pipeline lifecycle status. Renamed from review_status in schema v2;
          one-release alias maintained at CLI/MCP level.
        range: StandardNameReviewStatus
      status:
        description: >-
          Catalog-authoritative lifecycle status. Set by catalog import;
          pipeline defaults to 'drafted'. Distinct from pipeline_status
          which tracks the internal pipeline state machine.
        range: StandardNameStatus
      origin:
        description: >-
          Provenance of the most recent editorial edit. 'pipeline' for
          LLM-generated content, 'catalog_edit' for content imported from
          a catalog PR. Used by filter_protected() to guard catalog-owned
          editorial fields from pipeline overwrites.
        range: StandardNameOrigin
      deprecates:
        description: >-
          ID of the standard name this entry deprecates. Set during
          catalog import when a name supersedes an older one.
      superseded_by:
        description: >-
          ID of the standard name that supersedes this entry. Set
          during catalog import when this name is replaced.
      catalog_pr_number:
        description: >-
          GitHub PR number of the catalog PR that last modified this
          entry. Set by sn import; null for pipeline-only names.
        range: integer
      catalog_pr_url:
        description: >-
          Full URL of the catalog PR that last modified this entry.
          Set by sn import; null for pipeline-only names.
      exported_at:
        description: >-
          ISO 8601 timestamp when this name was last exported to the
          catalog staging directory by sn export.
        range: datetime
      model:
        description: >-
          LLM model that generated this standard name
          (e.g., "google/gemini-3-flash"). Tracked for provenance.
      created_at:
        description: ISO 8601 timestamp when this name was created
        range: datetime
      generated_at:
        description: ISO 8601 timestamp when LLM generation occurred
        range: datetime
      embedding:
        description: Vector embedding of description for semantic search
        multivalued: true
        range: float
      embedded_at:
        description: When the embedding was last computed
        range: datetime
      documentation:
        description: >-
          Rich documentation with LaTeX equations, governing physics,
          measurement methods, typical values, sign conventions.
          Uses [name](#name) inline links to other standard names.
      kind:
        description: Entry kind â€” scalar, vector, or metadata
        range: StandardNameKind
      links:
        description: Internal cross-references to related standard names (name only)
        multivalued: true
        range: string
      source_paths:
        description: >-
          All source entity IDs mapped to this standard name (union list).
          DD paths are bare (no colon): "equilibrium/time_slice/profiles_1d/psi".
          Signal IDs are facility-prefixed: "tcv:ip/measured".
        multivalued: true
        range: string
      validity_domain:
        description: Physical region where this quantity is defined
      constraints:
        description: Physical/mathematical constraints (e.g., T_e > 0)
        multivalued: true
        range: string
      physics_domain:
        description: >-
          Primary physics domain for this StandardName (scalar). When a
          source from a more central domain (lower rank in
          domain_ranking) is attached, ``physics_domain`` is promoted â€”
          this is the canonical "where does this concept live" pointer.
          Cross-domain discoverability is preserved via ``source_domains``.
        range: PhysicsDomain
        annotations:
          relationship_type: HAS_PHYSICS_DOMAIN
      source_domains:
        description: >-
          Every physics domain that has ever contributed a source to
          this StandardName (append-only, deduplicated). Preserves
          cross-domain discoverability after the primary
          ``physics_domain`` has been promoted to a more central
          value. A name with sources from {transport, equilibrium}
          will have ``physics_domain='equilibrium'`` (promoted) and
          ``source_domains=['transport', 'equilibrium']``.
        multivalued: true
        range: string
      cocos_transformation_type:
        description: >-
          COCOS transformation type from the source DD path. Identifies which
          class of COCOS sign convention applies (e.g., psi_like, ip_like).
          Null for COCOS-independent quantities. Authoritative from DD â€”
          injected post-LLM, never generated by the LLM.
          Values match the COCOSLabelTransformation enum from imas_dd.yaml.
        range: string
      cocos:
        description: >-
          COCOS convention this standard name follows. Links to a COCOS
          singleton node (e.g., COCOS 11 or 17). All sign convention
          parameters (sigma_bp, etc.) are on the COCOS node. Set for any
          COCOS-dependent quantity regardless of source (DD, facility
          signals, manual entry). Null for COCOS-independent quantities.
        range: COCOS
        annotations:
          relationship_type: HAS_COCOS
      dd_version:
        description: >-
          DD version used when this standard name was generated. Optional
          provenance â€” records which DD snapshot provided paths, units,
          and documentation at generation time. Null for non-DD-sourced
          names. Plain string, not a graph relationship.
        range: string
      imported_at:
        description: >-
          ISO 8601 timestamp when this entry was imported from the catalog.
          Set by ``sn import`` on each import.
        range: datetime
      reviewer_score_name:
        description: >-
          Name-review quality score (0-1). Set by the name review phase
          (``--target names`` or the ``review_names`` turn phase).
          Independent of ``reviewer_score_docs``.
        range: float
      reviewer_scores_name:
        description: >-
          JSON-encoded name-axis dimensional scores (4 dims: grammar,
          semantic, convention, completeness, each 0-20). Written by
          ``mode="name"`` review only.
      reviewer_comments_per_dim_name:
        description: >-
          JSON-encoded name-axis per-dimension reviewer comments. Keys
          match the name rubric dims (grammar, semantic, convention,
          completeness). Null values mean no comment for that dimension.
      reviewer_comments_name:
        description: >-
          Name-axis reviewer summary prose. Written by ``mode="name"``
          review only; used by the regeneration feedback-injection path.
      reviewer_suggested_name:
        description: >-
          Reviewer-proposed replacement name. Set by the name-review
          phase whenever the LLM offers a concrete improved name. The
          original ``id`` is preserved; this field records the suggestion
          for human editorial follow-up. Null when the reviewer offered
          no alternative.
        range: string
      reviewer_suggestion_justification_name:
        description: >-
          1â€“3 sentence justification for ``reviewer_suggested_name``,
          grounded in ISN grammar and the per-item DD context the reviewer
          received. Null when ``reviewer_suggested_name`` is null.
        range: string
      reviewer_model_name:
        description: LLM model that produced the most recent name-axis review.
      reviewed_name_at:
        description: >-
          ISO 8601 timestamp of the most recent name-review pass.
          Gate for docs review â€” docs review skips any name where
          ``reviewed_name_at IS NULL``.
        range: datetime
      reviewer_score_docs:
        description: >-
          Docs-review quality score (0-1). Set by the docs review phase
          (``--target docs`` or the ``review_docs`` turn phase).
          Independent of ``reviewer_score_name``.
        range: float
      reviewer_scores_docs:
        description: >-
          JSON-encoded docs-axis dimensional scores (4 dims:
          description_quality, documentation_quality, completeness,
          physics_accuracy, each 0-20). Written by ``mode="docs"`` review
          only.
      reviewer_comments_per_dim_docs:
        description: >-
          JSON-encoded docs-axis per-dimension reviewer comments. Keys
          match the docs rubric dims. Null values mean no comment for
          that dimension.
      reviewer_comments_docs:
        description: >-
          Docs-axis reviewer summary prose. Written by ``mode="docs"``
          review only.
      reviewer_model_docs:
        description: LLM model that produced the most recent docs-axis review.
      reviewed_docs_at:
        description: >-
          ISO 8601 timestamp of the most recent docs-review pass.
          Set only by ``--target docs`` review.
        range: datetime
      # --- name-pipeline stage tracking (Phase 8.1) ---
      name_stage:
        description: >-
          Name-pipeline stage for this StandardName. Set by
          _finalize_generated_name_stage (drafted), the name-review worker
          (reviewed, accepted, exhausted), persist_refined_name (superseded
          on predecessor, drafted on new node), and the refine_name claim
          (refining). See NameStage enum for all values.
        range: NameStage
      chain_length:
        description: >-
          REFINED_FROM chain depth: 0 for original generated names,
          incremented by 1 on each refine_name pass that creates a new node.
          Used together with rotation_cap to decide when a name is exhausted.
        range: integer
      # --- generate_docs provenance ---
      docs_stage:
        description: >-
          Docs-pipeline stage for this StandardName. Mirrors name_stage for
          the docs generation/review/refine sub-pipeline.
          Values: pending | drafted | reviewed | accepted | exhausted.
          Set to 'pending' when name_stage transitions to 'accepted'.
      docs_chain_length:
        description: >-
          Number of docs refinement passes applied to this StandardName.
          0 on initial generate_docs; increments on each refine_docs pass.
        range: integer
      docs_model:
        description: >-
          LLM model used for the most recent generate_docs or refine_docs call.
      docs_generated_at:
        description: >-
          ISO 8601 timestamp when generate_docs last wrote documentation
          to this node.
        range: datetime
      review_tier:
        description: >-
          Quality tier from review: outstanding, good, inadequate, poor.
          Derived from axis-specific score thresholds
          (``reviewer_score_name`` or ``reviewer_score_docs``).
      review_count:
        description: >-
          Number of StandardNameReview nodes attached to this StandardName via
          HAS_REVIEW. 0 when no reviewers have scored it, 1 for single
          canonical review, N >= 2 for multi-reviewer setups.
        range: integer
      review_mean_score:
        description: >-
          Arithmetic mean of ``StandardNameReview.score`` across all attached
          StandardNameReview nodes. ``null`` when ``review_count == 0``.
        range: float
      review_disagreement:
        description: >-
          True iff ``review_count >= 2`` and
          ``max(StandardNameReview.score) - min(StandardNameReview.score) >= disagreement-threshold``.
          Always false for ``review_count <= 1``.
        range: boolean
      reviewer_score_secondary:
        description: >-
          Secondary reviewer's aggregate score (0-1) from the most recent
          dual-model review pass. Null when only a single model reviewed
          the name. Axis-agnostic â€” records the secondary score for
          whichever axis (name or docs) was last reviewed with dual models.
        range: float
      reviewer_scores_secondary:
        description: >-
          JSON-encoded per-dimension sub-scores from the secondary reviewer.
          Same schema as ``reviewer_scores_name`` / ``reviewer_scores_docs``
          depending on which axis produced the review.
      reviewer_model_secondary:
        description: >-
          LLM model that produced the secondary review. Null when only a
          single model reviewed the name.
      reviewer_disagreement:
        description: >-
          Absolute difference between the primary and secondary reviewer
          aggregate scores (0-1 scale). Null when only a single model
          reviewed the name. Distinct from ``review_disagreement`` (boolean
          computed from Review node spread).
      validation_issues:
        description: >-
          ISN validation issues from three-layer validation
          (pydantic, semantic, description). Each entry is a tagged
          string like "[pydantic:field] message" or "[semantic] message".
        multivalued: true
        range: string
      validation_layer_summary:
        description: >-
          JSON-encoded summary of validation by layer:
          {pydantic: {passed: bool, error_count: int},
           semantic: {issue_count: int},
           description: {issue_count: int}}
      vocab_gap_detail:
        description: >-
          JSON-encoded detail about missing vocabulary: segment name,
          needed token, and reason. Set when review_status is vocab_gap.
      catalog_commit_sha:
        description: >-
          Git commit SHA of the catalog repo at import time.
          Enables sync-status checking between graph and catalog.
      link_status:
        description: >-
          Resolution status of cross-reference links. Set to 'unresolved'
          when dd: prefix links are present, 'resolved' when all links
          point to existing standard names, 'failed' after max retries.
        range: LinkResolutionStatus
      link_checked_at:
        description: >-
          ISO 8601 timestamp when link resolution was last attempted.
          Used with link_retry_count for age-weighted priority queuing.
        range: datetime
      link_retry_count:
        description: >-
          Number of link resolution attempts. Used to determine when
          to move to terminal 'failed' state (max 5 retries).
        range: integer
      review_input_hash:
        description: >-
          SHA-256 hex digest of the inputs used in the most recent LLM
          review (name, description, documentation, unit, kind).
          Compared to a freshly computed hash to detect stale reviews
          that should be re-run.  OVERWRITTEN (not coalesced) on every
          write so that stale hashes never persist.
        range: string
      # --- Worker coordination (graph-state-machine) ---
      claimed_at:
        description: >-
          Timestamp when a worker claimed this name for processing.
          Used for distributed worker coordination across parallel agents.
          Stale claims (>5min) are reclaimed by other workers.
        range: datetime
      claim_token:
        description: UUID token for atomic work claiming between parallel workers
      validated_at:
        description: >-
          Timestamp when ISN validation completed. Null means validation
          has not run yet. Set by validate_worker after grammar round-trip
          and three-layer ISN checks.
        range: datetime
      validation_status:
        description: >-
          Validation lifecycle gate. Set to 'pending' at compose time,
          promoted to 'valid' or 'quarantined' by validate_worker. Only
          'valid' names participate in publish. Regeneration targeting is
          driven by `sn run --min-score F`, which selects valid names
          whose `reviewer_score_name` falls below the threshold.
        range: StandardNameValidationStatus
      consolidated_at:
        description: >-
          Timestamp when cross-batch consolidation approved this name.
          Null means consolidation has not processed this name yet.
          Names with conflicts are not marked consolidated.
        range: datetime
      grammar_tokens:
        description: >-
          GrammarToken nodes that make up this standard name, parsed
          against the active ISN grammar. Emitted as HAS_SEGMENT edges.

          Edge properties (written by persist_worker via
          imas_standard_names.graph.spec.segment_edge_specs):
            - position: integer â€” zero-based index of this token within
              the parsed name (order of appearance).
            - segment: string   â€” grammar segment name this token
              occupied (e.g. "subject", "transformation").

          In addition to the generic HAS_SEGMENT edge, 10 typed edges are
          written alongside it for direct graph traversal and MCP filtering
          (W40 Phase 4). The typed edges are keyed on segment name:
            physical_base  â†’ HAS_PHYSICAL_BASE
            subject        â†’ HAS_SUBJECT
            transformation â†’ HAS_TRANSFORMATION
            component      â†’ HAS_COMPONENT
            coordinate     â†’ HAS_COORDINATE
            process        â†’ HAS_PROCESS
            position       â†’ HAS_POSITION
            region         â†’ HAS_REGION
            device         â†’ HAS_DEVICE
            geometric_base â†’ HAS_GEOMETRIC_BASE
          Each typed edge carries no extra properties; target is the same
          GrammarToken node referenced by HAS_SEGMENT. LinkML does not
          natively model edge labels, so the convention mirrors the
          existing HAS_SEGMENT pattern (relationship_type annotation).
          See plans/w40-schema-redesign-plan.md Â§Phase 4 for details.

          LinkML does not natively model edge properties, so those two
          attributes live on the Cypher edge rather than as StandardName
          properties. See plan 29 Â§E.5 / Â§E.7 for details.
        multivalued: true
        range: GrammarToken
        inlined: false
        annotations:
          relationship_type: HAS_SEGMENT
      # --- Typed grammar segment edges (W40 Phase 4) ---
      # Each typed edge mirrors a HAS_SEGMENT edge for direct graph traversal
      # and MCP filtering. See HAS_SEGMENT slot above for full rationale.
      grammar_physical_base_token:
        description: GrammarToken at the physical_base segment.
        multivalued: true
        range: GrammarToken
        inlined: false
        annotations:
          relationship_type: HAS_PHYSICAL_BASE
      grammar_subject_token:
        description: GrammarToken at the subject segment.
        multivalued: true
        range: GrammarToken
        inlined: false
        annotations:
          relationship_type: HAS_SUBJECT
      grammar_transformation_token:
        description: GrammarToken at the transformation segment.
        multivalued: true
        range: GrammarToken
        inlined: false
        annotations:
          relationship_type: HAS_TRANSFORMATION
      grammar_component_token:
        description: GrammarToken at the component segment.
        multivalued: true
        range: GrammarToken
        inlined: false
        annotations:
          relationship_type: HAS_COMPONENT
      grammar_coordinate_token:
        description: GrammarToken at the coordinate segment.
        multivalued: true
        range: GrammarToken
        inlined: false
        annotations:
          relationship_type: HAS_COORDINATE
      grammar_process_token:
        description: GrammarToken at the process segment.
        multivalued: true
        range: GrammarToken
        inlined: false
        annotations:
          relationship_type: HAS_PROCESS
      grammar_position_token:
        description: GrammarToken at the position segment.
        multivalued: true
        range: GrammarToken
        inlined: false
        annotations:
          relationship_type: HAS_POSITION
      grammar_region_token:
        description: GrammarToken at the region segment.
        multivalued: true
        range: GrammarToken
        inlined: false
        annotations:
          relationship_type: HAS_REGION
      grammar_device_token:
        description: GrammarToken at the device segment.
        multivalued: true
        range: GrammarToken
        inlined: false
        annotations:
          relationship_type: HAS_DEVICE
      grammar_geometric_base_token:
        description: GrammarToken at the geometric_base segment.
        multivalued: true
        range: GrammarToken
        inlined: false
        annotations:
          relationship_type: HAS_GEOMETRIC_BASE
      # --- Qualifier fields (R2 A.1 â€” wave_absorbed_power collapse) ---
      species:
        description: >-
          Particle species qualifier (e.g., "electron", "deuterium",
          "tritium"). Used to collapse species-specific variants into
          a single parameterised standard name.
      population:
        description: >-
          Population qualifier (e.g., "thermal", "fast", "runaway").
          Distinguishes kinetic sub-populations of the same species.
      toroidal_mode:
        description: >-
          Toroidal mode number qualifier. Used for Fourier-decomposed
          quantities (e.g., n=0 axisymmetric component).
        range: integer
      flux_surface_average:
        description: >-
          Whether this quantity is a flux-surface average. Default false.
          Distinguishes local vs. averaged representations of the same
          physical quantity.
        range: boolean
      # --- Enrichment provenance ---
      enriched_at:
        description: ISO 8601 timestamp when enrichment completed
        range: datetime
      enrich_tokens:
        description: >-
          Total token count (prompt + completion) of the enrichment call.
        range: integer
      enrich_batch_id:
        description: >-
          Batch identifier grouping names enriched in the same run.
          Format: "enrich-{timestamp}" or user-supplied tag.
      # --- Per-pool cost attribution ---
      # The LLMOperation mixin provides the aggregate ``llm_cost`` field
      # (= sum of per-pool fields).  One cost field + one counter field
      # per pool, aligned 1:1 with the 6 SN pipeline pools.  All use
      # ``+= coalesce(...)`` accumulation; only ``sn clear`` resets them.
      llm_cost_generate_name:
        description: >-
          Cumulative USD cost of generate_name LLM calls for this name.
          Excludes refine_name (regeneration) costs.
        range: float
      llm_cost_review_name:
        description: >-
          Cumulative USD cost of review_name LLM calls (name-axis
          reviews across all reviewer models).
        range: float
      llm_cost_refine_name:
        description: >-
          Cumulative USD cost of refine_name LLM calls (regeneration
          when reviewer feedback triggered a re-compose).
        range: float
      llm_cost_generate_docs:
        description: >-
          Cumulative USD cost of generate_docs LLM calls for this name.
        range: float
      llm_cost_review_docs:
        description: >-
          Cumulative USD cost of review_docs LLM calls (docs-axis
          reviews across all reviewer models).
        range: float
      llm_cost_refine_docs:
        description: >-
          Cumulative USD cost of refine_docs LLM calls (docs
          regeneration after review feedback).
        range: float
      generate_name_count:
        description: >-
          Number of generate_name calls for this name.  Incremented
          each time ``write_standard_names`` records a non-null
          ``llm_cost`` and this is a first-generation (not a refine).
        range: integer
        ifabsent: int(0)
      review_name_count:
        description: >-
          Number of review_name calls for this name.  Incremented
          each time ``write_name_review_results`` persists a review.
        range: integer
        ifabsent: int(0)
      refine_name_count:
        description: >-
          Number of refine_name LLM calls for this name.  Tracks
          actual LLM invocations; may differ from ``regen_count``
          (which tracks rotation-cap cycles and may skip no-op
          refinements).
        range: integer
        ifabsent: int(0)
      generate_docs_count:
        description: >-
          Number of generate_docs LLM calls for this name.
        range: integer
        ifabsent: int(0)
      review_docs_count:
        description: >-
          Number of review_docs LLM calls for this name.  Incremented
          each time ``write_docs_review_results`` persists a review.
        range: integer
        ifabsent: int(0)
      refine_docs_count:
        description: >-
          Number of refine_docs LLM calls for this name.
        range: integer
        ifabsent: int(0)
      # --- Run provenance ---
      last_run_id:
        description: >-
          UUID of the ``sn run`` invocation that last produced or
          regenerated this name. Allows downstream review runs to
          identify which pipeline invocation created a name.
      last_run_at:
        description: >-
          ISO 8601 timestamp of the ``sn run`` invocation that last
          produced or regenerated this name. Paired with
          ``last_run_id`` for temporal queries.
        range: datetime
      # --- Regeneration tracking ---
      regen_count:
        description: >-
          Number of reviewâ†’regen cycles this name has been through.
          0 for fresh names; incremented by the regen pass in
          ``sn run``. Hard cap at 1 prevents
          infinite regeneration loops on persistently poor scorers.
        range: integer
        ifabsent: int(0)
      refine_reason:
        description: >-
          Reviewer comments that triggered the last refinement cycle.
          Captured from ``reviewer_comments_name`` at refine time so the
          reason survives subsequent review overwrites.
      # --- Grammar parse provenance (vNext â€” imas-standard-names >= 0.7.0rc21) ---
      grammar_parse_version:
        description: >-
          Version of ``imas-standard-names`` used when the vNext parser
          last processed this name (e.g. ``"0.7.0rc21"``). Stamped at
          write time with ``imas_standard_names.__version__``. Enables
          staleness checks when the grammar parser is upgraded.
          ``null`` means parse has not been run with the vNext API.
        range: string
      grammar_parse_fallback:
        description: >-
          True iff the ISN grammar parser raised when writing this name.
          When true, per-segment columns and typed grammar edges are
          absent and downstream grammar-aware retrieval treats the SN as
          unparseable. Set by ``_write_grammar_decomposition`` (plan 40
          Phase 1). ``null`` means the writer has not yet processed this
          name with the new grammar-decomposition path.
        range: boolean
        required: false
      validation_diagnostics_json:
        description: >-
          JSON-serialised list of parser diagnostics from the last vNext
          parse, one object per diagnostic with keys: ``category``,
          ``layer``, ``message``, ``suggestion``, ``severity``.
          An empty JSON array (``"[]"``) means no diagnostics were
          emitted; ``null`` means the vNext parse has not run yet.
          Grammar decomposition is derived on demand via
          ``imas_standard_names.grammar.parser.parse()``; per-segment
          properties are no longer stored on the node.
        range: string
      # --- REFERENCES relationship (enrich link graph) ---
      references:
        description: >-
          Other StandardName nodes this name references via name:x
          markers in its documentation. Created by enrich PERSIST
          to build a cross-reference graph between related concepts.
        multivalued: true
        range: StandardName
        inlined: false
        annotations:
          relationship_type: REFERENCES
      # --- Derivation relationship slots ---
      arguments:
        description: >-
          StandardName nodes this name is derived from. Emitted by derive_edges()
          for every derivation layer (unary prefix, unary postfix, projection,
          binary). Populated in the tail pass after all nodes in a batch are
          written. Forward-referenced targets are MERGE'd as bare stubs.
        multivalued: true
        range: StandardName
        inlined: false
        annotations:
          relationship_type: HAS_ARGUMENT
      error_siblings:
        description: >-
          StandardName nodes that are uncertainty variants of this name
          (upper/lower/index error forms). Direction: parent â†’ sibling.
          Emitted for names whose outermost operator is upper_uncertainty,
          lower_uncertainty, or uncertainty_index.
        multivalued: true
        range: StandardName
        inlined: false
        annotations:
          relationship_type: HAS_ERROR
      predecessor:
        description: >-
          The standard name this entry supersedes (deprecation lineage).
          Scalar â€” a name has at most one direct predecessor. Derived from
          the deprecates scalar at write time.
        range: StandardName
        inlined: false
        annotations:
          relationship_type: HAS_PREDECESSOR
      successor:
        description: >-
          The standard name that supersedes this entry (deprecation lineage).
          Scalar â€” a name has at most one direct successor. Derived from the
          superseded_by scalar at write time.
        range: StandardName
        inlined: false
        annotations:
          relationship_type: HAS_SUCCESSOR
      primary_cluster_ref:
        description: >-
          Primary semantic cluster this standard name belongs to. Derived from
          the primary_cluster_id scalar at write time via IN_CLUSTER edge.
        range: IMASSemanticCluster
        inlined: false
        annotations:
          relationship_type: IN_CLUSTER
      reviews:
        description: >-
          StandardNameReview nodes attached to this StandardName via HAS_REVIEW.
          Direction: (StandardName)-[:HAS_REVIEW]->(StandardNameReview).
          Matches the HAS_* ownership convention (HAS_UNIT, HAS_COCOS, etc.).
        multivalued: true
        range: StandardNameReview
        inlined: false
        annotations:
          relationship_type: HAS_REVIEW
      docs_revisions:
        description: >-
          Linked DocsRevision snapshot nodes in the docs refinement chain.
          Each refine_docs run appends a new DocsRevision. Walk this edge
          to retrieve the full documentation history for prompt context.
        multivalued: true
        range: DocsRevision
        inlined: false
        annotations:
          relationship_type: DOCS_REVISION_OF
      refined_from:
        description: >-
          The predecessor StandardName node this entry was refined from.
          Created by persist_refined_name via ``MERGE (new)-[:REFINED_FROM]->(old)``.
          Scalar â€” a refined name has exactly one direct predecessor.
          Walk this chain to retrieve the full name refinement history.
        range: StandardName
        inlined: false
        annotations:
          relationship_type: REFINED_FROM

  DocsRevision:
    description: >-
      Snapshot of documentation state when refine_docs creates a new revision.
      Linked from StandardName via DOCS_REVISION_OF (chain). Each revision
      captures the full documentation state at that point in time, enabling
      full history retrieval for prompt context and audit.
    class_uri: sn:DocsRevision
    attributes:
      id:
        identifier: true
        description: >-
          Composite key (sn_id#rev-N) where N is the revision number.
        required: true
      sn_id:
        description: >-
          StandardName id this revision belongs to. Denormalised for query
          convenience; the authoritative link is the DOCS_REVISION_OF edge.
      revision_number:
        description: >-
          Zero-based revision index within the chain. Equals the SN
          docs_chain_length at the time this snapshot was created.
        range: integer
      description:
        description: >-
          Snapshot of the SN description text at this revision.
      documentation:
        description: >-
          Snapshot of the documentation text at this revision.
      model:
        description: >-
          Model that generated the docs captured in this revision.
      generated_at:
        description: >-
          When the docs captured in this revision were generated.
        range: datetime
      reviewer_score_docs:
        description: >-
          Reviewer score for this docs revision (0-1).
        range: float
      reviewer_comments_per_dim_docs:
        description: >-
          Per-dimension reviewer comments JSON for this revision.
      reviewer_comments_docs:
        description: >-
          Aggregated reviewer comments for this revision.
      created_at:
        description: >-
          When this revision snapshot was created.
        range: datetime

  VocabGap:
    description: >-
      Records a missing grammar token identified during standard name composition.
      Linked to source DD paths and facility signals via HAS_STANDARD_NAME_VOCAB_GAP
      relationships. The node stores the normalized gap concept; per-source
      evidence (reason, observed_at) lives on the relationships.

      Example Cypher:
        MATCH (vg:VocabGap) RETURN vg.segment, vg.needed_token, vg.example_count
        MATCH (n:IMASNode)-[:HAS_STANDARD_NAME_VOCAB_GAP]->(vg:VocabGap) RETURN n.id, vg.id
    class_uri: sn:VocabGap
    attributes:
      id:
        identifier: true
        description: >-
          Format: vocab_gap:{segment}:{needed_token}
          Example: vocab_gap:transformation:time_derivative_of
        required: true
      segment:
        description: Grammar segment missing the token (transformation, process, subject, etc.)
        required: true
      needed_token:
        description: The token that should exist in the grammar vocabulary
        required: true
      example_count:
        description: Number of source paths that reported needing this token
        range: integer
      first_seen_at:
        description: When this gap was first identified
        range: datetime
      last_seen_at:
        description: When this gap was most recently reported
        range: datetime
      category:
        description: >-
          Gap classification: absent (true gap), wrong_slot_placement
          (token exists in a different segment), or ambiguous_known_token
          (token found in multiple segments).
        range: VocabGapCategory
      actual_segments:
        description: >-
          Closed-vocabulary segments that actually contain this token.
          Populated when category is wrong_slot_placement or
          ambiguous_known_token; empty for absent gaps.
        multivalued: true

  StandardNameSource:
    description: >-
      Tracks an individual source entity (DD path or facility signal) through
      the standard name composition pipeline. Graph-primary state machine â€”
      all pipeline progress is persisted here, not in memory.

      Example Cypher:
        MATCH (sns:StandardNameSource {source_type: 'dd', status: 'extracted'})
        RETURN sns.source_id, sns.batch_key

        MATCH (sns:StandardNameSource)-[:PRODUCED_NAME]->(sn:StandardName)
        RETURN sns.source_id, sn.id
    class_uri: sn:StandardNameSource
    attributes:
      id:
        identifier: true
        description: >-
          Composite key: source_type + ":" + source_id.
          DD: "dd:equilibrium/time_slice/profiles_1d/psi"
          Signal: "signals:tcv:ip/measured"
        required: true
      source_type:
        description: Type of source entity (dd or signals)
        range: StandardNameSourceType
        required: true
      source_id:
        description: >-
          Original entity identifier. DD path (bare) or signal ID (facility:path).
        required: true
      batch_key:
        description: >-
          Grouping key for LLM composition batches.
          DD: "{cluster_label}:{unit}" or "unclustered:{ids_name}:{unit}"
          Signals: "{physics_domain}:{diagnostic}:{unit}"
      status:
        description: Current lifecycle status
        range: StandardNameSourceStatus
        required: true
      claimed_at:
        description: Timestamp when a worker claimed this source for processing
        range: datetime
      claim_token:
        description: UUID token for claim verification
      attempt_count:
        description: Number of composition attempts (for durable retry)
        range: integer
      last_error:
        description: Error message from most recent failed attempt
      failed_at:
        description: Timestamp of terminal failure
        range: datetime
      composed_at:
        description: Timestamp when composition succeeded
        range: datetime
      dd_path:
        description: >-
          For DD sources, links to the IMASNode via FROM_DD_PATH relationship.
          Value is the IMASNode id (bare DD path).
        annotations:
          relationship_type: FROM_DD_PATH
          target_label: IMASNode
      signal:
        description: >-
          For signal sources, links to the FacilitySignal via FROM_SIGNAL relationship.
          Value is the FacilitySignal id (facility:path).
        annotations:
          relationship_type: FROM_SIGNAL
          target_label: FacilitySignal
      standard_name:
        description: The StandardName produced by composing this source
        range: StandardName
        annotations:
          relationship_type: PRODUCED_NAME
      produced_sn_id:
        description: >-
          ID of the StandardName this source produced (composed or
          auto-attached). Scalar property mirror of the PRODUCED_NAME
          relationship â€” set in the same transaction the edge is MERGEd.
          Enables recovery of the edge if MERGE fails silently (e.g. when
          the target StandardName was not persisted) and simplifies
          bulk queries that only need the target id.
      embedding:
        description: Vector embedding for semantic search
        multivalued: true
        range: float
      embedded_at:
        description: When embedding was last computed
        range: datetime
      description:
        description: Human-readable description of this source entity
      skip_reason:
        description: >-
          Machine-readable skip classification (e.g.
          'dd_unit_unresolvable', 'dd_unit_ambiguous',
          'dd_unit_context_dependent'). Set when status='skipped'.
      skip_reason_detail:
        description: >-
          Human-readable detail for the skip (e.g. the raw DD unit string,
          the conflicting parent/child units). Set when status='skipped'.

  SNRun:
    description: >-
      A single invocation of ``sn run``. Records budget, counts,
      domains touched, and stop reason so operators can audit run
      cycles over time.

      Example Cypher:
        MATCH (rr:SNRun)
        RETURN rr.id, rr.started_at, rr.cost_spent,
               rr.cost_total, rr.events_total, rr.stop_reason
        ORDER BY rr.started_at DESC LIMIT 10

        MATCH (sn:StandardName)
        WHERE sn.last_run_id IS NOT NULL
        MATCH (rr:SNRun {id: sn.last_run_id})
        RETURN rr.id, count(sn) AS touched
        ORDER BY rr.started_at DESC
    class_uri: sn:SNRun
    attributes:
      id:
        identifier: true
        description: UUID of the run
        required: true
      created_at:
        description: When the SNRun node was first created in the graph
        range: datetime
      started_at:
        description: When the run started
        required: true
        range: datetime
      ended_at:
        description: When finalization completed (set by finalize_sn_run)
        range: datetime
      stopped_at:
        description: When the run stopped (null if still running or interrupted before finalize)
        range: datetime
      cost_spent:
        description: Total LLM cost spent across all phases (USD)
        range: float
        ifabsent: float(0.0)
      cost_limit:
        description: Cost budget supplied to this run (USD)
        range: float
      compose_cost:
        description: >-
          LLM cost attributable to the generate and regen phases (USD).
          Populated from the shared BudgetManager phase-spend map.
        range: float
        ifabsent: float(0.0)
      review_cost:
        description: >-
          LLM cost attributable to the review_names and review_docs phases (USD).
          Populated from the shared BudgetManager phase-spend map.
        range: float
        ifabsent: float(0.0)
      names_composed:
        description: Count of names produced by the generate phase
        range: integer
        ifabsent: int(0)
      names_enriched:
        description: Count of names enriched during this run
        range: integer
        ifabsent: int(0)
      names_reviewed:
        description: Count of names reviewed during this run
        range: integer
        ifabsent: int(0)
      names_regenerated:
        description: Count of names that went through the regen phase
        range: integer
        ifabsent: int(0)
      error_siblings_minted:
        description: >-
          Count of error-sibling StandardName nodes deterministically
          minted during the generate phase via uncertainty modifier
          grammar (B9). Each parent with HAS_ERROR edges produces up
          to 3 siblings (upper_uncertainty, lower_uncertainty,
          uncertainty_index). These skip LLM compose and review.
        range: integer
        ifabsent: int(0)
      domains_touched:
        description: Physics domains that had at least one phase executed
        multivalued: true
      stop_reason:
        description: >-
          Why the run exited. One of:
          'budget_exhausted', 'interrupted', 'error', 'completed'.
      min_score:
        description: >-
          The ``--min-score`` threshold below which reviewed names were
          selected for the regen phase. Null if regen phase was skipped.
        range: float
      description:
        description: Free-text notes about this run (optional)
      pipeline_hash:
        description: >-
          Composite SHA-256 digest (16 hex chars) of all prompt files,
          classifier code, and ISN vocab version at cycle start.
          Computed by ``imas_codex.standard_names.pipeline_version.compute_pipeline_hash``
          and stored as the ``_composite`` key.  Used by ``sn run`` to
          detect pipeline changes between cycles and prompt the operator
          to run ``sn clear`` before continuing.
        range: string
      pipeline_hash_detail:
        description: >-
          JSON-encoded dict of per-file 16-char hex digests that
          contributed to ``pipeline_hash``.  Allows precise diff
          reporting ("generate_name_system.md changed") without storing the
          full file contents.
        range: string
      status:
        description: Lifecycle status. started=in-progress; final values are past-tense.
        range: SNRunStatus
        ifabsent: string(started)
      cost_is_exact:
        description: >-
          False when one or more LLMCost writes failed and could not be drained
          before run finalization. cost_spent is then a lower bound.
        range: boolean
        ifabsent: boolean(true)
      cost_total:
        description: >-
          Aggregate of sum(LLMCost.llm_cost) for all LLMCost children
          of this run. Set live by BudgetManager flush and finalised by
          finalize_sn_run from the LLMCost ledger. Authoritative mirror
          of the graph-sourced spend total.
        range: float
      events_total:
        description: >-
          Count of LLMCost nodes linked to this run. Set live by
          BudgetManager flush and finalised by finalize_sn_run.
        range: integer
      last_heartbeat:
        description: >-
          Most recent heartbeat from a live run; orphan sweep uses
          this to detect dead processes.
        range: datetime

  LLMCost:
    description: >-
      Atomic LLM cost row. One node per acall_llm_structured() invocation.
      Append-only and idempotent â€” created with a deterministic UUID via CREATE
      (not MERGE). Duplicate writes raise a constraint violation that callers
      treat as success. Sole source of truth for SN spend totals.
    class_uri: sn:LLMCost
    mixins:
      - LLMOperation
    attributes:
      id:
        identifier: true
        required: true
        description: Deterministic UUID generated client-side.
      run_id:
        required: true
        description: Links to SNRun.id via FOR_RUN edge.
      phase:
        required: true
        description: Pipeline phase (generate, regen, enrich, review_names, review_docs).
      cycle:
        description: Review cycle (c0, c1, c2) or null for non-review phases.
      sn_ids:
        multivalued: true
        description: StandardName ids touched by this LLM call. Per-name cost share = llm_cost / size(sn_ids).
      batch_id:
        description: Groups retries within one logical batch.
      overspend:
        description: USD charged beyond the lease reservation. 0.0 when call fits its reservation.
        range: float
        ifabsent: float(0.0)
      pool:
        description: >-
          Normalized pipeline pool name. One of: compose, refine_name,
          refine_docs, validate, review, enrich. Maps legacy phase values
          to the six canonical pool identifiers.
      event_type:
        description: >-
          Raw phase/event label as recorded by the caller (e.g.
          generate_name, regen, refine_docs). Preserves the original
          granularity before pool normalisation.
      for_run:
        range: SNRun
        annotations:
          relationship_type: FOR_RUN
        description: Edge to the parent SNRun.

  StandardNameReview:
    description: >-
      Quality review of a StandardName produced by an LLM reviewer model.
      A StandardName may have one (canonical) or many (multi-reviewer)
      StandardNameReview nodes attached via HAS_REVIEW. Each StandardNameReview
      belongs to an RD-quorum review group identified by ``review_group_id``.

      Example Cypher:
        MATCH (sn:StandardName {id: 'electron_temperature'})-[:HAS_REVIEW]->(r:StandardNameReview)
        RETURN r.llm_model, r.score, r.tier, r.review_axis, r.cycle_index,
               r.review_group_id, r.resolution_role, r.resolution_method
    class_uri: sn:StandardNameReview
    mixins:
      - LLMOperation
    attributes:
      id:
        identifier: true
        description: >-
          Composite id: ``{standard_name_id}:{axis}:{review_group_id}:{cycle_index}``.
          Unique across axes and quorum cycles. MERGE is idempotent for
          rerun of the same review pass.
        required: true
      standard_name_id:
        description: ID of the reviewed StandardName (back-reference; edge owned by StandardName via HAS_REVIEW)
        required: true
      review_axis:
        description: >-
          Which review rubric produced this StandardNameReview â€” ``names``
          (4-dim name scoring) or ``docs`` (4-dim documentation scoring).
        range: StandardNameReviewMode
        required: true
      cycle_index:
        description: >-
          Zero-based cycle index within the RD-quorum group.
          0 = primary (blind), 1 = secondary (blind), 2 = escalator.
        range: integer
        required: true
      review_group_id:
        description: >-
          UUID identifying the quorum group this Review belongs to.
          All cycles within one batch review share the same group id.
        required: true
      resolution_role:
        description: >-
          Role of this Review within the quorum group: primary, secondary,
          or escalator.
        range: ReviewResolutionRole
        required: true
      resolution_method:
        description: >-
          How the final scores were resolved for this review group.
          Set on the last cycle in the group; null on intermediate cycles.
        range: ReviewResolutionMethod
      model:
        description: LLM model id used for this review (OpenRouter-style slug)
        required: true
      reviewer_model:
        description: >-
          LLM model id used for this review â€” consumer-facing alias for
          ``model``. Set to the same value as ``model`` so that queries on
          ``rv.reviewer_model`` return the expected string without needing
          to alias in Cypher.
      model_family:
        description: >-
          Family of the reviewing model (anthropic, openai, google, mistral,
          meta, xai, cohere, other). Derived from ``model`` for family-aware
          diversity queries.
      is_canonical:
        description: >-
          True iff this is the canonical reviewer (``models[0]``). Its
          score/tier/comments mirror onto the StandardName node.
        range: boolean
      score:
        description: Normalized reviewer score (0-1)
        range: float
      scores_json:
        description: >-
          JSON-encoded per-dimension sub-scores. Schema depends on review
          mode (names 4-dim, docs 4-dim independent).
      comments_per_dim_json:
        description: >-
          JSON-encoded per-dimension reviewer comments matching scores_json
          dimensions. Values are optional strings (null for no comment).
      tier:
        description: Quality tier (outstanding, good, inadequate, poor, unknown)
      comments:
        description: Free-text reviewer comments
      suggested_name:
        description: >-
          Reviewer-proposed replacement name. Mirrors
          ``StandardName.reviewer_suggested_name`` for the canonical
          reviewer. Null when the reviewer offered no alternative.
        range: string
      suggestion_justification:
        description: >-
          1â€“3 sentence justification for ``suggested_name``. Null when
          ``suggested_name`` is null.
        range: string
      reviewed_at:
        description: ISO 8601 timestamp when the review completed
        range: datetime

  PromotionCandidate:
    description: >-
      A grammar-vocabulary token proposed for addition to ISN's closed
      vocabulary lists, detected by mining the graph for tokens that are
      saturated â€” reused across multiple high-quality StandardNames.

      Lifecycle:
        1. ``sn vocab saturated`` mines candidates (multiple StandardName uses,
           all with review_mean_score >= threshold, not already in ISN vocab).
        2. ``sn vocab promote`` persists a ``PromotionCandidate`` node per
           saturated token and prints an ISN-ready PR snippet.
        3. When the ISN PR is opened, ``submitted_to_isn_at`` is recorded.
        4. Once the token lands in an ISN release, ``imas_standard_names``
           picks it up automatically on the next dependency bump â€” codex
           does not own the vocabulary itself.

      Each candidate is linked to the StandardNames that evidence its use
      via the EVIDENCED_BY relationship.

      Example Cypher:
        MATCH (pc:PromotionCandidate {segment: 'physical_base'})
        WHERE pc.submitted_to_isn_at IS NULL
        RETURN pc.token, pc.uses, pc.min_review_score ORDER BY pc.uses DESC

        MATCH (pc:PromotionCandidate)-[:EVIDENCED_BY]->(sn:StandardName)
        RETURN pc.token, collect(sn.id) AS supporting_names
    class_uri: sn:PromotionCandidate
    attributes:
      id:
        identifier: true
        description: >-
          Format: promotion_candidate:{segment}:{token}
          Example: promotion_candidate:physical_base:gap
        required: true
      segment:
        description: >-
          Grammar segment the token belongs to (e.g. ``physical_base``,
          ``subject``). For V1 this is always ``physical_base`` since it
          is the only open segment, but the field accommodates future
          segments.
        required: true
      token:
        description: The candidate vocabulary token
        required: true
      uses:
        description: >-
          Number of distinct StandardNames using this token in the named
          segment slot at detection time.
        range: integer
      min_review_score:
        description: >-
          Minimum ``review_mean_score`` across the supporting StandardNames
          at detection time. All supporting names must meet the threshold
          (default 0.75) for the candidate to be emitted.
        range: float
      physics_domains:
        description: >-
          Comma-separated list of distinct ``physics_domain`` values covered
          by the supporting StandardNames (evidence of cross-domain use).
      detected_at:
        description: ISO 8601 timestamp when this candidate was first detected
        range: datetime
      last_detected_at:
        description: >-
          ISO 8601 timestamp when this candidate was most recently observed
          in a ``sn vocab saturated`` pass.  Updated on each detection run so
          that stale candidates (not seen for a long time) can be culled.
        range: datetime
      submitted_to_isn_at:
        description: >-
          ISO 8601 timestamp when a PR was opened against ISN for this
          candidate. NULL means the candidate has not yet been submitted.
        range: datetime
      evidences:
        description: >-
          Supporting StandardNames whose segment slot contains this token.
          Persisted as EVIDENCED_BY edges in the graph; LinkML does not
          model edge properties.
        multivalued: true
        range: StandardName
        inlined: false
        annotations:
          relationship_type: EVIDENCED_BY

  ImportWatermark:
    description: >-
      Singleton node tracking the last successful catalog import. Exactly
      one node with id='singleton' exists in the graph. Used by sn import
      to determine which catalog commits have already been processed.
    class_uri: sn:ImportWatermark
    attributes:
      id:
        identifier: true
        description: Always 'singleton'
        required: true
      last_commit_sha:
        description: >-
          Git commit SHA of the last successfully imported catalog commit.
          Null if no import has been performed.
      last_import_at:
        description: >-
          ISO 8601 timestamp of the last successful import.
        range: datetime
      source_repo:
        description: >-
          GitHub repository slug (owner/repo) of the catalog source.
          E.g., 'iterorganization/imas-standard-names-catalog'.

  ImportLock:
    description: >-
      Singleton advisory lock for catalog import operations. Prevents
      concurrent sn import runs from corrupting graph state. Exactly
      one node with id='singleton' exists in the graph.
    class_uri: sn:ImportLock
    attributes:
      id:
        identifier: true
        description: Always 'singleton'
        required: true
      acquired_at:
        description: >-
          ISO 8601 timestamp when the lock was acquired. Null when
          the lock is not held.
        range: datetime
      holder:
        description: >-
          Identifier of the process holding the lock (hostname:pid or
          similar). Null when the lock is not held.
      stale_after_minutes:
        description: >-
          Number of minutes after acquired_at before the lock is
          considered stale and can be forcibly broken. Default 30.
        range: integer
        ifabsent: int(30)
